    }

    function renderSongNotePopover(stage) {
      if (!editingNoteId) return '';
      const note = findSongNoteById(editingNoteId);
      if (!note || !stage) return '';
      return [
        '<div class="viewer-note-popover viewer-note-ui' + getSongNoteAnchorClass(note) + '" id="viewer-note-popover" data-note-id="' + escapeHtml(note.id) + '" style="' + getSongNoteInlineStyle(note, stage) + '">',
          '<div class="viewer-note-popover-actions" data-note-drag="popover" data-note-id="' + escapeHtml(note.id) + '" title="Drag note">',
            '<button type="button" class="viewer-note-action-btn" data-note-action="close" data-note-id="' + escapeHtml(note.id) + '" title="Close note" aria-label="Close note">✓</button>',
            '<button type="button" class="viewer-note-action-btn viewer-note-action-font" data-note-action="font-down" data-note-id="' + escapeHtml(note.id) + '" title="Smaller note text" aria-label="Smaller note text">A−</button>',
            '<button type="button" class="viewer-note-action-btn viewer-note-action-font" data-note-action="font-up" data-note-id="' + escapeHtml(note.id) + '" title="Larger note text" aria-label="Larger note text">A+</button>',
            '<span class="viewer-note-action-spacer" aria-hidden="true"></span>',
            '<button type="button" class="viewer-note-action-btn" data-note-action="toggle" data-note-id="' + escapeHtml(note.id) + '" title="Minimize note" aria-label="Minimize note">_</button>',
            '<button type="button" class="viewer-note-action-btn" data-note-action="delete" data-note-id="' + escapeHtml(note.id) + '" title="Delete note" aria-label="Delete note">×</button>',
          '</div>',
          '<textarea id="viewer-note-textarea" class="viewer-note-textarea" placeholder="Note" maxlength="' + NOTE_MAX_LENGTH + '">' + escapeHtml(note.text || '') + '</textarea>',
          '<button type="button" class="viewer-note-resize-handle" data-note-resize="popover" data-note-id="' + escapeHtml(note.id) + '" title="Resize note" aria-label="Resize note"></button>',
        '</div>'
      ].join('');
    }

    function renderSongNoteItem(note, stage) {
      if (!note || !stage) return '';
      if (note.isExpanded && editingNoteId !== note.id) {
        return renderSongNoteDisplayCard(note, stage);
      }
      if (editingNoteId === note.id) {
        return renderSongNotePopover(stage);
      }
      const dotPosition = getSongNotePixelPosition(note, stage);
      return '<button type="button" class="viewer-note-dot viewer-note-ui" data-note-action="toggle" data-note-drag="dot" data-note-id="' + escapeHtml(note.id) + '" style="left:' + dotPosition.leftPx + 'px;top:' + dotPosition.topPx + 'px;" title="' + escapeHtml(getNotePreviewText(note.text)) + '" aria-label="Open note"></button>';
    }

    function renderSingleSongNote(noteId) {
      const els = cacheElements();
      if (!els.noteLayer || !els.sheetStage) {
        renderSongNotes();
        return;
      }
      Array.from(els.noteLayer.children || []).forEach(function(child) {
        if (child && child.dataset && child.dataset.noteId === noteId) child.remove();
      });
      const note = findSongNoteById(noteId);
      const html = renderSongNoteItem(note, els.sheetStage);
      if (html) els.noteLayer.insertAdjacentHTML('beforeend', html);
      if (editingNoteId === noteId) {
        bindActiveSongNoteResizeObserver();
        window.requestAnimationFrame(focusSongNoteTextarea);
      } else if (!editingNoteId) {
        disconnectSongNoteResizeObserver();
      }
    }

    function renderSongNotes() {
      const els = cacheElements();
      if (!els.noteLayer) return;
      loadCurrentSongNotes();
      const captureHtml = noteCreateMode
        ? '<button type="button" class="viewer-note-capture" id="viewer-note-capture" aria-label="Place note" title="Click to place a note"></button>'
        : '';
      const notesHtml = currentSongNotes.map(function(note) {
        if (editingNoteId === note.id) return '';
        return renderSongNoteItem(note, els.sheetStage);
      }).join('');
      els.noteLayer.innerHTML = captureHtml + notesHtml + renderSongNotePopover(els.sheetStage);
      syncNoteCreateModeUi(els);
      if (editingNoteId) {
        bindActiveSongNoteResizeObserver();
        window.requestAnimationFrame(focusSongNoteTextarea);
        return;
      }
      disconnectSongNoteResizeObserver();
    }

    function syncNoteCreateModeUi(els) {
      const cachedEls = els || cacheElements();
      if (cachedEls.sheetStage) {
        cachedEls.sheetStage.classList.toggle('is-note-placing', !!noteCreateMode);
      }
      if (cachedEls.noteAddButton) {
        cachedEls.noteAddButton.classList.toggle('is-active', !!noteCreateMode);
        cachedEls.noteAddButton.setAttribute('aria-pressed', noteCreateMode ? 'true' : 'false');
        cachedEls.noteAddButton.title = noteCreateMode ? 'Click the sheet to place a note' : 'Add note';
      }
    }

    function toggleNoteCreateMode(forceValue) {
      const nextValue = typeof forceValue === 'boolean' ? forceValue : !noteCreateMode;
      noteCreateMode = !!nextValue;
      syncNoteCreateModeUi();
    }

    function resolveSongNoteStageFromEvent(event) {
      const els = cacheElements();
      const stage = els.sheetStage;
      if (!stage) return null;

      const target = event && event.target;
      if (target && target.closest) {
        const stageFromTarget = target.closest('#sheet-stage, .sheet-stage');
        if (stageFromTarget === stage) return stage;
      }

      const source = event && event.touches ? event.touches[0] : event;
      if (!source || typeof source.clientX !== 'number' || typeof source.clientY !== 'number') return null;

      const rect = stage.getBoundingClientRect();
      if (source.clientX < rect.left || source.clientX > rect.right || source.clientY < rect.top || source.clientY > rect.bottom) {
        return null;
      }
      return stage;
    }

    function shouldHandleSongNotePointerEvent(event) {
      const target = event && event.target;
      if (target && target.closest && target.closest('.viewer-note-popover')) return false;
      if (target && target.closest && target.closest('.autoscroll-marker')) return false;
      return true;
    }

    function triggerSongNoteFromPointer(event, stage) {
      if (!stage || !shouldHandleSongNotePointerEvent(event)) return false;

      const point = getStagePercentFromEvent(event, stage);
      const triggerKey = 'point:' + point.xPercent.toFixed(4) + ':' + point.yPercent.toFixed(4);
      const now = Date.now();
      if ((now - lastSongNoteTriggerAt) < 360 && triggerKey === lastSongNoteTriggerKey) {
        if (event && event.type === 'contextmenu' && event.cancelable) event.preventDefault();
        return true;
      }

      lastSongNoteTriggerAt = now;
      lastSongNoteTriggerKey = triggerKey;
      if (event && event.type === 'contextmenu' && event.cancelable) event.preventDefault();

      const note = createSongNote(point);
      openSongNoteEditor(note.id, { focusText: true });
      return true;
    }

    function handleNoteCaptureClick(event) {
      const els = cacheElements();
      const stage = els.sheetStage;
      if (!stage) return false;
      if (event && event.cancelable) event.preventDefault();
      if (event && event.stopPropagation) event.stopPropagation();
      clearActiveNoteInteraction();
      triggerSongNoteFromPointer(event, stage);
      toggleNoteCreateMode(false);
      return false;
    }

    function handleNoteCaptureContextMenu(event) {
      return handleNoteCaptureClick(event);
    }

    function handleNoteAction(event) {
      const actionButton = event && event.target && event.target.closest ? event.target.closest('[data-note-action]') : null;
      if (!actionButton) return false;
      const noteId = actionButton.dataset.noteId || editingNoteId;
      if (!noteId) return false;
      if (event.cancelable) event.preventDefault();
      if (event.stopPropagation) event.stopPropagation();
      clearActiveNoteInteraction();
      toggleNoteCreateMode(false);
      if (actionButton.dataset.noteAction === 'toggle') {
        if (editingNoteId === noteId) {
          commitActiveSongNote({ skipRender: true });
          if (findSongNoteById(noteId)) setSongNoteExpanded(noteId, false);
          return false;
        }
        if (shouldSuppressNoteToggle(noteId)) return false;
        toggleSongNoteExpanded(noteId);
        return false;
      }
      if (actionButton.dataset.noteAction === 'font-down') {
        updateSongNoteFontSizeLevel(noteId, -1);
        return false;
      }
      if (actionButton.dataset.noteAction === 'font-up') {
        updateSongNoteFontSizeLevel(noteId, 1);
        return false;
      }
      if (actionButton.dataset.noteAction === 'edit') {
        setSongNoteExpanded(noteId, true, { skipRender: true });
        openSongNoteEditor(noteId, { focusText: true });
        return false;
      }
      if (actionButton.dataset.noteAction === 'delete') {
        deleteSongNote(noteId);
        return false;
      }
      if (actionButton.dataset.noteAction === 'close') {
        commitActiveSongNote();
        return false;
      }
      return false;
    }

    function bindSongNoteUi(els) {
      if (!els.sheetStage) {
        window.setTimeout(function() {
          bindSongNoteUi(cacheElements());
        }, 100);
        return;
      }
      if (els.sheetStage.dataset.noteBound) return;
      els.sheetStage.dataset.noteBound = '1';
      els.sheetStage.addEventListener('click', function(event) {
        const captureButton = event.target && event.target.closest ? event.target.closest('#viewer-note-capture') : null;
        if (captureButton) {
          handleNoteCaptureClick(event);
          return;
        }
        const actionButton = event.target && event.target.closest ? event.target.closest('[data-note-action]') : null;
        if (!actionButton) return;
        const noteId = actionButton.dataset.noteId || editingNoteId;
        if (!noteId) return;
        event.preventDefault();
        event.stopPropagation();
        clearActiveNoteInteraction();
        toggleNoteCreateMode(false);
        if (actionButton.dataset.noteAction === 'toggle') {
          if (editingNoteId === noteId) {
            commitActiveSongNote({ skipRender: true });
            if (findSongNoteById(noteId)) setSongNoteExpanded(noteId, false);
            return;
          }
          if (shouldSuppressNoteToggle(noteId)) return;
          toggleSongNoteExpanded(noteId);
          return;
        }
        if (actionButton.dataset.noteAction === 'font-down') {
          updateSongNoteFontSizeLevel(noteId, -1);
          return;
        }
        if (actionButton.dataset.noteAction === 'font-up') {
          updateSongNoteFontSizeLevel(noteId, 1);
          return;
        }
        if (actionButton.dataset.noteAction === 'edit') {
          setSongNoteExpanded(noteId, true, { skipRender: true });
          openSongNoteEditor(noteId, { focusText: true });
          return;
        }
        if (actionButton.dataset.noteAction === 'delete') {
          deleteSongNote(noteId);
          return;
        }
        if (actionButton.dataset.noteAction === 'close') {
          commitActiveSongNote();
        }
      });
      els.sheetStage.addEventListener('dblclick', function(event) {
        const noteBody = event.target && event.target.closest ? event.target.closest('[data-note-dblclick]') : null;
        if (!noteBody) return;
        event.preventDefault();
        event.stopPropagation();
        handleNoteCardDoubleClick(event);
      });
      els.sheetStage.addEventListener('contextmenu', function(event) {
        const captureButton = event.target && event.target.closest ? event.target.closest('#viewer-note-capture') : null;
        if (!captureButton) return;
        handleNoteCaptureContextMenu(event);
      });
      els.sheetStage.addEventListener('input', function(event) {
        if (!editingNoteId || event.target.id !== 'viewer-note-textarea') return;
        updateSongNoteText(editingNoteId, event.target.value, { skipRender: true });
      });
      els.sheetStage.addEventListener('keydown', function(event) {
        if (!editingNoteId || event.target.id !== 'viewer-note-textarea') return;
        if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
          event.preventDefault();
          commitActiveSongNote();
          return;
        }
        if (event.key === 'Escape') {
          event.preventDefault();
          commitActiveSongNote();
        }
      });
      els.sheetStage.addEventListener('pointerdown', function(event) {
        if (maybeBeginSongNoteResize(event)) return;
        maybeBeginSongNoteDrag(event);
      });

      if (!noteUiBound) {
        noteUiBound = true;
        document.addEventListener('pointerdown', function(event) {
          if (activeNoteDrag || activeNoteResize) clearActiveNoteInteraction();
          if (maybeBeginSongNoteResize(event)) return;
          if (maybeBeginSongNoteDrag(event)) return;
          if (!editingNoteId) return;
          if (event.target && event.target.closest && event.target.closest('.viewer-note-ui')) return;
          if (event.target && event.target.closest && event.target.closest('.sheet-stage, .cw-sheet')) {
            suppressNextSheetAutoScrollToggle();
          }
          commitActiveSongNote();
        }, true);
        window.addEventListener('pointermove', function(event) {
          if (handleActiveSongNoteResizeMove(event)) return;
          handleActiveSongNoteDragMove(event);
        }, { passive: false });
        window.addEventListener('pointerup', function(event) {
          if (finishActiveSongNoteResize(event)) return;
          finishActiveSongNoteDrag(event);
        }, true);
        window.addEventListener('pointercancel', function(event) {
          if (finishActiveSongNoteResize(event)) return;
          finishActiveSongNoteDrag(event);
        }, true);
        window.addEventListener('blur', function() {
          clearActiveNoteInteraction();
        });
        document.addEventListener('keydown', function(event) {
          if (event.key !== 'Escape' || !editingNoteId) return;
          if (event.target && event.target.id === 'viewer-note-textarea') return;
          commitActiveSongNote();
        });
      }
    }

    function getViewportTop(target) {
      if (!target || target === document.body || target === document.documentElement || target === document.scrollingElement) {
        return 0;
      }
      return target.getBoundingClientRect().top;
    }

    function getViewportHeight(target) {
      if (!target || target === document.body || target === document.documentElement || target === document.scrollingElement) {
        return window.innerHeight || document.documentElement.clientHeight || 0;
      }
      return target.clientHeight;
    }

    function getGeometry() {
      const els = cacheElements();
      if (!els.sheetStage) return null;
      const scrollTarget = getScrollTarget(els);
      const stageRect = els.sheetStage.getBoundingClientRect();
      const stageHeight = Math.max(els.sheetStage.offsetHeight, els.sheetStage.scrollHeight, stageRect.height, 1);
      const stageTop = getScrollTop(scrollTarget) + stageRect.top - getViewportTop(scrollTarget);
      const startY = stageTop + (App.state.scroll.startPercent * stageHeight);
      const endY = stageTop + (App.state.scroll.endPercent * stageHeight);
      return {
        els: els,
        scrollTarget: scrollTarget,
        stageHeight: stageHeight,
        stageTop: stageTop,
        startY: startY,
        endY: endY,
        distance: Math.max(0, endY - startY),
        viewportHeight: getViewportHeight(scrollTarget)
      };
    }

    function getMinMarkerGapPercent(stageHeight) {
      const minGapPx = 40;
      return Math.min(0.25, minGapPx / Math.max(stageHeight || 1, 1));
    }

    function normalizeScrollBounds() {
      const geometry = getGeometry();
      const minGap = getMinMarkerGapPercent(geometry ? geometry.stageHeight : 0);
      let startPercent = Math.max(0, Math.min(1, App.state.scroll.startPercent || 0));
      let endPercent = Math.max(0, Math.min(1, App.state.scroll.endPercent || 0));

      if (endPercent - startPercent < minGap) {
        if (startPercent + minGap <= 1) {
          endPercent = startPercent + minGap;
        } else {
          startPercent = Math.max(0, endPercent - minGap);
        }
      }

      App.state.scroll.startPercent = startPercent;
      App.state.scroll.endPercent = Math.max(startPercent + minGap, endPercent);
      if (App.state.scroll.endPercent > 1) {
        App.state.scroll.endPercent = 1;
        App.state.scroll.startPercent = Math.max(0, 1 - minGap);
      }
    }

    function syncAutoscrollUi() {
      const els = cacheElements();
      normalizeScrollBounds();
      const startPercent = Math.max(0, Math.min(1, App.state.scroll.startPercent || 0));
      const endPercent = Math.max(startPercent, Math.min(1, App.state.scroll.endPercent || 0));

      if (els.trackRange) {
        els.trackRange.style.top = (startPercent * 100) + '%';
        els.trackRange.style.height = Math.max(0, (endPercent - startPercent) * 100) + '%';
      }
      if (els.startMarker) els.startMarker.style.top = (startPercent * 100) + '%';
      if (els.endMarker) els.endMarker.style.top = (endPercent * 100) + '%';
      if (els.startInput) els.startInput.value = String(Math.round(startPercent * 100));
      if (els.endInput) els.endInput.value = String(Math.round(endPercent * 100));
      if (els.scrollPane) {
        els.scrollPane.classList.toggle('is-autoscrolling', !!App.state.scroll.isPlaying);
      }
      syncAutoscrollButtonUi();
      if (App && typeof App.syncViewerSongControlsSaveButtons === 'function') {
        App.syncViewerSongControlsSaveButtons();
      }
    }

    function syncAutoscrollButtonUi() {
      const button = document.getElementById('autoscroll-toggle-button');
      if (!button) return;
      button.classList.toggle('is-active', !!App.state.scroll.isPlaying);
      button.textContent = App.state.scroll.isPlaying ? 'Pause' : 'Start';
    }

    function bindPaneListeners() {
      const els = cacheElements();
      if (els.scrollPane && !els.scrollPane.dataset.viewerBound) {
        els.scrollPane.dataset.viewerBound = '1';
        els.scrollPane.addEventListener('scroll', function() {
          handleScrollPositionChange(els);
        }, { passive: true });
        els.scrollPane.addEventListener('wheel', function(event) {
          markManualScrollIntent(event);
        }, { passive: true });
        els.scrollPane.addEventListener('touchstart', function(event) {
          markManualScrollIntent(event);
        }, { passive: true });
        els.scrollPane.addEventListener('touchmove', function(event) {
          markManualScrollIntent(event);
        }, { passive: true });
        els.scrollPane.addEventListener('pointerdown', function(event) {
          markManualScrollIntent(event);
        }, { passive: true });
      }
      if (!windowScrollBound) {
        windowScrollBound = true;
        window.addEventListener('scroll', function() {
          handleScrollPositionChange();
        }, { passive: true });
        window.addEventListener('wheel', function(event) {
          markManualScrollIntent(event);
        }, { passive: true });
        window.addEventListener('touchstart', function(event) {
          markManualScrollIntent(event);
        }, { passive: true });
        window.addEventListener('touchmove', function(event) {
          markManualScrollIntent(event);
        }, { passive: true });
        window.addEventListener('pointerdown', function(event) {
          markManualScrollIntent(event);
        }, { passive: true });
      }
    }

    function bindKeyboardOnce() {
      if (keyboardBound) return;
      keyboardBound = true;
      window.addEventListener('keydown', function(event) {
        if (App.state.page !== 'view') return;
        if (event.key === 'Escape' && noteCreateMode) {
          event.preventDefault();
          toggleNoteCreateMode(false);
          return;
        }
        if (event.code !== 'Space') return;
        const target = event.target;
        const tagName = target && target.tagName ? String(target.tagName).toLowerCase() : '';
        if (tagName === 'input' || tagName === 'textarea' || tagName === 'select' || (target && target.isContentEditable)) {
          return;
        }
        event.preventDefault();
        toggleAutoScrollFromSheet(event);
      });
    }

    function cancelResetScrollAnimation() {
      if (!resetScrollRafId) return;
      cancelAnimationFrame(resetScrollRafId);
      resetScrollRafId = null;
    }

    function animateResetScrollTo(targetTop, durationMs) {
      const scrollTarget = getScrollTarget();
      if (!scrollTarget) return;
      cancelResetScrollAnimation();
      const startTop = getScrollTop(scrollTarget);
      const finalTop = Math.max(0, targetTop);
      const distance = finalTop - startTop;
      if (Math.abs(distance) < 1 || durationMs <= 0) {
        setProgrammaticScrollTop(scrollTarget, finalTop);
        return;
      }
      const startTime = performance.now();
      function step(now) {
        const progress = Math.min(1, (now - startTime) / durationMs);
        const eased = 1 - Math.pow(1 - progress, 3);
        const nextTop = startTop + (distance * eased);
        setProgrammaticScrollTop(scrollTarget, nextTop);
        if (progress < 1) {
          resetScrollRafId = requestAnimationFrame(step);
          return;
        }
        setProgrammaticScrollTop(scrollTarget, finalTop);
        resetScrollRafId = null;
      }
      resetScrollRafId = requestAnimationFrame(step);
    }

    function bindViewInteractions() {
      const els = cacheElements();
      if (!els.sheetStage) return;
      if (!els.sheetStage.dataset.viewBound) {
        els.sheetStage.dataset.viewBound = '1';
        els.sheetStage.addEventListener('pointerdown', function(event) {
          handleSheetPointerDown(event);
        });
        els.sheetStage.addEventListener('click', function(event) {
          toggleAutoScrollFromSheet(event);
        });
        els.sheetStage.addEventListener('contextmenu', function(event) {
          handleSheetContextMenu(event);
        });
      }
      [['start', els.startMarker], ['end', els.endMarker]].forEach(function(entry) {
        const which = entry[0];
        const marker = entry[1];
        if (!marker || marker.dataset.viewBound) return;
        marker.dataset.viewBound = '1';
        marker.addEventListener('mousedown', function(event) {
          handleMarkerMouseDown(which, event);
        });
        marker.addEventListener('touchstart', function(event) {
          handleMarkerMouseDown(which, event);
        }, { passive: false });
        marker.addEventListener('focus', function() {
          if (typeof marker.blur === 'function') marker.blur();
        });
      });
    }

    function afterRender(options) {
      options = options || {};
      if (!App || !App.state || App.state.page !== 'view') return;
      bindPaneListeners();
      bindKeyboardOnce();
      bindViewInteractions();
      const els = cacheElements();
      bindSongNoteUi(els);
      syncNoteCreateModeUi(els);
      const scrollTarget = getScrollTarget(els);
      if (scrollTarget) {
        const viewerTop = typeof options.viewerScrollTop === 'number'
          ? options.viewerScrollTop
          : exactScrollTop;
        setProgrammaticScrollTop(scrollTarget, viewerTop);
      }
      if (App.state.scroll.isPlaying) {
        const geometry = getGeometry();
        observedScrollGeometrySnapshot = createObservedGeometrySnapshot(geometry);
        if (observedScrollGeometrySnapshot) {
          rebaseAutoscrollSegment(exactScrollTop, observedScrollGeometrySnapshot);
        }
      }
      if (els.sidebarScrollPane && typeof options.sidebarScrollTop === 'number') {
        els.sidebarScrollPane.scrollTop = Math.max(0, options.sidebarScrollTop);
      }
      syncAutoscrollUi();
      syncPendingObservedDurationInputs();
      renderSongNotes();
      window.requestAnimationFrame(function() {
        if (els.sidebarScrollPane && typeof options.sidebarScrollTop === 'number') {
          els.sidebarScrollPane.scrollTop = Math.max(0, options.sidebarScrollTop);
        }
        syncAutoscrollUi();
      });
      window.setTimeout(function() {
        if (els.sidebarScrollPane && typeof options.sidebarScrollTop === 'number') {
          els.sidebarScrollPane.scrollTop = Math.max(0, options.sidebarScrollTop);
        }
        syncAutoscrollUi();
      }, 120);
    }

    function startAutoScroll() {
      if (App.state.scroll.isPlaying) return;
      syncCommittedScrollDurationInputs();
      cancelResetScrollAnimation();
      const geometry = getGeometry();
      if (!geometry || !geometry.scrollTarget) return;

      if (!hasStarted) {
        resetAdaptiveSpeedMult();
        clearManualScrollIntent();
        setProgrammaticScrollTop(geometry.scrollTarget, geometry.startY - AUTOSCROLL_REFERENCE_OFFSET_PX);
        hasStarted = true;
        observedScrollSessionStartAt = performance.now();
        observedScrollCaptured = false;
        observedScrollGeometrySnapshot = createObservedGeometrySnapshot(geometry);
      } else {
        exactScrollTop = getScrollTop(geometry.scrollTarget);
        if (!observedScrollSessionStartAt) {
          observedScrollSessionStartAt = performance.now();
          observedScrollCaptured = false;
        }
        if (!observedScrollGeometrySnapshot) {
          observedScrollGeometrySnapshot = createObservedGeometrySnapshot(geometry);
        }
      }

      if (observedScrollGeometrySnapshot) {
        rebaseAutoscrollSegment(exactScrollTop, observedScrollGeometrySnapshot);
      } else {
        clearAutoscrollSegment();
      }

      App.state.scroll.isPlaying = true;
      lastTime = 0;
      syncAutoscrollUi();
      rafId = requestAnimationFrame(tick);
    }

    function pauseAutoScroll(options) {
      options = options || {};
      cancelResetScrollAnimation();
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      lastTime = 0;
      App.state.scroll.isPlaying = false;
      exactScrollTop = getScrollTop(getScrollTarget());
      clearAutoscrollSegment();
      syncAutoscrollUi();
    }

    function stopAutoScroll(options) {
      options = options || {};
      pauseAutoScroll({ skipRender: true });
      if (options.resetProgress) {
        hasStarted = false;
        exactScrollTop = 0;
        resetAdaptiveSpeedMult();
        clearManualScrollIntent();
        resetObservedScrollMeasurement({ keepPendingObservedDuration: true });
        clearAutoscrollSegment();
      }
      syncAutoscrollUi();
    }

    function resetAutoScroll() {
      pauseAutoScroll({ skipRender: true });
      hasStarted = false;
      resetAdaptiveSpeedMult();
      clearManualScrollIntent();
      resetObservedScrollMeasurement({ keepPendingObservedDuration: true });
      clearAutoscrollSegment();
      const geometry = getGeometry();
      const targetTop = geometry ? Math.max(0, geometry.startY - AUTOSCROLL_REFERENCE_OFFSET_PX) : 0;
      exactScrollTop = geometry && geometry.scrollTarget ? getScrollTop(geometry.scrollTarget) : targetTop;
      syncAutoscrollUi();
      syncCommittedScrollDurationInputs();
      requestAnimationFrame(function() {
        animateResetScrollTo(targetTop, 180);
      });
    }

    function tick(time) {
      if (!App.state.scroll.isPlaying) {
        rafId = null;
        return;
      }

      const geometry = getGeometry();
      if (!geometry || !geometry.scrollTarget) {
        if (App && App._viewerRerenderInProgress) {
          rafId = requestAnimationFrame(tick);
          return;
        }
        pauseAutoScroll();
        return;
      }

      const observedGeometry = observedScrollGeometrySnapshot || createObservedGeometrySnapshot(geometry);
      if (!observedScrollGeometrySnapshot && observedGeometry) {
        observedScrollGeometrySnapshot = observedGeometry;
      }

      if (!observedGeometry || observedGeometry.travelDistance <= 0) {
        maybeCaptureObservedScrollDuration();
        App.state.scroll.isPlaying = false;
        hasStarted = false;
        clearManualScrollIntent();
        resetObservedScrollMeasurement({ keepPendingObservedDuration: true });
        clearAutoscrollSegment();
        syncAutoscrollUi();
        rafId = null;
        lastTime = 0;
        return;
      }

      if (!autoscrollSegmentStartAt || autoscrollSegmentEndTop !== observedGeometry.targetEndScrollTop) {
        rebaseAutoscrollSegment(exactScrollTop, observedGeometry, time);
      }

      const durationMs = Math.max(1, autoscrollSegmentDurationMs || 0);
      const elapsedMs = Math.max(0, time - autoscrollSegmentStartAt);
      const progress = durationMs <= 0 ? 1 : Math.max(0, Math.min(1, elapsedMs / durationMs));
      const nextTop = autoscrollSegmentStartTop + ((autoscrollSegmentEndTop - autoscrollSegmentStartTop) * progress);

      if (hasManualScrollOverride()) {
        exactScrollTop = getScrollTop(geometry.scrollTarget);
        rebaseAutoscrollSegment(exactScrollTop, observedGeometry, time);
        rafId = requestAnimationFrame(tick);
        return;
      }

      setProgrammaticScrollTop(
        geometry.scrollTarget,
        Math.min(autoscrollSegmentEndTop, nextTop)
      );
      maybeCaptureObservedScrollDuration();

      if (progress >= 1 || exactScrollTop >= autoscrollSegmentEndTop) {
        maybeCaptureObservedScrollDuration();
        App.state.scroll.isPlaying = false;
        hasStarted = false;
        clearManualScrollIntent();
        resetObservedScrollMeasurement({ keepPendingObservedDuration: true });
        clearAutoscrollSegment();
        syncAutoscrollUi();
        rafId = null;
        lastTime = 0;
        return;
      }

      rafId = requestAnimationFrame(tick);
    }

    function toggleAutoScroll() {
      if (App.state.scroll.isPlaying) {
        pauseAutoScroll();
        adjustAdaptiveSpeed('slower');
      } else {
        startAutoScroll();
      }
    }

    function blurActiveControlFromSheet(event) {
      const target = event && event.target;
      if (target && target.closest && target.closest('.autoscroll-marker')) return;
      const active = document.activeElement;
      if (!active || active === document.body) return;
      const tagName = active.tagName ? String(active.tagName).toLowerCase() : '';
      const isInteractive = tagName === 'input' || tagName === 'textarea' || tagName === 'select' || tagName === 'button' || active.isContentEditable;
      const isViewerFocus = !!(active.closest && active.closest('#viewer-content'));
      if (!isInteractive && !isViewerFocus) return;
      if (typeof active.blur === 'function') active.blur();
    }

    function handleSheetPointerDown(event) {
      const els = cacheElements();
      const target = event && event.target;
      const isRightButton = !!(event && (event.button === 2 || event.which === 3));
      const isMarker = !!(target && target.closest && target.closest('.autoscroll-marker'));
      const isNoteUi = !!(target && target.closest && target.closest('.viewer-note-ui'));
      if (isRightButton) {
        const stage = resolveSongNoteStageFromEvent(event) || els.sheetStage;
        if (!stage) return false;
        toggleNoteCreateMode(false);
        if (event.cancelable) event.preventDefault();
        if (event.stopPropagation) event.stopPropagation();
        triggerSongNoteFromPointer(event, stage);
        return false;
      }
      if (noteCreateMode && !isMarker) {
        const stage = resolveSongNoteStageFromEvent(event) || els.sheetStage;
        if (!stage) return false;
        if (event.cancelable) event.preventDefault();
        if (event.stopPropagation) event.stopPropagation();
        triggerSongNoteFromPointer(event, stage);
        toggleNoteCreateMode(false);
        return false;
      }
      const isSheetSurface = !!(target && target.closest && target.closest('.sheet-stage, .cw-sheet'));
      const pointerType = event && typeof event.pointerType === 'string' ? event.pointerType : '';
      if (!isNoteUi && !isMarker && isSheetSurface && event && event.cancelable && pointerType !== 'touch') {
        event.preventDefault();
      }
      if (!isNoteUi && !isMarker) {
        blurActiveControlFromSheet(event);
      }
      return true;
    }

    function handleSheetContextMenu(event) {
      if (event && event.cancelable) event.preventDefault();
      return false;
    }

    function suppressNextSheetAutoScrollToggle() {
      suppressSheetAutoScrollToggleUntil = performance.now() + SHEET_AUTOSCROLL_TOGGLE_SUPPRESS_MS;
    }

    function shouldSuppressSheetAutoScrollToggle() {
      if (!suppressSheetAutoScrollToggleUntil) return false;
      if (performance.now() > suppressSheetAutoScrollToggleUntil) {
        suppressSheetAutoScrollToggleUntil = 0;
        return false;
      }
      suppressSheetAutoScrollToggleUntil = 0;
      return true;
    }

    function toggleAutoScrollFromSheet(event) {
      if (isDraggingMarker) return;
      if (shouldSuppressSheetAutoScrollToggle()) return;
      if (event && event.target && event.target.closest && event.target.closest('.autoscroll-marker')) return;
      if (event && event.target && event.target.closest && event.target.closest('.viewer-note-ui')) return;

      toggleAutoScroll();

    function setMarkerPercent(which, percent, options) {
      options = options || {};
      const geometry = getGeometry();
      const minGap = getMinMarkerGapPercent(geometry ? geometry.stageHeight : 0);
      const clamped = Math.max(0, Math.min(1, percent));
      if (which === 'start') {
        App.state.scroll.startPercent = Math.min(clamped, Math.max(0, App.state.scroll.endPercent - minGap));
        hasStarted = false;
      } else {
        App.state.scroll.endPercent = Math.max(clamped, Math.min(1, App.state.scroll.startPercent + minGap));
      }
      normalizeScrollBounds();
      if (!options.skipUiSync) syncAutoscrollUi();

    function beginMarkerDrag(event, which) {
      const geometry = getGeometry();
      if (!geometry || !geometry.scrollTarget || !geometry.els.sheetStage) return;
      if (event && event.cancelable) event.preventDefault();
      if (event && event.stopPropagation) event.stopPropagation();

      isDraggingMarker = true;
      lastDragClientY = event && event.touches ? event.touches[0].clientY : event.clientY;

      const updateFromClientY = function(clientY) {
        lastDragClientY = clientY;
        const rect = geometry.els.sheetStage.getBoundingClientRect();
        const nextPercent = (clientY - rect.top) / Math.max(rect.height, 1);
        setMarkerPercent(which, nextPercent);
      };

      const handleMove = function(moveEvent) {
        if (moveEvent.cancelable) moveEvent.preventDefault();
        updateFromClientY(moveEvent.touches ? moveEvent.touches[0].clientY : moveEvent.clientY);
      };

      const autoScrollPane = function() {
        const scrollTarget = geometry.scrollTarget;
        if (!scrollTarget) return;
        const paneRect = scrollTarget === document.body || scrollTarget === document.documentElement || scrollTarget === document.scrollingElement
          ? { top: 0, bottom: window.innerHeight || document.documentElement.clientHeight || 0 }
          : scrollTarget.getBoundingClientRect();
        const edgeThreshold = 60;
        const scrollStep = 14;
        let didScroll = false;
        const currentTop = getScrollTop(scrollTarget);

        if (lastDragClientY < paneRect.top + edgeThreshold) {
          const next = Math.max(0, currentTop - scrollStep);
          if (next !== currentTop) {
            setProgrammaticScrollTop(scrollTarget, next);
            didScroll = true;
          }
        } else if (lastDragClientY > paneRect.bottom - edgeThreshold) {
          const viewportHeight = getViewportHeight(scrollTarget);
          const maxTop = Math.max(0, scrollTarget.scrollHeight - viewportHeight);
          const next = Math.min(maxTop, currentTop + scrollStep);
          if (next !== currentTop) {
            setProgrammaticScrollTop(scrollTarget, next);
            didScroll = true;
          }
        }

        if (didScroll) {
          exactScrollTop = getScrollTop(scrollTarget);
          updateFromClientY(lastDragClientY);
        }
        autoDragRafId = requestAnimationFrame(autoScrollPane);
      };

      const handleEnd = function() {
        if (autoDragRafId) cancelAnimationFrame(autoDragRafId);
        autoDragRafId = null;
        document.removeEventListener('mousemove', handleMove);
        document.removeEventListener('mouseup', handleEnd);
        document.removeEventListener('touchmove', handleMove);
        document.removeEventListener('touchend', handleEnd);
        window.setTimeout(function() {
          isDraggingMarker = false;
        }, 80);
      };

      document.addEventListener('mousemove', handleMove);
      document.addEventListener('mouseup', handleEnd);
      document.addEventListener('touchmove', handleMove, { passive: false });
      document.addEventListener('touchend', handleEnd);
      updateFromClientY(lastDragClientY);
      autoDragRafId = requestAnimationFrame(autoScrollPane);
    }

    function handleMarkerMouseDown(which, event) {
      beginMarkerDrag(event, which);
    }

    <script>
  const FONT_PRESETS = window.__PCV_FONT_PRESETS__;

  const STORAGE_KEYS = {
    fontSizeLevel: 'personal_chordpro_viewer_fontSizeLevel',
    chordSizeLevel: 'personal_chordpro_viewer_chordSizeLevel',
    formatOptions: 'personal_chordpro_viewer_chordFormatOptions',
    lyricsFont: 'personal_chordpro_viewer_lyricsFont',
    chordFont: 'personal_chordpro_viewer_chordFont',
    accentColor: 'personal_chordpro_viewer_accentColor',
    noteColor: 'personal_chordpro_viewer_noteColor',
    viewerSidebarWidth: 'personal_chordpro_viewer_viewerSidebarWidth',
    gasSyncUrl: 'personal_chordpro_viewer_gasSyncUrl'
  };

  function normalizeFontToken(kind, storedValue) {
    const presets = FONT_PRESETS;
    const raw = String(storedValue || '').trim();
    const normalized = raw;
    const defaultToken = kind === 'chord' ? 'musejazztextlocal' : (kind === 'lyrics' ? 'lineseedjp' : '');
    const fallback = presets.find(function(item) { return item.value === defaultToken; }) || presets[0];
    if (!normalized) return fallback ? fallback.value : '';
    const matched = presets.find(function(item) {
      return item.value === normalized || item.stack === normalized;
    });
    return matched ? matched.value : (fallback ? fallback.value : normalized);
  }

  function getFontStack(kind, token) {
    const presets = FONT_PRESETS;
    const normalized = String(token || '').trim();
    const matched = presets.find(function(item) { return item.value === normalized; });
    return matched ? matched.stack : (presets[0] ? presets[0].stack : 'sans-serif');
  }

  function cloneFontList(list) {
    return (Array.isArray(list) ? list : []).map(function(item) {
      return {
        value: item.value,
        label: item.label,
        stack: item.stack
      };
    });
  }

  function mergeFontLists(baseList, extraList) {
    const merged = [];
    const seen = Object.create(null);

    cloneFontList(baseList).forEach(function(item) {
      const key = String(item && item.value || '').trim();
      if (!key || seen[key]) return;
      seen[key] = true;
      merged.push(item);
    });

    cloneFontList(extraList).forEach(function(item) {
      const key = String(item && item.value || '').trim();
      if (!key || seen[key]) return;
      seen[key] = true;
      merged.push(item);
    });

    return merged;
  }

  function resolveFontConfig(config) {
    const resolved = config || {};
    const serverFonts = Array.isArray(resolved.fonts) ? resolved.fonts : [];
    resolved.fonts = mergeFontLists(FONT_PRESETS, serverFonts);
    return resolved;
  }

  function loadStoredJson(key, fallbackValue) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return fallbackValue;
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' ? parsed : fallbackValue;
    } catch (err) {
      try { localStorage.removeItem(key); } catch (removeErr) {}
      return fallbackValue;
    }
  }

  function loadStoredLevel(key, fallbackValue) {
    const fallback = parseInt(fallbackValue, 10) || 3;
    try {
      const raw = localStorage.getItem(key);
      const parsed = parseInt(raw || String(fallback), 10);
      const normalized = (!isNaN(parsed) && parsed >= 1 && parsed <= 5) ? parsed : fallback;
      if (String(raw || '') !== String(normalized)) {
        localStorage.setItem(key, String(normalized));
      }
      return normalized;
    } catch (err) {
      return fallback;
    }
  }

  function loadStoredString(key, fallbackValue) {
    try {
      const raw = localStorage.getItem(key);
      return raw === null ? fallbackValue : String(raw);
    } catch (err) {
      return fallbackValue;
    }
  }

  function loadStoredInteger(key, fallbackValue, minValue, maxValue) {
    const fallback = parseInt(fallbackValue, 10);
    const safeFallback = isNaN(fallback) ? 0 : fallback;
    try {
      const raw = localStorage.getItem(key);
      const parsed = parseInt(raw == null ? String(safeFallback) : raw, 10);
      let normalized = isNaN(parsed) ? safeFallback : parsed;
      if (typeof minValue === 'number') normalized = Math.max(minValue, normalized);
      if (typeof maxValue === 'number') normalized = Math.min(maxValue, normalized);
      if (String(raw || '') !== String(normalized)) {
        localStorage.setItem(key, String(normalized));
      }
      return normalized;
    } catch (err) {
      return safeFallback;
    }
  }

  function saveStoredString(key, value) {
    try {
      localStorage.setItem(key, String(value));
      return true;
    } catch (err) {
      return false;
    }
  }

  function saveStoredJson(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch (err) {
      return false;
    }
  }

  function downloadJsonFile(filename, payload) {
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
    const objectUrl = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = objectUrl;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    window.setTimeout(function() {
      URL.revokeObjectURL(objectUrl);
    }, 1000);
  }

  function normalizeImportedSongRecord(record) {
    if (!record || typeof record !== 'object') return null;
    return {
      originalSlug: '',
      slug: String(record.slug || '').trim(),
      title: String(record.title || '').trim(),
      artist: String(record.artist || '').trim(),
      tags: Array.isArray(record.tags)
        ? record.tags.map(function(item) { return String(item || '').trim(); }).filter(Boolean)

      youtube: Array.isArray(record.youtube)
        ? record.youtube.map(function(item) {
            return {
              id: String(item && item.id || '').trim(),
              start: Math.max(0, parseInt(item && item.start, 10) || 0)
            };
          }).filter(function(item) { return item.id; })
        : String(record.youtube || ''),
      chordPro: String(record.chordPro || ''),
      createdAt: String(record.createdAt || ''),
      updatedAt: String(record.updatedAt || ''),
      scrollStartPercent: record.scrollStartPercent,
      scrollEndPercent: record.scrollEndPercent,
      scrollDurationSec: record.scrollDurationSec,
      transpose: record.transpose,
      notation: record.notation
    };
  }

  function extractSingleSongImportRecord(payload) {
    if (payload && payload.type === 'personal-chordpro-viewer-songs' && payload.scope === 'song' && payload.song && typeof payload.song === 'object') {
      return normalizeImportedSongRecord(payload.song);
    }
    if (payload && payload.song && typeof payload.song === 'object') {
      return normalizeImportedSongRecord(payload.song);
    }
    if (payload && typeof payload === 'object' && !Array.isArray(payload) && (payload.slug || payload.title || payload.chordPro)) {
      return normalizeImportedSongRecord(payload);
    }
    return null;

    getAvailableFonts: function() {

    getViewerSidebarDefaultWidth: function() {

    getViewerSidebarMinWidth: function() {

    getViewerSidebarMicroThreshold: function() {

    isViewerPaneResizeLandscape: function() {

    getViewerGridElement: function() {
      return document.getElementById('viewer-grid');

    getViewerPaneResizeHandleElement: function() {
      return document.getElementById('viewer-pane-resizer');
    },

    getViewerSidebarBounds: function(gridEl) {
      const grid = gridEl || this.getViewerGridElement();
      const minSidebarWidth = this.getViewerSidebarMinWidth();
      if (!grid) {
        return {
          minSidebarWidth: minSidebarWidth,
          maxSidebarWidth: this.getViewerSidebarDefaultWidth()
        };
      }
      const rect = grid.getBoundingClientRect();
      const hardMaxSidebarWidth = Math.round(rect.width - this.getViewerPaneResizerWidth() - this.getViewerPaneMinMainWidth());
      const preferredMaxSidebarWidth = Math.round(rect.width * 0.46);
      const maxSidebarWidth = Math.max(minSidebarWidth, Math.min(preferredMaxSidebarWidth, hardMaxSidebarWidth));

        minSidebarWidth: minSidebarWidth,
        maxSidebarWidth: maxSidebarWidth

    clampViewerSidebarWidth: function(width, gridEl) {

      const numericWidth = parseInt(width, 10);
      const fallbackWidth = parseInt(this.state.viewerSidebarWidth, 10) || this.getViewerSidebarDefaultWidth();

      return Math.max(bounds.minSidebarWidth, Math.min(bounds.maxSidebarWidth, nextWidth));

    syncViewerPaneLayout: function() {
      const grid = this.getViewerGridElement();
      if (!grid) return;
      const handle = this.getViewerPaneResizeHandleElement();
      if (this.state.page !== 'view' || !this.state.currentSong || !this.isViewerPaneResizeLandscape()) {

        const compositionAction = target.getAttribute('data-app-composition') || '';
        if (compositionAction === 'search') {
          App.startSearchComposition();
        } else if (compositionAction === 'setlist-song-search') {
          App.startSetlistSongSearchComposition();
        }
      });

      document.addEventListener('compositionend', function(event) {
        const target = event && event.target;
        if (!target || !target.matches) return;
        const compositionAction = target.getAttribute('data-app-composition') || '';
        if (compositionAction === 'search') {
          App.endSearchComposition(target);
        } else if (compositionAction === 'setlist-song-search') {
          App.endSetlistSongSearchComposition(target);
        }
      });

      function findClosestSetlistEditorIndex(clientX, clientY) {
        const list = document.querySelector('.setlist-editor-list');
        if (!list) return NaN;
        const pointTarget = typeof document.elementFromPoint === 'function' ? document.elementFromPoint(clientX, clientY) : null;
        const directItem = pointTarget && pointTarget.closest ? pointTarget.closest('.setlist-editor-item[data-setlist-editor-index]') : null;
        if (directItem) {
          const directIndex = parseInt(directItem.getAttribute('data-setlist-editor-index') || '', 10);
          if (!isNaN(directIndex)) return directIndex;
        }
        const items = Array.prototype.slice.call(list.querySelectorAll('.setlist-editor-item[data-setlist-editor-index]'));
        if (!items.length) return NaN;
        let bestItem = null;
        let bestDistance = Infinity;
        items.forEach(function(item) {
          const rect = item.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          const distance = Math.abs(clientY - centerY) + Math.abs(clientX - centerX) * 0.15;
          if (distance < bestDistance) {
            bestDistance = distance;
            bestItem = item;
          }
        });
        return bestItem ? parseInt(bestItem.getAttribute('data-setlist-editor-index') || '', 10) : NaN;
      }

      function clearSetlistDropTarget() {
        document.querySelectorAll('.setlist-editor-item.is-drop-target').forEach(function(item) {
          item.classList.remove('is-drop-target');
        });
      }

      function setSetlistDropTarget(index) {
        clearSetlistDropTarget();
        if (typeof index !== 'number' || isNaN(index)) return;
        const item = document.querySelector('.setlist-editor-item[data-setlist-editor-index="' + index + '"]');
        if (item) item.classList.add('is-drop-target');
      }

      function clearSetlistTouchPending() {
        App._setlistTouchPending = null;
      }

      function clearSetlistTouchDrag() {
        const drag = App._setlistTouchDrag;
        if (drag && drag.ghost && drag.ghost.parentNode) {
          drag.ghost.parentNode.removeChild(drag.ghost);
        }
        if (drag && drag.sourceItem) {
          drag.sourceItem.classList.remove('is-dragging');
          drag.sourceItem.classList.remove('is-touch-source');
        }
        clearSetlistDropTarget();
        clearSetlistTouchPending();
        App._setlistTouchDrag = null;
        document.body.classList.remove('is-setlist-touch-dragging');
        document.querySelectorAll('.setlist-editor-item.is-dragging').forEach(function(item) {
          item.classList.remove('is-dragging');
        });
        document.querySelectorAll('.setlist-editor-item.is-touch-source').forEach(function(item) {
          item.classList.remove('is-touch-source');
        });
      }

      function createSetlistDragGhost(item, rect) {
        const ghost = item.cloneNode(true);
        ghost.classList.remove('is-dragging');
        ghost.classList.remove('is-touch-source');
        ghost.classList.remove('is-drop-target');
        ghost.classList.add('setlist-drag-ghost');
        ghost.style.width = rect.width + 'px';
        ghost.style.height = rect.height + 'px';
        ghost.style.left = rect.left + 'px';
        ghost.style.top = rect.top + 'px';
        ghost.style.pointerEvents = 'none';
        return ghost;
      }

      function positionSetlistDragGhost(drag, clientX, clientY) {
        if (!drag || !drag.ghost) return;
        const dx = clientX - drag.startClientX;
        const dy = clientY - drag.startClientY;
        drag.ghost.style.transform = 'translate3d(' + dx + 'px, ' + dy + 'px, 0)';
      }

      function startSetlistTouchDrag(handle, item, pointerId, clientX, clientY, inputType) {
        if (!handle || !item) return false;
        if (App.state.page !== 'setlist-edit' || !App.state.setlistEditMode) return false;
        const fromIndex = parseInt(item.getAttribute('data-setlist-editor-index') || '', 10);
        if (isNaN(fromIndex)) return false;
        const rect = item.getBoundingClientRect();
        const ghost = createSetlistDragGhost(item, rect);
        document.body.appendChild(ghost);
        App._setlistTouchDrag = {
          pointerId: pointerId,
          fromIndex: fromIndex,
          overIndex: fromIndex,
          handle: handle,
          sourceItem: item,
          inputType: inputType || 'pointer',
          startClientX: clientX,
          startClientY: clientY,
          lastClientX: clientX,
          lastClientY: clientY,
          ghost: ghost
        };
        document.body.classList.add('is-setlist-touch-dragging');
        item.classList.add('is-dragging');
        item.classList.add('is-touch-source');
        setSetlistDropTarget(fromIndex);
        positionSetlistDragGhost(App._setlistTouchDrag, clientX, clientY);
        if ((inputType || 'pointer') === 'pointer' && typeof handle.setPointerCapture === 'function') {
          try { handle.setPointerCapture(pointerId); } catch (error) {}
        }
        return true;
      }

      function updateSetlistTouchDrag(pointerId, clientX, clientY) {
        const drag = App._setlistTouchDrag;
        if (!drag || pointerId !== drag.pointerId) return false;
        drag.lastClientX = clientX;
        drag.lastClientY = clientY;
        positionSetlistDragGhost(drag, clientX, clientY);
        const overIndex = findClosestSetlistEditorIndex(clientX, clientY);
        if (!isNaN(overIndex)) {
          drag.overIndex = overIndex;
          setSetlistDropTarget(overIndex);
        }
        return true;
      }

      function finishSetlistTouchDrag(pointerId, clientX, clientY) {
        const drag = App._setlistTouchDrag;
        if (!drag || pointerId !== drag.pointerId) return false;
        const fromIndex = parseInt(drag.fromIndex, 10);
        const finalClientX = typeof clientX === 'number' ? clientX : drag.lastClientX;
        const finalClientY = typeof clientY === 'number' ? clientY : drag.lastClientY;
        const fallbackIndex = findClosestSetlistEditorIndex(finalClientX, finalClientY);
        const toIndex = !isNaN(drag.overIndex) ? parseInt(drag.overIndex, 10) : fallbackIndex;
        const handle = drag.handle;
        const inputType = drag.inputType || 'pointer';
        clearSetlistTouchDrag();
        if (inputType === 'pointer' && handle && typeof handle.releasePointerCapture === 'function') {
          try { handle.releasePointerCapture(pointerId); } catch (error) {}
        }
        if (!isNaN(fromIndex) && !isNaN(toIndex) && fromIndex !== toIndex) {
          App.moveSetlistItem(fromIndex, toIndex);
        }
        return true;
      }

      function findMatchingTouch(touchList, identifier) {
        if (!touchList || typeof identifier !== 'number') return null;
        for (let i = 0; i < touchList.length; i += 1) {
          if (touchList[i] && touchList[i].identifier === identifier) return touchList[i];
        }
        return null;
      }

      document.addEventListener('pointerdown', function(event) {
        if (!event || App._setlistTouchDrag || App._setlistTouchPending) return;
        const rawTarget = event.target;
        const target = rawTarget && rawTarget.nodeType === 3 ? rawTarget.parentElement : rawTarget;
        const item = target && target.closest ? target.closest('.setlist-editor-item[data-setlist-editor-index]') : null;
        if (!item) return;
        if (target.closest && target.closest('.actions, button, input, textarea, select, a')) return;
        const isMouse = event.pointerType === 'mouse' || event.pointerType === '' || event.pointerType == null;
        if (!isMouse) return;
        const handle = target.closest && target.closest('.setlist-drag-handle') ? target.closest('.setlist-drag-handle') : item;
        if (!startSetlistTouchDrag(handle, item, event.pointerId, event.clientX, event.clientY, 'pointer')) return;
        event.preventDefault();
      }, { capture: true });

      document.addEventListener('pointermove', function(event) {
        if (!updateSetlistTouchDrag(event.pointerId, event.clientX, event.clientY)) return;
        event.preventDefault();
      }, { passive: false, capture: true });

      document.addEventListener('pointerup', function(event) {
        if (!finishSetlistTouchDrag(event.pointerId, event.clientX, event.clientY)) return;
        event.preventDefault();
      }, { passive: false, capture: true });

      document.addEventListener('pointercancel', function(event) {
        if (!finishSetlistTouchDrag(event.pointerId, event.clientX, event.clientY)) return;
        event.preventDefault();
      }, { passive: false, capture: true });

      document.addEventListener('touchstart', function(event) {
        if (!event || App._setlistTouchDrag || App._setlistTouchPending) return;
        const rawTarget = event.target;
        const target = rawTarget && rawTarget.nodeType === 3 ? rawTarget.parentElement : rawTarget;
        const item = target && target.closest ? target.closest('.setlist-editor-item[data-setlist-editor-index]') : null;
        if (!item) return;
        if (target.closest && target.closest('.actions, button, input, textarea, select, a')) return;
        const touch = event.changedTouches && event.changedTouches[0] ? event.changedTouches[0] : (event.touches && event.touches[0] ? event.touches[0] : null);
        if (!touch) return;
        App._setlistTouchPending = {
          pointerId: touch.identifier,
          item: item,
          handle: item,
          startClientX: touch.clientX,
          startClientY: touch.clientY,
          lastClientX: touch.clientX,
          lastClientY: touch.clientY
        };
      }, { passive: false, capture: true });

      document.addEventListener('touchmove', function(event) {
        const drag = App._setlistTouchDrag;
        if (drag && drag.inputType === 'touch') {
          const touch = findMatchingTouch(event.changedTouches, drag.pointerId) || findMatchingTouch(event.touches, drag.pointerId) || (event.touches && event.touches.length === 1 ? event.touches[0] : null);
          if (!touch) return;
          if (!updateSetlistTouchDrag(drag.pointerId, touch.clientX, touch.clientY)) return;
          event.preventDefault();
          return;
        }
        const pending = App._setlistTouchPending;
        if (!pending) return;
        const touch = findMatchingTouch(event.changedTouches, pending.pointerId) || findMatchingTouch(event.touches, pending.pointerId) || (event.touches && event.touches.length === 1 ? event.touches[0] : null);
        if (!touch) return;
        pending.lastClientX = touch.clientX;
        pending.lastClientY = touch.clientY;
        const dx = touch.clientX - pending.startClientX;
        const dy = touch.clientY - pending.startClientY;
        if ((dx * dx + dy * dy) < 64) return;
        if (!startSetlistTouchDrag(pending.handle, pending.item, pending.pointerId, pending.startClientX, pending.startClientY, 'touch')) {
          clearSetlistTouchPending();
          return;
        }
        updateSetlistTouchDrag(pending.pointerId, touch.clientX, touch.clientY);
        event.preventDefault();
      }, { passive: false, capture: true });

      document.addEventListener('touchend', function(event) {
        const drag = App._setlistTouchDrag;
        if (drag && drag.inputType === 'touch') {
          const touch = findMatchingTouch(event.changedTouches, drag.pointerId);
          const clientX = touch ? touch.clientX : drag.lastClientX;
          const clientY = touch ? touch.clientY : drag.lastClientY;
          if (!finishSetlistTouchDrag(drag.pointerId, clientX, clientY)) return;
          event.preventDefault();
          return;
        }
        const pending = App._setlistTouchPending;
        if (!pending) return;
        if (!findMatchingTouch(event.changedTouches, pending.pointerId)) return;
        clearSetlistTouchPending();
      }, { passive: false, capture: true });

      document.addEventListener('touchcancel', function(event) {
        const drag = App._setlistTouchDrag;
        if (drag && drag.inputType === 'touch') {
          const touch = findMatchingTouch(event.changedTouches, drag.pointerId);
          const clientX = touch ? touch.clientX : drag.lastClientX;
          const clientY = touch ? touch.clientY : drag.lastClientY;
          if (!finishSetlistTouchDrag(drag.pointerId, clientX, clientY)) return;
          event.preventDefault();
          return;
        }
        const pending = App._setlistTouchPending;
        if (!pending) return;
        if (!findMatchingTouch(event.changedTouches, pending.pointerId)) return;
        clearSetlistTouchPending();
      }, { passive: false, capture: true });

    },

    loadSongs: function(shouldRoute, callback, options) {
      if (typeof shouldRoute === 'function') {
        options = callback;
        callback = shouldRoute;
        shouldRoute = false;
      }
      if (typeof shouldRoute === 'undefined') shouldRoute = false;
      options = options || {};

      if (!options.skipBusy) this.beginBusy(options.busyMessage || 'Loading songs…');

      google.script.run
        .withSuccessHandler(function(items) {
          App.state.songs = items || [];
          App.filterSongs(false);
          google.script.run
            .withSuccessHandler(function(setlists) {
              App.state.setlists = (Array.isArray(setlists) ? setlists : []).map(normalizeSetlistForApp);

              if (shouldRoute) {
                var initialQuery = App.parseQueryFromLocation();
                if (!initialQuery.page && !initialQuery.slug && !initialQuery.id) {
                  initialQuery = window.__INITIAL_QUERY__ || {};
                }
                App.routeFromQuery(initialQuery, { skipBusy: true, endBusyOnDone: true });
                return;
              }

              if (!options.skipBusy) App.endBusy();
              if (typeof callback === 'function') callback();
            })
            .withFailureHandler(function(err) {
              App.endBusy();
              App.setStatus('error', String(err && err.message || err || 'Failed to load setlists.'));
              App.render();
            })
            .listSetlists();
        })
        .withFailureHandler(function(err) {
          App.endBusy();
          App.setStatus('error', String(err && err.message || err || 'Failed to load songs.'));
          App.render();
        })
        .listSongs();
    },

    routeFromQuery: function(query, options) {
      options = options || {};
      if (query && query.page === 'setlists') {
        this.showSetlists(options);
        return;
      }
      if (query && query.page === 'setlist-edit') {
        this.openSetlistEditor(query.id || '', options);
        return;
      }
      if (query && query.page === 'setlist-view' && query.id) {
        this.openSetlistSong(query.id, query.index || 0, Object.assign({}, options, {
          returnPage: 'songs',
          urlTranspose: query.key,
          urlNotation: query.sign
        }));
        return;
      }
      if (query && query.page === 'view' && query.slug) {
        this.openSong(query.slug, Object.assign({}, options, {
          urlTranspose: query.key,
          urlNotation: query.sign
        }));
        return;
      }
      if (query && query.page === 'edit') {
        if (query.slug) {
          this.openEditor(query.slug, options);
        } else {
          this.openEditor('', options);
        }
        return;
      }
      this.showList(options);
    },

    filterSongs: function(shouldRender, options) {
      if (typeof shouldRender === 'undefined') shouldRender = true;
      options = options || {};
      const search = String(this.state.searchText || '').trim().toLowerCase();
      if (!search) {
        this.state.filteredSongs = this.state.songs.slice();
      } else {
        this.state.filteredSongs = this.state.songs.filter(function(song) {
          const haystack = [song.title, song.artist].concat(song.tags || []).join(' ').toLowerCase();
          return haystack.indexOf(search) !== -1;
        });
      }
      if (!shouldRender) return;
      if (options.partialListUpdate && this.state.page === 'list') {
        this.updateListSearchResults();
        return;
      }
      this.render();
    },

    showList: function(options) {
      options = options || {};
      Viewer.stopAutoScroll({ skipRender: true, resetProgress: true });
      this.state.page = 'list';
      this.state.currentSong = null;
      this.state.currentSetlist = null;
      this.state.missingSetlistSong = null;
      this.state.editorReturn = null;
      this.state.setlistEditMode = false;
      this.state.playingYtIdx = null;
      if (!options.keepStatus) this.clearStatus();
      this.updateUrl({ page: 'list' });
      this.render();
      if (options.endBusyOnDone) this.endBusy();
    },

    loadSetlists: function(callback, options) {
      options = options || {};
      if (!options.skipBusy) this.beginBusy(options.busyMessage || 'Loading setlists…');
      google.script.run
        .withSuccessHandler(function(setlists) {
          App.state.setlists = (Array.isArray(setlists) ? setlists : []).map(normalizeSetlistForApp);
          if (!options.skipBusy) App.endBusy();
          if (typeof callback === 'function') callback(App.state.setlists);
        })
        .withFailureHandler(function(err) {
          App.endBusy();
          App.setStatus('error', String(err && err.message || err || 'Failed to load setlists.'));
          App.render();
        })
        .listSetlists();
    },

    showSetlists: function(options) {
      options = options || {};
      Viewer.stopAutoScroll({ skipRender: true, resetProgress: true });
      const shouldEndBusy = !options.skipBusy || options.endBusyOnDone;
      if (!options.skipBusy) this.beginBusy(options.busyMessage || 'Opening setlists…');
      this.state.page = 'setlists';
      this.state.currentSong = null;
      this.state.currentSetlist = null;
      this.state.missingSetlistSong = null;
      this.state.setlistEditMode = false;
      this.state.playingYtIdx = null;
      if (!options.keepStatus) this.clearStatus();
      this.updateUrl({ page: 'setlists' });
      this.loadSetlists(function() {
        App.render();
        if (shouldEndBusy) App.endBusy();
      }, { skipBusy: true, endBusyOnDone: shouldEndBusy });
    },

    getSongSummaryBySlug: function(slug) {
      const normalizedSlug = String(slug || '').trim();
      return (this.state.songs || []).filter(function(song) {
        return String(song && song.slug || '') === normalizedSlug;
      })[0] || null;
    },

    getSetlistSummaryById: function(id) {
      const normalizedId = String(id || '').trim();
      return (this.state.setlists || []).filter(function(setlist) {
        return String(setlist && setlist.id || '') === normalizedId;
      })[0] || null;
    },

    openSetlist: function(id, options) {
      this.openSetlistEditor(id, Object.assign({ editMode: false }, options || {}));
    },

    normalizeSetlistPlaybackContext: function(context) {
      if (!context) return null;
      return Object.assign({}, context, {
        items: normalizeSetlistItemsForApp(context.items),
        index: Math.max(0, parseInt(context.index, 10) || 0),
        title: context.title || 'Untitled setlist',
        returnPage: context.returnPage || 'songs'
      });
    },

    openSetlistSong: function(id, index, options) {
      options = options || {};
      const normalizedId = String(id || '').trim();
      const requestedIndex = Math.max(0, parseInt(index, 10) || 0);
      if (!normalizedId) {
        this.flashStatus('error', 'Setlist not found.', 2200);
        return;
      }
      if (!options.skipBusy) this.beginBusy(options.busyMessage || 'Opening setlist…');
      google.script.run
        .withSuccessHandler(function(record) {
          const setlist = normalizeSetlistForApp(record);
          if (!setlist || !setlist.id) {
            if (!options.skipBusy || options.endBusyOnDone) App.endBusy();
            App.setStatus('error', 'Setlist not found.');
            App.showSetlists({ keepStatus: true });
            return;
          }
          if (!setlist.items.length) {
            if (!options.skipBusy || options.endBusyOnDone) App.endBusy();
            App.setStatus('error', 'This setlist has no songs.');
            App.showSetlists({ keepStatus: true });
            return;
          }
          const nextIndex = Math.max(0, Math.min(setlist.items.length - 1, requestedIndex));
          const item = setlist.items[nextIndex];
          App.openSong(item.slug, {
            skipBusy: true,
            endBusyOnDone: !options.skipBusy || options.endBusyOnDone,
            urlTranspose: options.urlTranspose,
            urlNotation: options.urlNotation,
            setlistContext: {
              id: setlist.id,
              title: setlist.title,
              items: setlist.items,
              index: nextIndex,
              returnPage: options.returnPage || 'songs'
            }
          });
        })
        .withFailureHandler(function(err) {
          if (!options.skipBusy || options.endBusyOnDone) App.endBusy();
          App.setStatus('error', String(err && err.message || err || 'Failed to open setlist.'));
          App.render();
        })
        .getSetlist(normalizedId);
    },

    openSetlistSongAt: function(index, options) {
      options = options || {};
      const source = this.state.setlistEditor || this.state.currentSetlist;
      const setlist = normalizeSetlistForApp(source);
      if (!setlist.items.length) return;
      const nextIndex = Math.max(0, Math.min(setlist.items.length - 1, parseInt(index, 10) || 0));
      const item = setlist.items[nextIndex];
      this.openSong(item.slug, {
        setlistContext: {
          id: setlist.id,
          title: setlist.title || 'Untitled setlist',
          items: setlist.items,
          index: nextIndex,
          returnPage: options.returnPage || 'songs'
        }
      });
    },

    openAdjacentSetlistSong: function(delta) {
      const context = this.state.currentSetlist;
      if (!context || !Array.isArray(context.items) || !context.items.length) return;
      const nextIndex = Math.max(0, Math.min(context.items.length - 1, (parseInt(context.index, 10) || 0) + delta));
      if (nextIndex === context.index) return;
      const item = context.items[nextIndex];
      this.openSong(item.slug, {
        setlistContext: Object.assign({}, context, { index: nextIndex })
      });
    },

    showMissingSetlistSong: function(slug, options) {
      options = options || {};
      this.state.currentSong = null;
      this.state.currentSetlist = this.normalizeSetlistPlaybackContext(options.setlistContext);
      this.state.missingSetlistSong = { slug: String(slug || '').trim() };
      this.state.viewerSongControlsBaseline = null;
      this.state.page = 'view';
      this.state.playingYtIdx = null;
      this._resetViewerScrollOnNextRender = true;
      this.clearStatus();
      this.updateCurrentViewUrl();
      this.render();
      if (!options.skipBusy || options.endBusyOnDone) this.endBusy();
    },

    handleSetlistBack: function() {
      const context = this.state.currentSetlist || {};
      Viewer.stopAutoScroll({ skipRender: true, resetProgress: true });
      if ((context.returnPage === 'songs' || context.returnPage === 'edit') && context.id) {
        this.openSetlistEditor(context.id || '', { editMode: false });
        return;
      }
      this.showSetlists();
    },

    openSetlistEditor: function(id, options) {
      options = options || {};
      Viewer.stopAutoScroll({ skipRender: true, resetProgress: true });
      if (!options.keepStatus) this.clearStatus();
      const normalizedId = String(id || '').trim();
      this.state.setlistSongSearchText = '';
      this.state.setlistSongSearchDraft = '';
      this._isSetlistSongSearchComposing = false;
      this.state.setlistEditMode = !!options.editMode;
      if (!normalizedId && typeof options.editMode === 'undefined') {
        this.state.setlistEditMode = true;
      }
      if (!normalizedId) {
        this.state.setlistEditor = normalizeSetlistForApp({ title: '', items: [] });
        this.state.page = 'setlist-edit';
        this.state.currentSong = null;
        this.state.currentSetlist = null;
        this.state.missingSetlistSong = null;
        this.updateUrl({ page: 'setlist-edit' });
        this.render();
        if (options.endBusyOnDone) this.endBusy();
        return;
      }
      if (!options.skipBusy) this.beginBusy(options.busyMessage || 'Opening setlist…');
      google.script.run
        .withSuccessHandler(function(record) {
          const setlist = normalizeSetlistForApp(record);
          if (!setlist.id) {
            if (!options.skipBusy || options.endBusyOnDone) App.endBusy();
            App.setStatus('error', 'Setlist not found.');
            App.showSetlists({ keepStatus: true });
            return;
          }
          App.state.setlistEditor = setlist;
          App.state.setlistEditMode = !!options.editMode;
          App.state.page = 'setlist-edit';
          App.state.currentSong = null;
          App.state.currentSetlist = null;
          App.state.missingSetlistSong = null;
          App.updateUrl({ page: 'setlist-edit', id: setlist.id });
          App.render();
          if (!options.skipBusy || options.endBusyOnDone) App.endBusy();
        })
        .withFailureHandler(function(err) {
          if (!options.skipBusy || options.endBusyOnDone) App.endBusy();
          App.setStatus('error', String(err && err.message || err || 'Failed to open setlist.'));
          App.render();
        })

    animateViewerScrollTo: function(target, nextTop, durationMs) {
      if (!target) return;
      const finalTop = Math.max(0, nextTop || 0);
      const duration = Math.max(60, parseInt(durationMs, 10) || 140);
      const startTop = target === window
        ? (window.scrollY || window.pageYOffset || 0)
        : (target.scrollTop || 0);
      const delta = finalTop - startTop;
      if (Math.abs(delta) < 1) {
        if (target === window) window.scrollTo(0, finalTop);
        else target.scrollTop = finalTop;
        return;
      }
      const startedAt = performance.now();
      const step = function(now) {
        const progress = Math.min(1, (now - startedAt) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        const currentTop = startTop + (delta * eased);
        if (target === window) window.scrollTo(0, currentTop);
        else target.scrollTop = currentTop;
        if (progress < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    },

    scrollViewerToTop: function() {
      if (this.state.page !== 'view') return;
      if (this.state.scroll && this.state.scroll.isPlaying) {
        Viewer.pauseAutoScroll();
      }
      const pane = document.getElementById('viewer-scroll-pane');
      if (pane && pane.scrollHeight > pane.clientHeight + 1) {
        this.animateViewerScrollTo(pane, 0, 140);
        return;
      }
      this.animateViewerScrollTo(window, 0, 140);
    },

    saveCurrentSong: function() {
      const payload = this.collectEditorPayload();
      const originalSlug = String(payload.originalSlug || '').trim();
      const nextSlug = String(payload.slug || '').trim();
      const existingSong = !originalSlug && nextSlug ? this.getSongSummaryBySlug(nextSlug) : null;
      if (existingSong && !window.confirm('A song with this slug already exists. Overwrite it?')) {
        return;
      }
      this.beginBusy('Saving song…');
      google.script.run
        .withSuccessHandler(async function(result) {
          let cleanupWarning = '';
          try {
            if (result && result.slugChanged && !result.notesMigratedInStorage && result.originalSlug && result.slug && window.ChordProStorage && ChordProStorage.moveNotesSync) {
              const cleanupResult = await ChordProStorage.moveNotesSync(result.originalSlug, result.slug);
              if (cleanupResult && cleanupResult.ok === false) cleanupWarning = 'Saved, but failed to move sticky notes.';
            }
          } catch (error) {
            cleanupWarning = 'Saved, but failed to move sticky notes: ' + String(error && error.message || error);
          }
          if (cleanupWarning) {
            App.setStatus('error', cleanupWarning);
          } else {
            App.flashStatus('info', 'Saved.', 2200);
          }
          App.state.editorReturn = null;
          App.setBusyMessage('Refreshing list…');
          App.loadSongs(function() {
            App.setBusyMessage('Opening song…');
            App.openSong(result.slug, { skipBusy: true, endBusyOnDone: true, keepStatus: true });
          }, { skipBusy: true });
        })
        .withFailureHandler(function(err) {
          App.endBusy();
          App.setStatus('error', String(err && err.message || err || 'Failed to save.'));
          App.render();
        })
        .saveSong(payload);
    },

    deleteCurrentSong: function() {
      const payload = this.collectEditorPayload();
      const slug = String(payload.originalSlug || payload.slug || '').trim();
      if (!slug) {
        this.setStatus('error', 'Delete is available only for saved songs.');
        this.render();
        return;
      }
      if (!window.confirm('Delete this song? Sticky notes for this song will also be deleted. Setlists will keep a Missing song placeholder.')) return;
      this.beginBusy('Deleting song…');
      google.script.run
        .withSuccessHandler(async function(result) {
          if (!result || !result.ok) {
            App.endBusy();
            App.setStatus('error', result && result.message ? result.message : 'Failed to delete.');
            App.render();
            return;
          }
          let cleanupWarning = '';
          try {
            if (window.ChordProStorage && ChordProStorage.deleteNotesSync) {
              const cleanupResult = await ChordProStorage.deleteNotesSync(slug);
              if (cleanupResult && cleanupResult.ok === false) cleanupWarning = 'Deleted song, but failed to delete sticky notes.';
            }

            cleanupWarning = 'Deleted song, but failed to delete sticky notes: ' + String(error && error.message || error);

          if (cleanupWarning) {

          App.setBusyMessage('Refreshing list…');
          App.loadSongs(function() {
            App.showList({ endBusyOnDone: true, keepStatus: true });
          }, { skipBusy: true });
        })
        .withFailureHandler(function(err) {
          App.endBusy();
          App.setStatus('error', String(err && err.message || err || 'Failed to delete.'));
          App.render();

        .deleteSong(slug);
