    collectEditorPayload: function() {
      const titleEl = document.getElementById('edit-title');
      const artistEl = document.getElementById('edit-artist');
      const slugEl = document.getElementById('edit-slug');
      const tagsEl = document.getElementById('edit-tags');
      const originalSlugEl = document.getElementById('edit-original-slug');
      const youtubeEl = document.getElementById('edit-youtube');
      const chordProEl = document.getElementById('edit-chordpro');
      const scrollStartEl = document.getElementById('edit-scroll-start');
      const scrollEndEl = document.getElementById('edit-scroll-end');
      const scrollDurationEl = document.getElementById('edit-scroll-duration');
      const scrollStartRaw = scrollStartEl ? parseFloat(scrollStartEl.value) : 0;
      const scrollEndRaw = scrollEndEl ? parseFloat(scrollEndEl.value) : 100;
      const scrollStartPercent = Number.isFinite(scrollStartRaw) ? Math.max(0, Math.min(100, scrollStartRaw)) / 100 : 0;
      const scrollEndPercent = Number.isFinite(scrollEndRaw) ? Math.max(0, Math.min(100, scrollEndRaw)) / 100 : 1;
      const scrollDurationSec = scrollDurationEl ? Math.max(1, parseInt(scrollDurationEl.value, 10) || 240) : 240;
      const existing = this.state && this.state.editorSong ? this.state.editorSong : {};
      return {
        title: titleEl ? titleEl.value : '',
        artist: artistEl ? artistEl.value : '',
        originalSlug: originalSlugEl ? originalSlugEl.value : '',
        slug: slugEl ? slugEl.value : '',
        tags: tagsEl ? tagsEl.value : '',
        youtube: youtubeEl ? youtubeEl.value : '',
        chordPro: chordProEl ? chordProEl.value : '',
        scrollStartPercent: scrollStartPercent,
        scrollEndPercent: scrollEndPercent,
        scrollDurationSec: scrollDurationSec,
        transpose: normalizeStoredTranspose(existing.transpose, 0),
        notation: normalizeStoredNotation(existing.notation, 'default')
      };
    },

    editorInputChanged: function() {
      if (this.state.page !== 'edit') return;
      this.state.editorSong = this.collectEditorPayload();
      this.syncEditorYouTubeSearchButton();
      if (typeof Editor !== 'undefined' && typeof Editor.updateLivePreview === 'function') {
        Editor.updateLivePreview();
      }
    },

    editorChordProChanged: function() {
      const chordProEl = document.getElementById('edit-chordpro');
      if (!chordProEl) return;
      const chordPro = chordProEl.value;
      const titleValue = findChordProDirectiveValue(chordPro, ['title', 't']);
      const subtitleValue = findChordProDirectiveValue(chordPro, ['subtitle', 'st']);
      const titleEl = document.getElementById('edit-title');
      const artistEl = document.getElementById('edit-artist');
      const slugEl = document.getElementById('edit-slug');
      if (titleValue && titleEl) titleEl.value = titleValue;
      if (subtitleValue && artistEl) artistEl.value = subtitleValue;
      if (slugEl && !slugEl.value && titleValue) {
        slugEl.value = this.slugify(titleValue);
      }
      this.editorInputChanged();
    },

    slugify: function(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[\s_]+/g, '-')
        .replace(/[^a-z0-9-]/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    },

    setStatus: function(type, message) {
      if (this._statusTimer) {
        clearTimeout(this._statusTimer);
        this._statusTimer = null;
      }
      this.status = { type: type, message: message };
    },

    clearStatus: function() {
      if (this._statusTimer) {
        clearTimeout(this._statusTimer);
        this._statusTimer = null;
      }
      this.status = { type: '', message: '' };
    },

    flashStatus: function(type, message, durationMs) {
      this.setStatus(type, message);
      this.render();
      if (type === 'error' || type === 'warning') return;
      var expectedMessage = message;
      this._statusTimer = window.setTimeout(function() {
        if (App.status && App.status.message === expectedMessage) {
          App.clearStatus();
          App.render();
        }
      }, Math.max(800, parseInt(durationMs, 10) || 1800));
    },

    startSearchComposition: function() {

    endSearchComposition: function(input) {

    handleSearchInput: function(event, input) {
      this.state.searchDraft = input ? input.value : '';
      if (this._isSearchComposing || (event && (event.isComposing || event.inputType === 'insertCompositionText'))) return;
      this.changeSearch(this.state.searchDraft, { partialListUpdate: true });
    },

    handleSearchKeyDown: function(event, input) {
      if (!event) return;
      if (event.key !== 'Enter') return;
      if (this._isSearchComposing || event.isComposing || event.keyCode === 229) return;
      event.preventDefault();
      this.submitSearch(input);
    },

    submitSearch: function(input) {
      this._isSearchComposing = false;
      const value = input ? input.value : String(this.state.searchDraft || this.state.searchText || '');
      this.state.searchDraft = value;
      this.changeSearch(value, { partialListUpdate: true });
    },

    changeSearch: function(value, options) {
      options = options || {};
      this.state.searchText = value;
      this.state.searchDraft = value;
      this.filterSongs(true, { partialListUpdate: !!options.partialListUpdate });

    clearSearch: function() {
      this._isSearchComposing = false;
      this.state.searchText = '';
      this.state.searchDraft = '';
      this.filterSongs(true, { partialListUpdate: true });
      window.requestAnimationFrame(function() {
        const input = document.getElementById('list-search-input');
        if (!input) return;
        input.value = '';
        try {
          input.focus({ preventScroll: true });
        } catch (err) {
          input.focus();
        }
      });
    },

    restoreListSearchFocusIfNeeded: function() {
      const pending = this._pendingSearchFocus;
      this._pendingSearchFocus = null;
      if (!pending) return;
      window.requestAnimationFrame(function() {
        const input = document.getElementById('list-search-input');
        if (!input) return;
        input.focus({ preventScroll: true });
        const len = input.value.length;
        const start = Math.max(0, Math.min(typeof pending.start === 'number' ? pending.start : len, len));
        const end = Math.max(start, Math.min(typeof pending.end === 'number' ? pending.end : start, len));
        try {
          input.setSelectionRange(start, end);
        } catch (err) {}
      });
    },

    updateListSearchResults: function() {
      const list = document.querySelector('.song-list');
      if (!list || this.state.page !== 'list') {
        this.render();
        return;
      }
      list.innerHTML = this.renderSongListHtml(this.state.filteredSongs);
    },

    queueViewerInputFocus: function(inputId) {
      this._pendingViewerInputFocus = { id: String(inputId || '') };
    },

    restoreViewerInputFocusIfNeeded: function() {
      const pending = this._pendingViewerInputFocus;
      this._pendingViewerInputFocus = null;
      if (!pending || !pending.id) return;
      window.requestAnimationFrame(function() {
        const input = document.getElementById(pending.id);
        if (!input) return;
        try {
          input.focus({ preventScroll: true });
        } catch (err) {
          input.focus();
        }
        const len = String(input.value || '').length;
        try {
          input.setSelectionRange(len, len);
        } catch (err) {}
      });
    },

    sanitizeIntegerText: function(value, allowNegative) {
      let text = String(value || '');
      if (allowNegative) {
        text = text.replace(/[^\d-]/g, '');
        const hasLeadingMinus = text.charAt(0) === '-';
        text = (hasLeadingMinus ? '-' : '') + text.replace(/-/g, '');
      } else {
        text = text.replace(/\D+/g, '');
      }
      return text;
    },

    normalizeTransposeNumber: function(value) {
      const cleaned = this.sanitizeIntegerText(value, true);
      if (cleaned === '' || cleaned === '-') return null;
      let num = parseInt(cleaned, 10);
      if (isNaN(num)) num = 0;
      return Math.max(-11, Math.min(11, num));
    },

    normalizeMinutesNumber: function(value) {
      const cleaned = this.sanitizeIntegerText(value, false);
      if (cleaned === '') return null;
      let num = parseInt(cleaned, 10);
      if (isNaN(num)) num = 0;
      return Math.max(0, num);
    },

    normalizeSecondsNumber: function(value) {
      const cleaned = this.sanitizeIntegerText(value, false);
      if (cleaned === '') return null;
      let num = parseInt(cleaned, 10);
      if (isNaN(num)) num = 0;
      return Math.max(0, Math.min(59, num));
    },

    clearPendingObservedScrollDurationUi: function() {
      ['scroll-minutes-input', 'scroll-seconds-input'].forEach(function(id) {
        const input = document.getElementById(id);
        if (input) input.classList.remove('is-observed-pending');
      });
    },

    activatePendingObservedScrollDuration: function() {
      if (!this.state.scroll.isObservedDurationPending) return false;
      const next = Math.max(1, parseInt(this.state.scroll.pendingObservedDurationSec, 10) || 0);
      if (!next) {
        this.clearPendingObservedScrollDuration();
        return false;
      }
      this.state.scroll.durationSec = next;
      this.clearPendingObservedScrollDuration();
      return true;
    },

    clearPendingObservedScrollDuration: function() {
      this.state.scroll.pendingObservedDurationSec = null;
      this.state.scroll.isObservedDurationPending = false;
      this.clearPendingObservedScrollDurationUi();
    },

    setPendingObservedScrollDuration: function(totalSeconds) {
      const next = Math.max(1, parseInt(totalSeconds, 10) || 0);
      if (!next) return false;
      this.state.scroll.pendingObservedDurationSec = next;
      this.state.scroll.isObservedDurationPending = true;
      return true;
    },

    applyPendingObservedScrollDuration: function() {
      if (!this.state.scroll.isObservedDurationPending) return false;
      const next = Math.max(1, parseInt(this.state.scroll.pendingObservedDurationSec, 10) || 0);
      if (!next) {
        this.clearPendingObservedScrollDuration();
        return false;
      }
      this.state.scroll.durationSec = next;
      this.clearPendingObservedScrollDuration();
      return true;
    },

    getDisplayedScrollDurationSec: function() {
      if (this.state.scroll.isObservedDurationPending) {
        const pending = Math.max(1, parseInt(this.state.scroll.pendingObservedDurationSec, 10) || 0);
        if (pending) return pending;
      }
      return Math.max(1, parseInt(this.state.scroll.durationSec, 10) || 240);
    },

    getViewerSongControlsSnapshot: function() {
      const scroll = this.state.scroll || {};
      return {
        transpose: normalizeStoredTranspose(this.state.transpose, 0),
        notation: normalizeStoredNotation(this.state.notation, 'default'),
        scrollStartPercent: Math.round((parseFloat(scroll.startPercent) || 0) * 1000000) / 1000000,
        scrollEndPercent: Math.round((parseFloat(scroll.endPercent) || 0) * 1000000) / 1000000,
        scrollDurationSec: Math.max(1, parseInt(this.getDisplayedScrollDurationSec(), 10) || 240)
      };
    },

    captureViewerSongControlsBaseline: function() {
      this.state.viewerSongControlsBaseline = this.getViewerSongControlsSnapshot();
    },

    isViewerSongControlsDirty: function() {
      const baseline = this.state.viewerSongControlsBaseline;
      if (!baseline || !this.state.currentSong) return false;
      const current = this.getViewerSongControlsSnapshot();
      return current.transpose !== baseline.transpose
        || current.notation !== baseline.notation
        || current.scrollStartPercent !== baseline.scrollStartPercent
        || current.scrollEndPercent !== baseline.scrollEndPercent
        || current.scrollDurationSec !== baseline.scrollDurationSec;
    },

    syncViewerSongControlsSaveButtons: function() {
      const isDirty = this.isViewerSongControlsDirty();
      Array.from(document.querySelectorAll('.btn-save-autoscroll')).forEach(function(button) {
        button.classList.toggle('is-dirty', isDirty);
      });
    },

    handleTransposeInput: function(input) {
      if (!input) return;
      const cleaned = this.sanitizeIntegerText(input.value, true);
      if (cleaned === '' || cleaned === '-') {
        input.value = cleaned;
        return;
      }
      const num = this.normalizeTransposeNumber(cleaned);
      input.value = String(num === null ? 0 : num);
    },

    handleScrollMinutesInput: function(input) {
      if (!input) return;
      this.activatePendingObservedScrollDuration();
      const cleaned = this.sanitizeIntegerText(input.value, false);
      if (cleaned === '') {
        input.value = '';
        return;
      }
      const minutes = this.normalizeMinutesNumber(cleaned);
      input.value = String(minutes === null ? 0 : minutes);
    },

    handleScrollSecondsInput: function(input) {
      if (!input) return;
      this.activatePendingObservedScrollDuration();
      const cleaned = this.sanitizeIntegerText(input.value, false);
      if (cleaned === '') {
        input.value = '';
        return;
      }
      const seconds = this.normalizeSecondsNumber(cleaned);
      const normalizedSeconds = seconds === null ? 0 : seconds;
      input.value = String(normalizedSeconds).padStart(2, '0');
    },

    closeYouTubePlayback: function() {
      this.state.playingYtIdx = null;
      this._forceYoutubeRefresh = false;
    },

    changeTranspose: function(delta) {
      const next = Math.max(-11, Math.min(11, this.state.transpose + delta));
      this.state.transpose = next;
      this.state.transposeStr = String(next);
      if (this.state.page === 'view' && this.state.currentSong && this.state.currentSong.slug) {
        this.updateCurrentViewUrl();
      }
      this.closeYouTubePlayback();
      this.render();
    },

    commitTranspose: function(value) {
      const normalized = this.normalizeTransposeNumber(value);
      const num = normalized === null ? 0 : normalized;
      this.state.transpose = num;
      this.state.transposeStr = String(num);
      if (this.state.page === 'view' && this.state.currentSong && this.state.currentSong.slug) {
        this.updateCurrentViewUrl();
      }
      this.closeYouTubePlayback();
      this.render();
    },

    setNotation: function(value) {
      this.state.notation = normalizeStoredNotation(value, 'default');
      if (this.state.page === 'view' && this.state.currentSong && this.state.currentSong.slug) {
        this.updateCurrentViewUrl();
      }
      this.closeYouTubePlayback();
      this.render();
    },

    setFontSizeLevel: function(value) {
      let next = parseInt(value, 10);
      if (isNaN(next)) next = 3;
      this.state.fontSizeLevel = Math.max(1, Math.min(5, next));
      if (!saveStoredString(STORAGE_KEYS.fontSizeLevel, String(this.state.fontSizeLevel))) this.notifyStorageUnavailable();
      this.closeYouTubePlayback();
      this.render();
    },

    changeFontSizeLevel: function(delta) {
      this.setFontSizeLevel(this.state.fontSizeLevel + delta);
    },

    setChordSizeLevel: function(value) {
      let next = parseInt(value, 10);
      if (isNaN(next)) next = 3;
      this.state.chordSizeLevel = Math.max(1, Math.min(5, next));
      if (!saveStoredString(STORAGE_KEYS.chordSizeLevel, String(this.state.chordSizeLevel))) this.notifyStorageUnavailable();
      this.closeYouTubePlayback();
      this.render();
    },

    changeChordSizeLevel: function(delta) {
      this.setChordSizeLevel(this.state.chordSizeLevel + delta);
    },

    setLyricsFont: function(value) {
      this.state.lyricsFont = value;
      if (!saveStoredString(STORAGE_KEYS.lyricsFont, value)) this.notifyStorageUnavailable();
      this.closeYouTubePlayback();
      this.render();
    },

    setChordFont: function(value) {
      this.state.chordFont = value;
      if (!saveStoredString(STORAGE_KEYS.chordFont, value)) this.notifyStorageUnavailable();
      this.closeYouTubePlayback();
      this.render();
    },

    getLyricsFontStack: function() {
      return getFontStack('lyrics', this.state.lyricsFont);
    },

    getChordFontStack: function() {
      return getFontStack('chord', this.state.chordFont);
    },

    toggleFormatOption: function(key, checked) {
      this.state.formatOptions[key] = !!checked;
      this.state.formatOptions = normalizeFormatOptions(this.state.formatOptions);
      if (!saveStoredJson(STORAGE_KEYS.formatOptions, this.state.formatOptions)) this.notifyStorageUnavailable();
      this.closeYouTubePlayback();
      this.render();
    },

    setAccentColor: function(value) {
      this.state.accentColor = normalizeAccentColor(value);
      applyAccentColor(this.state.accentColor);
      if (!saveStoredString(STORAGE_KEYS.accentColor, this.state.accentColor)) this.notifyStorageUnavailable();
      this.closeYouTubePlayback();
      this.render();
    },

    setNoteColor: function(value) {
      this.state.noteColor = normalizeNoteColor(value);
      applyNoteColor(this.state.noteColor);
      if (!saveStoredString(STORAGE_KEYS.noteColor, this.state.noteColor)) this.notifyStorageUnavailable();
      this.closeYouTubePlayback();
      this.render();
    },

    setBpmBlinkColor: function(value) {
      this.state.formatOptions.bpmBlinkColor = normalizeBpmBlinkColor(value);
      this.state.formatOptions = normalizeFormatOptions(this.state.formatOptions);
      if (!saveStoredJson(STORAGE_KEYS.formatOptions, this.state.formatOptions)) this.notifyStorageUnavailable();
      this.closeYouTubePlayback();
      this.render();
    },

    setScrollPercent: function(which, value) {
      const num = Math.max(0, Math.min(100, parseInt(value, 10) || 0)) / 100;
      if (which === 'start') {
        this.state.scroll.startPercent = Math.min(num, this.state.scroll.endPercent);
      } else {
        this.state.scroll.endPercent = Math.max(num, this.state.scroll.startPercent);
      }
      if (typeof Viewer !== 'undefined' && typeof Viewer.handleScrollBoundsChange === 'function') {
        Viewer.handleScrollBoundsChange(which);
      }
      this.closeYouTubePlayback();
      this.render();
    },

    setScrollDuration: function(value) {
      this.clearPendingObservedScrollDuration();
      this.state.scroll.durationSec = Math.max(1, parseInt(value, 10) || 240);
      this.closeYouTubePlayback();
      this.render();
    },

    commitScrollMinutesInputValue: function(value) {
      if (this.state.scroll.isObservedDurationPending) return;
      this.setScrollMinutes(value);
    },

    setScrollMinutes: function(value) {
      this.clearPendingObservedScrollDuration();
      const normalized = this.normalizeMinutesNumber(value);
      const minutes = normalized === null ? 0 : normalized;
      const currentSeconds = Math.max(0, Math.min(59, this.getScrollSecondsValue()));
      this.state.scroll.durationSec = Math.max(1, (minutes * 60) + currentSeconds);
      this.closeYouTubePlayback();
      this.render();
    },

    stepScrollMinutes: function(delta) {
      this.activatePendingObservedScrollDuration();
      const nextMinutes = Math.max(0, this.getScrollMinutesValue() + (parseInt(delta, 10) || 0));
      this.setScrollMinutes(nextMinutes);
    },

    commitScrollSecondsInputValue: function(value) {
      if (this.state.scroll.isObservedDurationPending) return;
      this.setScrollSecondsPart(value);
    },

    setScrollSecondsPart: function(value) {
      this.clearPendingObservedScrollDuration();
      const normalized = this.normalizeSecondsNumber(value);
      const seconds = normalized === null ? 0 : normalized;
      const currentMinutes = Math.max(0, this.getScrollMinutesValue());
      this.state.scroll.durationSec = Math.max(1, (currentMinutes * 60) + seconds);
      this.closeYouTubePlayback();
      this.render();
    },

    stepScrollSecondsPart: function(delta) {
      this.activatePendingObservedScrollDuration();
      const currentTotal = Math.max(1, parseInt(this.state.scroll.durationSec, 10) || 240);
      const nextTotal = Math.max(1, currentTotal + (parseInt(delta, 10) || 0));
      this.state.scroll.durationSec = nextTotal;
      this.closeYouTubePlayback();
      this.render();
    },

    applyScrollPreset: function(totalSeconds) {
      this.clearPendingObservedScrollDuration();
      this.state.scroll.durationSec = Math.max(1, parseInt(totalSeconds, 10) || 240);
      this.closeYouTubePlayback();
      this.render();
    },

    getScrollMinutesValue: function() {
      return Math.floor(Math.max(1, parseInt(this.state.scroll.durationSec, 10) || 240) / 60);
    },

    getDisplayedScrollMinutesValue: function() {
      return Math.floor(this.getDisplayedScrollDurationSec() / 60);
    },

    getScrollSecondsValue: function() {
      return Math.max(1, parseInt(this.state.scroll.durationSec, 10) || 240) % 60;
    },

    getDisplayedScrollSecondsValue: function() {
      return this.getDisplayedScrollDurationSec() % 60;
    },

    setScrollSpeed: function(value) {
      this.state.scroll.speedMult = Math.max(0.1, parseFloat(value) || 1);
      this.closeYouTubePlayback();
      this.render();
    },

    playYouTube: function(index) {
      const song = this.state && this.state.currentSong ? this.state.currentSong : null;
      const items = song && Array.isArray(song.youtube) ? song.youtube : [];
      const item = items[index];
      if (!item) return;
      if (this.isLocalFileMode()) {
        this.closeYouTubePlayback();
        this.openYouTubeItemInNewTab(item);
        return;
      }
      this.state.playingYtIdx = index;
      this._forceYoutubeRefresh = true;
      this.render();
      this._forceYoutubeRefresh = false;
    },

    stopYouTubePlayback: function() {
      this.closeYouTubePlayback();
      this.render();
    },

    saveViewerScrollSettings: function() {
      var song = this.state.currentSong;
      if (!song || !song.slug) return;
      var savedDurationSec = this.state.scroll.durationSec;
      if (this.state.scroll.isObservedDurationPending) {
        var pending = Math.max(1, parseInt(this.state.scroll.pendingObservedDurationSec, 10) || 0);
        if (pending) savedDurationSec = pending;
      }
      savedDurationSec = Math.max(1, parseInt(savedDurationSec, 10) || 240);
      this.beginBusy('Saving song controls…');
      google.script.run
        .withSuccessHandler(function() {
          App.state.scroll.durationSec = savedDurationSec;
          App.clearPendingObservedScrollDuration();
          if (App.state.currentSong && App.state.currentSong.slug === song.slug) {
            App.state.currentSong.scrollStartPercent = App.state.scroll.startPercent;
            App.state.currentSong.scrollEndPercent = App.state.scroll.endPercent;
            App.state.currentSong.scrollDurationSec = savedDurationSec;
            App.state.currentSong.transpose = App.state.transpose;
            App.state.currentSong.notation = App.state.notation;
            App.captureViewerSongControlsBaseline();
          }
          App.endBusy();
          App.flashStatus('info', 'Song controls saved.', 2200);
        })
        .withFailureHandler(function(err) {
          App.endBusy();
          App.setStatus('error', String(err && err.message || err || 'Failed to save song controls.'));
          App.render();
        })
        .updateSongControlSettings({
          slug: song.slug,
          scrollStartPercent: App.state.scroll.startPercent,
          scrollEndPercent: App.state.scroll.endPercent,
          scrollDurationSec: savedDurationSec,
          transpose: App.state.transpose,
          notation: App.state.notation
        });
    },

    handleSongItemKey: function(event, slug) {
      const key = event && event.key;
      if (key === 'Enter' || key === ' ') {
        event.preventDefault();
        this.openSong(slug);
      }
    },

    updateUrl: function(params) {
      const query = new URLSearchParams();
      if (params && params.page && params.page !== 'list') query.set('page', params.page);
      if (params && params.slug) query.set('slug', params.slug);
      if (params && params.id) query.set('id', params.id);
      if (params && typeof params.index !== 'undefined') query.set('index', String(params.index));
      if (params && params.page === 'view' && params.slug) {
        query.set('key', String(this.state.transpose));
        query.set('sign', this.state.notation || 'default');
      }
      if (params && params.page === 'setlist-view') {
        query.set('key', String(this.state.transpose));
        query.set('sign', this.state.notation || 'default');
      }
      const nextUrl = window.location.pathname + (query.toString() ? '?' + query.toString() : '');
      if (window.location.pathname + window.location.search !== nextUrl) {
        window.history.pushState(params || {}, '', nextUrl);
      }
    },

    updateCurrentViewUrl: function() {
      if (this.state.currentSetlist && this.state.currentSetlist.id) {
        this.updateUrl({
          page: 'setlist-view',
          id: this.state.currentSetlist.id,
          index: this.state.currentSetlist.index || 0
        });
        return;
      }
      if (this.state.currentSong && this.state.currentSong.slug) {
        this.updateUrl({ page: 'view', slug: this.state.currentSong.slug });
      }
    },

    parseQueryFromLocation: function() {
      const params = new URLSearchParams(window.location.search);
      return {
        page: params.get('page') || '',
        slug: params.get('slug') || '',
        id: params.get('id') || '',
        index: params.get('index') || '',
        key: params.get('key') || '',
        sign: params.get('sign') || ''
      };
    },

    exportAllSongs: function() {
      this.beginBusy('Exporting songs…');
      ChordProStorage.getAllSongsFull()
        .then(function(songs) {
          downloadJsonFile('personal-chordpro-viewer-songs-all.json', {
            type: 'personal-chordpro-viewer-songs',
            version: 1,
            scope: 'all',
            exportedAt: new Date().toISOString(),
            songs: Array.isArray(songs) ? songs : []
          });
          App.endBusy();
          App.flashStatus('info', (songs && songs.length) ? ('Exported ' + songs.length + ' song(s).') : 'Empty song library exported.', 2200);
        })
        .catch(function(err) {
          App.endBusy();
          App.setStatus('error', String(err && err.message || err || 'Failed to export songs.'));
          App.render();
        });
    },

    normalizeGasSyncUrl: function(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      try {
        const url = new URL(raw);
        if (url.protocol !== 'https:' && url.protocol !== 'http:') return '';
        url.search = '';
        url.hash = '';
        return url.toString();
      } catch (err) {
        return '';
      }
    },

    submitGasLibrarySyncForm: function(syncUrl, songs, setlists, editPassword, targetName) {
      const form = document.createElement('form');
      form.method = 'post';
      form.action = syncUrl;
      form.target = targetName || '_self';
      form.acceptCharset = 'UTF-8';
      form.style.display = 'none';

      function appendField(name, value, isLarge) {
        const field = isLarge ? document.createElement('textarea') : document.createElement('input');
        field.name = name;
        if (!isLarge) field.type = 'hidden';
        field.value = String(value == null ? '' : value);
        if (isLarge) field.hidden = true;
        form.appendChild(field);
      }

      appendField('syncAction', 'sync-library', false);
      appendField('editPassword', editPassword || '', false);
      appendField('songsJson', JSON.stringify(Array.isArray(songs) ? songs : []), true);
      appendField('setlistsJson', JSON.stringify(Array.isArray(setlists) ? setlists : []), true);

      document.body.appendChild(form);
      form.submit();
      document.body.removeChild(form);
    },

    syncLibraryToGas: function() {
      const rememberedUrl = loadStoredString(STORAGE_KEYS.gasSyncUrl, '');
      const enteredUrl = window.prompt('Paste the GAS web app URL.', rememberedUrl);
      if (enteredUrl === null) return false;
      const syncUrl = this.normalizeGasSyncUrl(enteredUrl);
      if (!syncUrl) {
        this.flashStatus('error', 'Enter a valid GAS web app URL.', 2600);
        return false;
      }
      if (!saveStoredString(STORAGE_KEYS.gasSyncUrl, syncUrl)) this.notifyStorageUnavailable();
      const editPassword = window.prompt('If edit lock is enabled, enter the Unlock edit password. Leave blank if not used.', '');
      if (editPassword === null) return false;

      this.beginBusy('Preparing GAS sync...');
      Promise.all([
        ChordProStorage.getAllSongsFull(),
        ChordProStorage.listSetlists()
      ]).then(function(results) {
        const songs = Array.isArray(results[0]) ? results[0] : [];
        const setlists = (Array.isArray(results[1]) ? results[1] : []).map(normalizeSetlistForApp);
        App.endBusy();
        if (!window.confirm('Send ' + songs.length + ' song(s) and ' + setlists.length + ' setlist(s) to GAS? Matching slugs / ids in GAS will be overwritten, and all other GAS data will be kept.')) {
          return;
        }
        App.submitGasLibrarySyncForm(syncUrl, songs, setlists, editPassword, '_self');
      }).catch(function(err) {
        App.endBusy();
        App.setStatus('error', String(err && err.message || err || 'Failed to prepare GAS sync.'));
        App.render();
      });
      return false;
    },
    openSongLibraryImportDialog: function() {
      const input = document.getElementById('list-song-import-input');
      if (!input) {
        this.flashStatus('error', 'Song import input not found.', 2200);
        return false;
      }
      input.value = '';
      input.click();
      return false;
    },

    handleSongLibraryImportChange: function(event) {
      const input = event && event.target ? event.target : null;
      const file = input && input.files && input.files[0] ? input.files[0] : null;
      if (input) input.value = '';
      if (!file) return false;
      const reader = new FileReader();
      reader.onload = async function(loadEvent) {
        try {
          const raw = loadEvent && loadEvent.target ? String(loadEvent.target.result || '') : '';
          const payload = JSON.parse(raw);
          const songs = extractAllSongImportRecords(payload);
          const singleSong = songs.length ? null : extractSingleSongImportRecord(payload);
          if (singleSong) {
            App.state.editorSong = Object.assign({}, singleSong, { originalSlug: '' });
            App.state.page = 'edit';
            App.state.currentSong = null;
            App.state.currentSetlist = null;
            App.state.missingSetlistSong = null;
            App.updateUrl({ page: 'edit' });
            App.clearStatus();
            App.render();
            App.flashStatus('info', 'Song loaded into the editor. Save to import it.', 2600);
            return;
          }
          if (!songs.length) {
            App.flashStatus('error', 'Invalid song JSON file.', 2600);
            return;
          }
          if (!window.confirm('Import ' + songs.length + ' song(s)? Songs with the same slug will be overwritten, and all other existing songs will be kept.')) {
            return;
          }
          App.beginBusy('Importing songs…');
          ChordProStorage.importSongs(songs)
            .then(function(result) {
              App.clearStatus();
              App.loadSongs(function() {
                App.showList({ endBusyOnDone: true, keepStatus: true });
                App.flashStatus('info', 'Imported ' + ((result && result.count) || songs.length) + ' song(s).', 2400);
              }, { skipBusy: true });
            })
            .catch(function(err) {
              App.endBusy();
              App.setStatus('error', String(err && err.message || err || 'Failed to import songs.'));
              App.render();
            });
        } catch (err) {
          App.flashStatus('error', String(err && err.message || err || 'Failed to read song JSON file.'), 2600);
        }
      };
      reader.onerror = function() {
        App.flashStatus('error', 'Failed to read song JSON file.', 2600);
      };
      reader.readAsText(file);
      return false;
    },

    exportAllSetlists: function() {
      this.beginBusy('Exporting setlists…');
      ChordProStorage.listSetlists()
        .then(function(setlists) {
          downloadJsonFile('personal-chordpro-viewer-setlists-all.json', {
            type: 'personal-chordpro-viewer-setlists',
            version: 1,
            scope: 'all',
            exportedAt: new Date().toISOString(),
            setlists: (Array.isArray(setlists) ? setlists : []).map(normalizeSetlistForApp)
          });
          App.endBusy();
          App.flashStatus('info', (setlists && setlists.length) ? ('Exported ' + setlists.length + ' setlist(s).') : 'Empty setlist library exported.', 2200);
        })
        .catch(function(err) {
          App.endBusy();
          App.setStatus('error', String(err && err.message || err || 'Failed to export setlists.'));
          App.render();
        });
    },

    exportCurrentSetlist: function() {
      const setlist = normalizeSetlistForApp(this.state.setlistEditor || this.state.currentSetlist || {});
      if (!setlist.id && !setlist.title && !setlist.items.length) {
        this.flashStatus('error', 'No setlist to export.', 2200);
        return false;
      }
      const fileSlug = this.slugify(setlist.title || setlist.id || 'setlist') || 'setlist';
      downloadJsonFile('personal-chordpro-viewer-setlist-' + fileSlug + '.json', {
        type: 'personal-chordpro-viewer-setlists',
        version: 1,
        scope: 'setlist',
        exportedAt: new Date().toISOString(),
        setlist: setlist
      });
      this.flashStatus('info', 'Setlist exported.', 2200);
      return false;
    },

    openSetlistImportDialog: function() {
      const input = document.getElementById('setlist-import-input');
      if (!input) {
        this.flashStatus('error', 'Setlist import input not found.', 2200);
        return false;
      }
      input.value = '';
      input.click();
      return false;
    },

    handleSetlistImportChange: function(event) {
      const input = event && event.target ? event.target : null;
      const file = input && input.files && input.files[0] ? input.files[0] : null;
      if (input) input.value = '';
      if (!file) return false;
      const reader = new FileReader();
      reader.onload = function(loadEvent) {
        try {
          const raw = loadEvent && loadEvent.target ? String(loadEvent.target.result || '') : '';
          const payload = JSON.parse(raw);
          const setlists = extractAllSetlistImportRecords(payload);
          const singleSetlist = setlists.length ? null : extractSingleSetlistImportRecord(payload);
          if (singleSetlist) {
            App.state.setlistEditor = Object.assign({}, singleSetlist, { id: '' });
            App.state.setlistEditMode = true;
            App.state.setlistSongSearchText = '';
            App.state.setlistSongSearchDraft = '';
            App._isSetlistSongSearchComposing = false;
            App.state.page = 'setlist-edit';
            App.state.currentSong = null;
            App.state.currentSetlist = null;
            App.state.missingSetlistSong = null;
            App.updateUrl({ page: 'setlist-edit' });
            App.clearStatus();
            App.render();
            App.flashStatus('info', 'Setlist loaded into the editor. Save to import it.', 2600);
            return;
          }
          if (!setlists.length) {
            App.flashStatus('error', 'Invalid setlist JSON file.', 2600);
            return;
          }
          if (!window.confirm('Import ' + setlists.length + ' setlist(s)? Setlists with the same id will be overwritten, and all other existing setlists will be kept.')) {
            return;
          }
          App.beginBusy('Importing setlists…');
          ChordProStorage.importSetlists(setlists)
            .then(function(result) {
              App.flashStatus('info', 'Imported ' + ((result && result.count) || setlists.length) + ' setlist(s).', 2400);
              App.showSetlists({ endBusyOnDone: true, keepStatus: true });
            })
            .catch(function(err) {
              App.endBusy();
              App.setStatus('error', String(err && err.message || err || 'Failed to import setlists.'));
              App.render();
            });
        } catch (err) {
          App.flashStatus('error', String(err && err.message || err || 'Failed to read setlist JSON file.'), 2600);
        }
      };
      reader.onerror = function() {
        App.flashStatus('error', 'Failed to read setlist JSON file.', 2600);
      };
      reader.readAsText(file);
      return false;
    },

    exportCurrentEditorSong: function() {
      if (this.state.page !== 'edit') return false;
      const payload = this.collectEditorPayload();
      const hasContent = [payload.slug, payload.title, payload.artist, payload.tags, payload.youtube, payload.chordPro]
        .some(function(value) { return String(value || '').trim().length > 0; });
      if (!hasContent) {
        this.flashStatus('error', 'Nothing to export on this edit page.', 2200);
        return false;
      }
      const fileSlug = String(payload.slug || payload.originalSlug || payload.title || 'song')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9-]+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '') || 'song';
      downloadJsonFile('personal-chordpro-viewer-song-' + fileSlug + '.json', {
        type: 'personal-chordpro-viewer-songs',
        version: 1,
        scope: 'song',
        exportedAt: new Date().toISOString(),
        song: payload
      });
      this.flashStatus('info', 'Song exported.', 2000);
      return false;
    },

    render: function() {
      const app = document.getElementById('app');
      if (!app) return;

      const shouldResetViewerScroll = !!this._resetViewerScrollOnNextRender;
      const prevViewerScrollTop = this.state.page === 'view' && !shouldResetViewerScroll
        ? (function() {
            if (typeof Viewer !== 'undefined' && typeof Viewer.getRenderScrollTop === 'function') {
              const viewerScrollTop = Viewer.getRenderScrollTop();
              if (typeof viewerScrollTop === 'number' && isFinite(viewerScrollTop)) return viewerScrollTop;
            }
            const pane = document.getElementById('viewer-scroll-pane');
            if (pane) {
              const overflowY = window.getComputedStyle(pane).overflowY;
              const canPaneScroll = overflowY !== 'visible' && overflowY !== 'clip' && pane.scrollHeight > pane.clientHeight + 1;
              if (canPaneScroll) return pane.scrollTop || 0;
            }
            const scrollRoot = document.scrollingElement || document.documentElement || document.body;
            return scrollRoot ? (scrollRoot.scrollTop || 0) : 0;
          })()
        : 0;
      const prevSidebarScrollTop = this.state.page === 'view' && !shouldResetViewerScroll
        ? ((document.getElementById('viewer-sidebar-scroll') || {}).scrollTop || 0)
        : 0;
      const prevSongSlug = this.state.page === 'view' && this.state.currentSong
        ? String(this.state.currentSong.slug || '')
        : '';
      const shouldPreserveYouTubePanel = !shouldResetViewerScroll
        && !this._forceYoutubeRefresh
        && this.state.page === 'view'
        && !!this.state.currentSong
        && this.state.playingYtIdx !== null;
      const preservedYouTubePanel = shouldPreserveYouTubePanel
        ? document.getElementById('viewer-youtube-panel')
        : null;
      if (preservedYouTubePanel && preservedYouTubePanel.parentNode) {
        preservedYouTubePanel.parentNode.removeChild(preservedYouTubePanel);
      }

      applyAccentColor(this.state.accentColor);
      applyNoteColor(this.state.noteColor);
      document.body.classList.toggle('view-mode-body', this.state.page === 'view');
      document.body.classList.toggle('edit-mode-body', this.state.page === 'edit');
      document.body.classList.toggle('list-mode-body', this.state.page === 'list' || this.state.page === 'setlists' || this.state.page === 'setlist-edit');

      try {
        if (this.state.page === 'edit') {
          this._viewerRerenderInProgress = false;
          this._resetViewerScrollOnNextRender = false;
          app.innerHTML = Editor.render(this.state.editorSong);
          if (typeof applyPersonalChordProViewerTypography === 'function') applyPersonalChordProViewerTypography(app);
          this.syncEditorYouTubeSearchButton();
          return;
        }

        if (this.state.page === 'setlists') {
          this._viewerRerenderInProgress = false;
          this._resetViewerScrollOnNextRender = false;
          app.innerHTML = this.renderSetlistsPage();
          this.syncViewerPaneLayout();
          if (typeof applyPersonalChordProViewerTypography === 'function') applyPersonalChordProViewerTypography(app);
          return;
        }

        if (this.state.page === 'setlist-edit') {
          this._viewerRerenderInProgress = false;
          this._resetViewerScrollOnNextRender = false;
          app.innerHTML = this.renderSetlistEditorPage();
          this.syncViewerPaneLayout();
          if (typeof applyPersonalChordProViewerTypography === 'function') applyPersonalChordProViewerTypography(app);
          return;
        }

        if (this.state.page === 'view' && this.state.currentSetlist && this.state.missingSetlistSong) {
          this._viewerRerenderInProgress = false;
          this._resetViewerScrollOnNextRender = false;
          app.innerHTML = this.renderMissingSetlistSongPage();
          this.syncViewerPaneLayout();
          if (typeof applyPersonalChordProViewerTypography === 'function') applyPersonalChordProViewerTypography(app);
          return;
        }

        if (this.state.page === 'view' && this.state.currentSong) {
          this._viewerRerenderInProgress = true;
          app.innerHTML = Viewer.render(this.state.currentSong);
          if (
            preservedYouTubePanel
            && prevSongSlug
            && prevSongSlug === String(this.state.currentSong.slug || '')
          ) {
            const nextYouTubePanel = document.getElementById('viewer-youtube-panel');
            if (nextYouTubePanel && nextYouTubePanel.parentNode) {
              nextYouTubePanel.parentNode.replaceChild(preservedYouTubePanel, nextYouTubePanel);
            }
          }
          if (typeof applyPersonalChordProViewerTypography === 'function') applyPersonalChordProViewerTypography(app);
          if (typeof Viewer !== 'undefined' && typeof Viewer.afterRender === 'function') {
            window.requestAnimationFrame(function() {
              try {
                Viewer.afterRender({
                  viewerScrollTop: prevViewerScrollTop,
                  sidebarScrollTop: prevSidebarScrollTop
                });
              } catch (err) {
                console.error('Viewer.afterRender failed:', err);
              }
              App.syncViewerPaneLayout();
              App._viewerRerenderInProgress = false;
              App._resetViewerScrollOnNextRender = false;
              App.restoreViewerInputFocusIfNeeded();
            });
          } else {
            this.syncViewerPaneLayout();
            this._viewerRerenderInProgress = false;
            this._resetViewerScrollOnNextRender = false;
            this.restoreViewerInputFocusIfNeeded();
          }
          return;
        }

        this._viewerRerenderInProgress = false;
        this._resetViewerScrollOnNextRender = false;
        app.innerHTML = this.renderListPage();
        this.syncViewerPaneLayout();
        if (typeof applyPersonalChordProViewerTypography === 'function') applyPersonalChordProViewerTypography(app);
        this.restoreListSearchFocusIfNeeded();
      } catch (err) {
        this._viewerRerenderInProgress = false;
        console.error('App.render failed:', err);
        app.innerHTML = '<div class="shell"><div class="status-box error">Render failed: ' + escapeHtml(String(err && err.message || err || 'Unknown error')) + '</div></div>';
      }
    },

    renderSongDetailHtml: function(song) {
      song = song || {};
      const tags = (song.tags || []).map(function(tag) {
        return '<span class="tag">' + escapeHtml(tag) + '</span>';
      }).join('');
      return '<div class="song-detail-row"><p>' + escapeHtml(song.artist || '') + '</p>' + (tags ? '<div class="tag-row tag-row-inline">' + tags + '</div>' : '') + '</div>';
    },

    renderSongListHtml: function(songs) {
      songs = Array.isArray(songs) ? songs : [];

        return [
          '<div class="song-item song-item-clickable" role="button" tabindex="0" data-song-slug="' + escapeHtml(song.slug) + '">',
            '<div class="song-meta">',
              '<div class="song-title-row">',
                '<h3>' + escapeHtml(song.title) + '</h3>',
              '</div>',
              App.renderSongDetailHtml(song),
            '</div>',
          '</div>'
        ].join('');
      }).join('') : '<div class="empty-state panel">No songs yet.</div>';

            '<div class="title-block"><h1>Setlists</h1></div>',
            '<div class="actions setlists-topbar-actions">',
              '<button class="btn setlists-back-btn" data-app-action="show-list">← Songs</button>',
              '<button class="btn" data-app-action="export-all-setlists">Export all</button>',

          '</div>',

    renderSetlistEditorItemsHtml: function(setlist, options) {
      options = options || {};
      const isEditing = !!options.editMode;
      const items = normalizeSetlistItemsForApp(setlist && setlist.items);
      if (!items.length) return '<div class="empty-state panel">No songs in this setlist yet.</div>';
      return items.map(function(item, index) {
        const song = App.getSongSummaryBySlug(item.slug);
        const title = song ? song.title : '(Missing song)';
        const artist = song ? song.artist : ('slug: ' + (item.slug || '(unknown)'));
        if (!isEditing) {
          return [
            '<div class="song-item setlist-songs-item' + (song ? ' setlist-song-click" role="button" tabindex="0" data-setlist-play-index="' + index : '') + '">',
              '<div class="setlist-row-number">' + (index + 1) + '</div>',
              '<div class="song-meta">',
                '<div class="song-title-row"><h3>' + escapeHtml(title) + '</h3></div>',
                '<p>' + escapeHtml(artist) + '</p>',
              '</div>',
            '</div>'
          ].join('');
        }
        return [
          '<div class="song-item setlist-editor-item" data-setlist-editor-index="' + index + '">',
            '<div class="setlist-row-number">' + (index + 1) + '</div>',
            '<div class="setlist-drag-handle" aria-hidden="true">☰</div>',
            '<div class="song-meta">',
              '<div class="song-title-row"><h3>' + escapeHtml(title) + '</h3></div>',
              '<p>' + escapeHtml(artist) + '</p>',
            '</div>',
            '<div class="actions">',
              '<button class="btn danger" type="button" data-app-action="remove-setlist-item" data-app-index="' + index + '">Delete</button>',
            '</div>',
          '</div>'
        ].join('');
      }).join('');
    },

    renderSetlistAddSongResultsHtml: function() {
      const query = String(this.state.setlistSongSearchText || '').trim().toLowerCase();
      const songs = (this.state.songs || []).filter(function(song) {
        if (!query) return true;
        const haystack = [song.title, song.artist].concat(song.tags || []).join(' ').toLowerCase();
        return haystack.indexOf(query) !== -1;
      }).slice(0, 20);
      return songs.length ? songs.map(function(song) {
        return [
          '<div class="song-item">',
            '<div class="song-meta">',
              '<div class="song-title-row"><h3>' + escapeHtml(song.title) + '</h3></div>',
              App.renderSongDetailHtml(song),
            '</div>',
            '<div class="actions">',
              '<button class="btn" type="button" data-app-action="add-song-to-setlist" data-song-slug="' + escapeHtml(song.slug) + '">Add</button>',
            '</div>',
          '</div>'
        ].join('');
      }).join('') : '<div class="empty-state panel">No matching songs.</div>';
    },

          '<div class="topbar">',
            '<div class="title-block"><h1>Setlist Songs</h1></div>',

          '<div class="panel pad">',

                ? '<label class="field-wrap"><span>Title *</span><input class="field" id="setlist-title-input" value="' + escapeHtml(setlist.title) + '" data-app-input="setlist-title"></label>'
                : '<div class="song-header setlist-summary-row"><div><h2>' + escapeHtml(setlist.title || 'Untitled setlist') + '</h2><p>' + setlist.items.length + ' song' + (setlist.items.length === 1 ? '' : 's') + '</p></div><div class="actions setlist-summary-actions"><button class="btn primary setlist-start-btn" data-app-action="start-setlist">Start</button></div></div>',

    renderSetlistPlaybackBar: function() {
      const context = this.state.currentSetlist;
      if (!context || !Array.isArray(context.items) || !context.items.length) return '';
      const index = Math.max(0, Math.min(context.items.length - 1, parseInt(context.index, 10) || 0));
      const hasNext = index < context.items.length - 1;
      const nextItem = hasNext ? context.items[index + 1] : null;
      const nextSong = nextItem ? this.getSongSummaryBySlug(nextItem.slug) : null;
      const nextTitle = nextSong ? (nextSong.title || nextItem.slug || 'Untitled song') : (nextItem && nextItem.slug ? nextItem.slug : '(Missing song)');
      const nextButtonLabel = hasNext
        ? '<span class="setlist-playbar-next-prefix">Next:</span><span class="setlist-playbar-next-title">' + escapeHtml(nextTitle) + '</span>'
        : 'End';
      return [
        '<div class="setlist-playbar">',
          '<button class="btn" type="button" data-app-action="setlist-back">← Back</button>',
          '<div class="setlist-playbar-title">' + escapeHtml(context.title || 'Untitled setlist') + '</div>',
          '<div class="setlist-playbar-controls">',
            '<div class="setlist-playbar-count">' + (index + 1) + ' / ' + context.items.length + '</div>',
            '<button class="btn" type="button" data-app-action="setlist-prev"' + (index <= 0 ? ' disabled' : '') + '>Prev</button>',
            '<button class="btn setlist-playbar-next" type="button" data-app-action="setlist-next"' + (!hasNext ? ' disabled' : '') + '>' + nextButtonLabel + '</button>',
          '</div>',
        '</div>'
      ].join('');
    },

    escapeJs: function(text) {
      return String(text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");

  };

  if (window.history && 'scrollRestoration' in window.history) {
    window.history.scrollRestoration = 'manual';
  }

  window.addEventListener('DOMContentLoaded', function() {
    window.scrollTo(0, 0);
    App.init();
  });

  window.addEventListener('popstate', function() {
    App.routeFromQuery(App.parseQueryFromLocation());
  });
</script>

  </body>
</html>
