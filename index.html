    <script>
  (function() {
    const DB_NAME = 'personal_chordpro_viewer_static_v1';
    const DB_VERSION = 2;
    const SONGS_STORE = 'songs';
    const NOTES_STORE = 'notes';
    const SETLISTS_STORE = 'setlists';

    window.__PCV_FONT_PRESETS__ = window.__PCV_FONT_PRESETS__ || [
      { label: 'LINE Seed JP', value: 'lineseedjp', stack: '"LINE Seed JP", sans-serif' },
      { label: 'Noto Sans JP', value: 'notosansjp', stack: '"Noto Sans JP", sans-serif' },
      { label: 'M PLUS Rounded 1c', value: 'mplusrounded1c', stack: '"M PLUS Rounded 1c", sans-serif' },
      { label: 'Inter', value: 'inter', stack: 'Inter, "LINE Seed JP", sans-serif' },
      { label: 'Atkinson Hyperlegible', value: 'atkinsonhyperlegible', stack: '"Atkinson Hyperlegible", "LINE Seed JP", sans-serif' },
      { label: 'Zen Old Mincho', value: 'zenoldmincho', stack: '"Zen Old Mincho", serif' },
      { label: 'Source Serif 4', value: 'sourceserif4', stack: '"Source Serif 4", "LINE Seed JP", serif' },
      { label: 'Lora', value: 'lora', stack: '"Lora", "LINE Seed JP", serif' },
      { label: 'Klee One', value: 'kleeone', stack: '"Klee One", cursive' },
      { label: 'Comic Neue', value: 'comicneue', stack: '"Comic Neue", "LINE Seed JP", cursive' },
      { label: 'JetBrains Mono', value: 'jetbrainsmono', stack: '"JetBrains Mono", "LINE Seed JP", monospace' },
      { label: 'IBM Plex Mono', value: 'ibmplexmono', stack: '"IBM Plex Mono", "LINE Seed JP", monospace' },
      { label: 'Space Mono', value: 'spacemono', stack: '"Space Mono", "LINE Seed JP", monospace' },
      { label: 'MuseJazz Text', value: 'musejazztextlocal', stack: '"MuseJazz Text Local", "JetBrains Mono", "LINE Seed JP", monospace' }
    ];
    const DEFAULT_FONTS = window.__PCV_FONT_PRESETS__;

    function cloneValue(value) {
      return value == null ? value : JSON.parse(JSON.stringify(value));
    }

    function normalizeStoredPercent(value, fallback) {
      var num = parseFloat(value);
      if (!isFinite(num)) num = parseFloat(fallback);
      if (!isFinite(num)) num = 0;
      return Math.max(0, Math.min(1, num));
    }

    function normalizeStoredDuration(value, fallback) {
      var num = parseInt(value, 10);
      if (!isFinite(num) || num < 1) num = parseInt(fallback, 10);
      if (!isFinite(num) || num < 1) num = 240;
      return num;
    }

    function normalizeStoredTranspose(value, fallback) {
      var num = parseInt(value, 10);
      if (!isFinite(num)) num = parseInt(fallback, 10);
      if (!isFinite(num)) num = 0;
      return Math.max(-11, Math.min(11, num));
    }

    function normalizeStoredNotation(value, fallback) {
      var text = String(value || '').trim();
      if (text === 'sharp' || text === 'flat' || text === 'default') return text;
      text = String(fallback || '').trim();
      if (text === 'sharp' || text === 'flat' || text === 'default') return text;
      return 'default';
    }

    window.__PCV_SHARED_NORMALIZERS__ = window.__PCV_SHARED_NORMALIZERS__ || {};
    window.__PCV_SHARED_NORMALIZERS__.normalizeStoredTranspose = normalizeStoredTranspose;
    window.__PCV_SHARED_NORMALIZERS__.normalizeStoredNotation = normalizeStoredNotation;

    function buildSlug(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[\s_]+/g, '-')
        .replace(/[^a-z0-9-]/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function parseTags(value) {
      if (Array.isArray(value)) {
        return value.map(function(v) { return String(v || '').trim(); }).filter(Boolean);
      }
      return String(value || '')
        .split(/[\n,]/)
        .map(function(v) { return String(v || '').trim(); })
        .filter(Boolean);
    }

    function parseYouTubeTime(value) {
      var text = String(value || '').trim();
      if (!text) return 0;
      if (/^\d+$/.test(text)) return parseInt(text, 10);
      var total = 0;
      var hours = text.match(/(\d+)h/);
      var mins = text.match(/(\d+)m/);
      var secs = text.match(/(\d+)s/);
      if (hours) total += parseInt(hours[1], 10) * 3600;
      if (mins) total += parseInt(mins[1], 10) * 60;
      if (secs) total += parseInt(secs[1], 10);
      return total || parseInt(text, 10) || 0;
    }

    function isValidYouTubeVideoId(value) {
      return /^[A-Za-z0-9_-]{11}$/.test(String(value || '').trim());
    }

    function parseOneYouTubeLine(line) {
      const raw = String(line || '').trim();
      if (!raw) return null;
      var videoId = '';
      var start = 0;
      if (/^https?:\/\//i.test(raw)) {
        videoId = extractYouTubeId(raw);
        var timeMatch = raw.match(/[?&](?:t|start)=([^&#]+)/i);
        if (timeMatch) start = parseYouTubeTime(timeMatch[1]);
      } else {
        var parts = raw.split(/[?&]/);
        videoId = parts[0].trim();
        for (var i = 1; i < parts.length; i++) {
          if (/^(t|start)=/.test(parts[i])) {
            start = parseYouTubeTime(parts[i].split('=')[1]);
            break;
          }
        }
      }
      videoId = String(videoId || '').trim();
      if (!isValidYouTubeVideoId(videoId)) {
        throw new Error('Invalid YouTube link or video ID: ' + raw);
      }
      return { id: videoId, start: Math.max(0, start || 0) };
    }

    function parseYouTubeInput(value) {
      return String(value || '')
        .split(/\n/)
        .filter(function(line) { return String(line || '').trim(); })
        .map(function(line) { return parseOneYouTubeLine(line); });
    }

    function extractTitleArtistFromChordPro(content) {
      var titleMatch = findChordProDirectiveValue(content, ['title', 't']);
      var subtitleMatch = findChordProDirectiveValue(content, ['subtitle', 'st']);
      return {
        title: titleMatch,
        artist: subtitleMatch
      };
    }

    function normalizeSongPayload(payload) {
      const source = payload || {};
      const title = String(source.title || '').trim();
      const artist = String(source.artist || '').trim();
      const chordPro = String(source.chordPro || '');
      const extracted = extractTitleArtistFromChordPro(chordPro);
      const finalTitle = title || extracted.title || '';
      const finalArtist = artist || extracted.artist || '';
      return {
        originalSlug: buildSlug(source.originalSlug || ''),
        slug: buildSlug(source.slug || finalTitle),
        title: finalTitle,
        artist: finalArtist,
        tags: Array.isArray(source.tags) ? source.tags.map(String) : parseTags(source.tags),
        youtube: Array.isArray(source.youtube) ? source.youtube : parseYouTubeInput(source.youtube),
        chordPro: chordPro,
        createdAt: String(source.createdAt || ''),
        updatedAt: String(source.updatedAt || ''),
        scrollStartPercent: Math.max(0, Math.min(1, parseFloat(source.scrollStartPercent))),
        scrollEndPercent: Math.max(0, Math.min(1, parseFloat(source.scrollEndPercent))),
        scrollDurationSec: Math.max(1, parseInt(source.scrollDurationSec, 10) || 240),
        transpose: normalizeStoredTranspose(source.transpose, 0),
        notation: normalizeStoredNotation(source.notation, 'default')
      };
    }

    function generateSetlistId() {
      return 'setlist-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
    }

    function normalizeSetlistItems(items) {
      const source = Array.isArray(items) ? items : [];
      return source.map(function(item) {
        const slug = typeof item === 'string'
          ? String(item || '').trim()
          : String(item && item.slug || '').trim();
        if (!slug) return null;
        const itemId = typeof item === 'object' && item
          ? String(item.itemId || '').trim()
          : '';
        return {
          itemId: itemId || ('item-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8)),
          slug: slug
        };
      }).filter(Boolean);
    }

    function mergeNoteLists(primary, secondary) {
      const merged = [];
      const seen = Object.create(null);
      [primary, secondary].forEach(function(list) {
        (Array.isArray(list) ? list : []).forEach(function(note) {
          if (!note) return;
          const copy = cloneValue(note);
          const id = String(copy.id || '').trim();
          if (id) {
            if (seen[id]) return;
            seen[id] = true;
          }
          merged.push(copy);
        });
      });
      return merged;
    }

    function notesFromEntry(entry) {
      return entry && Array.isArray(entry.notes) ? cloneValue(entry.notes) : [];
    }

    function normalizeSetlistPayload(payload) {
      const source = payload || {};
      return {
        id: String(source.id || '').trim(),
        title: String(source.title || '').trim(),
        items: normalizeSetlistItems(source.items),
        createdAt: String(source.createdAt || ''),
        updatedAt: String(source.updatedAt || '')
      };
    }

    function validateSetlist(setlist) {
      if (!setlist.title) throw new Error('Setlist title is required.');
    }

    function validateSong(song) {
      if (!song.slug) {
        if (song.title) {
          throw new Error('Slug is required. For non-Latin titles, please enter a slug using lowercase letters, numbers, and hyphens.');
        }
        throw new Error('Slug is required.');
      }
      if (!song.title) throw new Error('Title is required.');
      if (!song.artist) throw new Error('Artist is required.');
      if (!song.chordPro || !song.chordPro.trim()) throw new Error('ChordPro is required.');
      if (!/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(song.slug)) {
        throw new Error('Slug must contain only lowercase letters, numbers, and hyphens.');
      }
    }

    function normalizeYouTubeSelection(value) {
      var list = [];
      if (Array.isArray(value)) {
        list = value;
      } else if (value && typeof value === 'object') {
        list = [value];
      } else if (typeof value === 'string') {
        list = parseYouTubeInput(value);
      } else {
        return [];
      }
      return list.map(function(item) {
        var rawId = '';
        if (item && typeof item === 'object') {
          if (item.id && typeof item.id === 'object') {
            rawId = item.id.videoId || item.id.id || item.id.value || '';
          } else {
            rawId = item.id || item.videoId || item.youtubeId || item.url || '';
          }
        } else {
          rawId = item;
        }
        var id = extractYouTubeId(rawId);
        return {
          id: id,
          start: Math.max(0, parseInt(item && item.start, 10) || 0)
        };
      }).filter(function(item) { return !!item.id; });
    }

    function extractYouTubeId(value) {
      if (value && typeof value === 'object') {
        value = value.videoId || value.id || value.value || '';
      }
      var text = String(value || '').trim();
      if (!text) return '';
      var match = text.match(/[?&]v=([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      match = text.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      match = text.match(/embed\/([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      match = text.match(/shorts\/([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      match = text.match(/live\/([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      if (/^[A-Za-z0-9_-]{11}$/.test(text)) return text;
      return '';
    }

    const ChordProStorage = {
      _db: null,
      _readyPromise: null,
      _noteCache: Object.create(null),

      ready: function() {
        if (!this._readyPromise) {
          this._readyPromise = this._openAndWarm();
        }
        return this._readyPromise;
      },

      _openAndWarm: async function() {
        this._db = await this._openDb();
        await this._loadAllNotesIntoCache();
        return this._db;
      },

      _openDb: function() {
        return new Promise(function(resolve, reject) {
          if (!window.indexedDB) {
            reject(new Error('IndexedDB is not available in this browser.'));
            return;
          }
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = function(event) {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(SONGS_STORE)) {
              const songs = db.createObjectStore(SONGS_STORE, { keyPath: 'slug' });
              songs.createIndex('updatedAt', 'updatedAt', { unique: false });
              songs.createIndex('title', 'title', { unique: false });
            }
            if (!db.objectStoreNames.contains(NOTES_STORE)) {
              db.createObjectStore(NOTES_STORE, { keyPath: 'slug' });
            }
            if (!db.objectStoreNames.contains(SETLISTS_STORE)) {
              const setlists = db.createObjectStore(SETLISTS_STORE, { keyPath: 'id' });
              setlists.createIndex('updatedAt', 'updatedAt', { unique: false });
              setlists.createIndex('title', 'title', { unique: false });
            }
          };
          request.onsuccess = function() { resolve(request.result); };
          request.onerror = function() { reject(request.error || new Error('Failed to open IndexedDB.')); };
        });
      },

      _txStore: function(storeName, mode) {
        const tx = this._db.transaction(storeName, mode || 'readonly');
        return tx.objectStore(storeName);
      },

      _requestToPromise: function(request) {
        return new Promise(function(resolve, reject) {
          request.onsuccess = function() { resolve(request.result); };
          request.onerror = function() { reject(request.error || new Error('IndexedDB request failed.')); };
        });
      },

      _loadAllNotesIntoCache: async function() {
        this._noteCache = Object.create(null);
        const store = this._txStore(NOTES_STORE, 'readonly');
        const rows = await this._requestToPromise(store.getAll());
        (Array.isArray(rows) ? rows : []).forEach((entry) => {
          const slug = String(entry && entry.slug || '').trim();
          if (!slug) return;
          this._noteCache[slug] = Array.isArray(entry && entry.notes) ? cloneValue(entry.notes) : [];
        });
      },

      getAppConfig: async function() {
        await this.ready();
        return {
          appUrl: window.location.protocol === 'file:'
            ? String(window.location.href || '').split('#')[0].split('?')[0]
            : String(window.location.origin || '') + String(window.location.pathname || ''),
          fonts: cloneValue(DEFAULT_FONTS)
        };
      },

      listSongs: async function() {
        await this.ready();
        const store = this._txStore(SONGS_STORE, 'readonly');
        const rows = await this._requestToPromise(store.getAll());
        return (Array.isArray(rows) ? rows : [])
          .filter(function(song) { return !!(song && song.slug); })
          .map(function(song) {
            return {
              slug: song.slug,
              title: song.title,
              artist: song.artist,
              tags: Array.isArray(song.tags) ? cloneValue(song.tags) : [],
              updatedAt: song.updatedAt || '',
              createdAt: song.createdAt || ''
            };
          })
          .sort(function(a, b) {
            return String(b.updatedAt || '').localeCompare(String(a.updatedAt || ''));
          });
      },

      getSong: async function(slug) {
        await this.ready();
        const normalizedSlug = String(slug || '').trim();
        if (!normalizedSlug) return null;
        const store = this._txStore(SONGS_STORE, 'readonly');
        const found = await this._requestToPromise(store.get(normalizedSlug));
        return found ? cloneValue(found) : null;
      },

      getAllSongsFull: async function() {
        await this.ready();
        const store = this._txStore(SONGS_STORE, 'readonly');
        const rows = await this._requestToPromise(store.getAll());
        return (Array.isArray(rows) ? rows : [])
          .filter(function(song) { return !!(song && song.slug); })
          .map(function(song) {
            const record = cloneValue(song);
            record.scrollStartPercent = normalizeStoredPercent(record.scrollStartPercent, 0);
            record.scrollEndPercent = normalizeStoredPercent(record.scrollEndPercent, 1);
            record.scrollDurationSec = normalizeStoredDuration(record.scrollDurationSec, 240);
            record.transpose = normalizeStoredTranspose(record.transpose, 0);
            record.notation = normalizeStoredNotation(record.notation, 'default');
            return record;
          })
          .sort(function(a, b) {
            return String(a.slug || '').localeCompare(String(b.slug || ''));
          });
      },

      importSongs: async function(records) {
        await this.ready();
        const source = Array.isArray(records) ? records : [];
        const existingRows = await this._requestToPromise(this._txStore(SONGS_STORE, 'readonly').getAll());
        const existingBySlug = Object.create(null);
        (Array.isArray(existingRows) ? existingRows : []).forEach(function(record) {
          if (record && record.slug) existingBySlug[String(record.slug)] = record;
        });
        const seen = Object.create(null);
        const normalizedRecords = source.map(function(item) {
          const normalized = normalizeSongPayload(item || {});
          validateSong(normalized);
          if (seen[normalized.slug]) {
            throw new Error('Duplicate slug in import file: ' + normalized.slug);
          }
          seen[normalized.slug] = true;
          const existing = existingBySlug[normalized.slug] || null;
          const createdAt = String(item && item.createdAt || (existing && existing.createdAt) || normalized.createdAt || new Date().toISOString());
          const updatedAt = String(item && item.updatedAt || normalized.updatedAt || createdAt || new Date().toISOString());
          return {
            slug: normalized.slug,
            title: normalized.title,
            artist: normalized.artist,
            tags: Array.isArray(normalized.tags) ? cloneValue(normalized.tags) : [],
            youtube: Array.isArray(normalized.youtube) ? cloneValue(normalized.youtube) : [],
            chordPro: normalized.chordPro,
            createdAt: createdAt,
            updatedAt: updatedAt,
            scrollStartPercent: normalizeStoredPercent(normalized.scrollStartPercent, 0),
            scrollEndPercent: normalizeStoredPercent(normalized.scrollEndPercent, 1),
            scrollDurationSec: normalizeStoredDuration(normalized.scrollDurationSec, 240),
            transpose: normalizeStoredTranspose(normalized.transpose, 0),
            notation: normalizeStoredNotation(normalized.notation, 'default')
          };
        });
        const tx = this._db.transaction(SONGS_STORE, 'readwrite');
        const store = tx.objectStore(SONGS_STORE);
        normalizedRecords.forEach(function(record) {
          store.put(record);
        });
        await new Promise(function(resolve, reject) {
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function() { reject(tx.error || new Error('Failed to import songs.')); };
          tx.onabort = function() { reject(tx.error || new Error('Failed to import songs.')); };
        });
        return { ok: true, count: normalizedRecords.length };
      },

      saveSong: async function(payload) {
        await this.ready();
        const song = normalizeSongPayload(payload);
        validateSong(song);
        const originalSlug = String(song.originalSlug || '').trim();
        const tx = this._db.transaction([SONGS_STORE, SETLISTS_STORE, NOTES_STORE], 'readwrite');
        const songStore = tx.objectStore(SONGS_STORE);
        const setlistStore = tx.objectStore(SETLISTS_STORE);
        const notesStore = tx.objectStore(NOTES_STORE);
        const existingByOriginal = originalSlug ? await this._requestToPromise(songStore.get(originalSlug)) : null;
        const existingBySlug = await this._requestToPromise(songStore.get(song.slug));
        if (existingByOriginal && existingBySlug && existingByOriginal.slug !== existingBySlug.slug) {
          throw new Error('Slug already exists.');
        }
        const existing = existingByOriginal || existingBySlug;
        const now = new Date().toISOString();
        const record = {
          slug: song.slug,
          title: song.title,
          artist: song.artist,
          tags: Array.isArray(song.tags) ? cloneValue(song.tags) : [],
          youtube: Array.isArray(song.youtube) ? cloneValue(song.youtube) : [],
          chordPro: song.chordPro,
          createdAt: existing && existing.createdAt ? existing.createdAt : (song.createdAt || now),
          updatedAt: now,
          scrollStartPercent: normalizeStoredPercent(song.scrollStartPercent, 0),
          scrollEndPercent: normalizeStoredPercent(song.scrollEndPercent, 1),
          scrollDurationSec: normalizeStoredDuration(song.scrollDurationSec, 240),
          transpose: normalizeStoredTranspose(song.transpose, 0),
          notation: normalizeStoredNotation(song.notation, 'default')
        };
        const slugChanged = !!(originalSlug && originalSlug !== song.slug && existingByOriginal);
        let setlistRefsUpdated = 0;
        let migratedNotes = null;
        if (slugChanged) {
          const setlists = await this._requestToPromise(setlistStore.getAll());
          (Array.isArray(setlists) ? setlists : []).forEach(function(setlist) {
            const items = normalizeSetlistItems(setlist && setlist.items);
            let changed = false;
            const nextItems = items.map(function(item) {
              if (item.slug !== originalSlug) return item;
              changed = true;
              setlistRefsUpdated += 1;
              return Object.assign({}, item, { slug: song.slug });
            });
            if (changed) {
              setlistStore.put(Object.assign({}, setlist, { items: nextItems, updatedAt: now }));
            }
          });
          const oldNotesEntry = await this._requestToPromise(notesStore.get(originalSlug));
          if (oldNotesEntry) {
            const newNotesEntry = await this._requestToPromise(notesStore.get(song.slug));
            migratedNotes = mergeNoteLists(notesFromEntry(oldNotesEntry), notesFromEntry(newNotesEntry));
            if (migratedNotes.length) notesStore.put({ slug: song.slug, notes: cloneValue(migratedNotes) });
            else notesStore.delete(song.slug);
            notesStore.delete(originalSlug);
          }
        }
        if (originalSlug && originalSlug !== song.slug && existingByOriginal) {
          songStore.delete(originalSlug);
        }
        songStore.put(record);
        await new Promise(function(resolve, reject) {
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function() { reject(tx.error || new Error('Failed to save song.')); };
          tx.onabort = function() { reject(tx.error || new Error('Failed to save song.')); };
        });
        if (slugChanged && migratedNotes) {
          if (migratedNotes.length) this._noteCache[song.slug] = cloneValue(migratedNotes);
          else delete this._noteCache[song.slug];
          delete this._noteCache[originalSlug];
        }
        return {
          ok: true,
          slug: song.slug,
          originalSlug: originalSlug,
          slugChanged: slugChanged,
          setlistRefsUpdated: setlistRefsUpdated,
          notesMigratedInStorage: slugChanged
        };
      },

      deleteSong: async function(slug) {
        await this.ready();
        const normalizedSlug = String(slug || '').trim();
        if (!normalizedSlug) return { ok: false, message: 'Song not found.' };
        const tx = this._db.transaction([SONGS_STORE, NOTES_STORE], 'readwrite');
        const songStore = tx.objectStore(SONGS_STORE);
        const notesStore = tx.objectStore(NOTES_STORE);
        const existing = await this._requestToPromise(songStore.get(normalizedSlug));
        if (!existing) {
          tx.abort();
          return { ok: false, message: 'Song not found.' };
        }
        notesStore.delete(normalizedSlug);
        songStore.delete(normalizedSlug);
        await new Promise(function(resolve, reject) {
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function() { reject(tx.error || new Error('Failed to delete song.')); };
          tx.onabort = function() { reject(tx.error || new Error('Failed to delete song.')); };
        });
        delete this._noteCache[normalizedSlug];
        return { ok: true, notesDeleted: true };
      },

      updateSongControlSettings: async function(payload) {
        await this.ready();
        const source = payload || {};
        const slug = String(source.slug || '').trim();
        if (!slug) throw new Error('Slug is required.');
        const tx = this._db.transaction(SONGS_STORE, 'readwrite');
        const store = tx.objectStore(SONGS_STORE);
        const song = await this._requestToPromise(store.get(slug));
        if (!song) {
          tx.abort();
          return { ok: false, message: 'Song not found.' };
        }
        song.scrollStartPercent = normalizeStoredPercent(source.scrollStartPercent, song.scrollStartPercent);
        song.scrollEndPercent = normalizeStoredPercent(source.scrollEndPercent, song.scrollEndPercent);
        song.scrollDurationSec = normalizeStoredDuration(source.scrollDurationSec, song.scrollDurationSec);
        song.transpose = normalizeStoredTranspose(source.transpose, song.transpose);
        song.notation = normalizeStoredNotation(source.notation, song.notation);
        song.updatedAt = new Date().toISOString();
        store.put(song);
        await new Promise(function(resolve, reject) {
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function() { reject(tx.error || new Error('Failed to save song controls.')); };
          tx.onabort = function() { reject(tx.error || new Error('Failed to save song controls.')); };
        });
        return { ok: true, slug: song.slug };
      },

      updateSongScrollSettings: async function(payload) {
        return this.updateSongControlSettings(payload);
      },

      updateSongYouTubeSelection: async function(payload) {
        await this.ready();
        const source = payload || {};
        const slug = String(source.slug || '').trim();
        if (!slug) throw new Error('Slug is required.');
        const youtube = normalizeYouTubeSelection(source.youtube);
        if (!youtube.length) throw new Error('YouTube selection is required.');
        const tx = this._db.transaction(SONGS_STORE, 'readwrite');
        const store = tx.objectStore(SONGS_STORE);
        const song = await this._requestToPromise(store.get(slug));
        if (!song) {
          tx.abort();
          return { ok: false, message: 'Song not found.' };
        }
        song.youtube = cloneValue(youtube);
        song.updatedAt = new Date().toISOString();
        store.put(song);
        await new Promise(function(resolve, reject) {
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function() { reject(tx.error || new Error('Failed to save YouTube link.')); };
          tx.onabort = function() { reject(tx.error || new Error('Failed to save YouTube link.')); };
        });
        return { ok: true, slug: song.slug, youtube: cloneValue(song.youtube) };
      },

      listSetlists: async function() {
        await this.ready();
        const store = this._txStore(SETLISTS_STORE, 'readonly');
        const rows = await this._requestToPromise(store.getAll());
        return (Array.isArray(rows) ? rows : [])
          .filter(function(setlist) { return !!(setlist && setlist.id); })
          .map(function(setlist) {
            return {
              id: setlist.id,
              title: setlist.title,
              items: normalizeSetlistItems(setlist.items),
              createdAt: setlist.createdAt || '',
              updatedAt: setlist.updatedAt || ''
            };
          })
          .sort(function(a, b) {
            return String(b.updatedAt || '').localeCompare(String(a.updatedAt || ''));
          });
      },

      getSetlist: async function(id) {
        await this.ready();
        const normalizedId = String(id || '').trim();
        if (!normalizedId) return null;
        const store = this._txStore(SETLISTS_STORE, 'readonly');
        const found = await this._requestToPromise(store.get(normalizedId));
        return found ? Object.assign({}, cloneValue(found), { items: normalizeSetlistItems(found.items) }) : null;
      },

      saveSetlist: async function(payload) {
        await this.ready();
        const setlist = normalizeSetlistPayload(payload);
        validateSetlist(setlist);
        const id = setlist.id || generateSetlistId();
        const tx = this._db.transaction(SETLISTS_STORE, 'readwrite');
        const store = tx.objectStore(SETLISTS_STORE);
        const existing = await this._requestToPromise(store.get(id));
        const now = new Date().toISOString();
        const record = {
          id: id,
          title: setlist.title,
          items: normalizeSetlistItems(setlist.items),
          createdAt: existing && existing.createdAt ? existing.createdAt : (setlist.createdAt || now),
          updatedAt: now
        };
        store.put(record);
        await new Promise(function(resolve, reject) {
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function() { reject(tx.error || new Error('Failed to save setlist.')); };
          tx.onabort = function() { reject(tx.error || new Error('Failed to save setlist.')); };
        });
        return { ok: true, id: id };
      },

      importSetlists: async function(records) {
        await this.ready();
        const source = Array.isArray(records) ? records : [];
        const existingRows = await this._requestToPromise(this._txStore(SETLISTS_STORE, 'readonly').getAll());
        const existingById = Object.create(null);
        (Array.isArray(existingRows) ? existingRows : []).forEach(function(record) {
          if (record && record.id) existingById[String(record.id)] = record;
        });
        const seen = Object.create(null);
        const normalizedRecords = source.map(function(item) {
          const normalized = normalizeSetlistPayload(item || {});
          validateSetlist(normalized);
          const id = normalized.id || generateSetlistId();
          if (seen[id]) {
            throw new Error('Duplicate setlist id in import file: ' + id);
          }
          seen[id] = true;
          const existing = existingById[id] || null;
          const now = new Date().toISOString();
          return {
            id: id,
            title: normalized.title,
            items: normalizeSetlistItems(normalized.items),
            createdAt: item && item.createdAt || (existing && existing.createdAt) || normalized.createdAt || now,
            updatedAt: item && item.updatedAt || normalized.updatedAt || now
          };
        });
        const tx = this._db.transaction(SETLISTS_STORE, 'readwrite');
        const store = tx.objectStore(SETLISTS_STORE);
        normalizedRecords.forEach(function(record) {
          store.put(record);
        });
        await new Promise(function(resolve, reject) {
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function() { reject(tx.error || new Error('Failed to import setlists.')); };
          tx.onabort = function() { reject(tx.error || new Error('Failed to import setlists.')); };
        });
        return { ok: true, count: normalizedRecords.length };
      },

      deleteSetlist: async function(id) {
        await this.ready();
        const normalizedId = String(id || '').trim();
        if (!normalizedId) return { ok: false, message: 'Setlist not found.' };
        const tx = this._db.transaction(SETLISTS_STORE, 'readwrite');
        const store = tx.objectStore(SETLISTS_STORE);
        const existing = await this._requestToPromise(store.get(normalizedId));
        if (!existing) {
          tx.abort();
          return { ok: false, message: 'Setlist not found.' };
        }
        store.delete(normalizedId);
        await new Promise(function(resolve, reject) {
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function() { reject(tx.error || new Error('Failed to delete setlist.')); };
          tx.onabort = function() { reject(tx.error || new Error('Failed to delete setlist.')); };
        });
        return { ok: true };
      },

      loadNotesSync: function(slug) {
        const normalizedSlug = String(slug || '').trim();
        if (!normalizedSlug) return [];
        return Array.isArray(this._noteCache[normalizedSlug]) ? cloneValue(this._noteCache[normalizedSlug]) : [];
      },

      writeNotesSync: async function(slug, notes, options) {
        const normalizedSlug = String(slug || '').trim();
        if (!normalizedSlug) {
          return { ok: false, error: new Error('Missing song slug.') };
        }
        options = options || {};
        const keepEmptyNoteIds = Object.create(null);
        (Array.isArray(options.keepEmptyNoteIds) ? options.keepEmptyNoteIds : []).forEach(function(noteId) {
          const normalizedId = String(noteId || '').trim();
          if (normalizedId) keepEmptyNoteIds[normalizedId] = true;
        });
        const normalized = (Array.isArray(notes) ? cloneValue(notes) : []).filter(function(note) {
          return note && (String(note.text || '').length > 0 || !!keepEmptyNoteIds[String(note.id || '').trim()]);
        });
        try {
          await this.ready();
          const tx = this._db.transaction(NOTES_STORE, 'readwrite');
          const store = tx.objectStore(NOTES_STORE);
          if (!normalized.length) store.delete(normalizedSlug);
          else store.put({ slug: normalizedSlug, notes: cloneValue(normalized) });
          await new Promise(function(resolve, reject) {
            tx.oncomplete = function() { resolve(); };
            tx.onerror = function() { reject(tx.error || new Error('Failed to persist notes.')); };
            tx.onabort = function() { reject(tx.error || new Error('Failed to persist notes.')); };
          });
          if (!normalized.length) delete this._noteCache[normalizedSlug];
          else this._noteCache[normalizedSlug] = normalized;
          return { ok: true, count: normalized.length };
        } catch (error) {
          console.error('Failed to persist notes:', error);
          return { ok: false, error: error };
        }
      },

      moveNotesSync: async function(oldSlug, newSlug) {
        const fromSlug = String(oldSlug || '').trim();
        const toSlug = String(newSlug || '').trim();
        if (!fromSlug || !toSlug || fromSlug === toSlug) return { ok: true, moved: false };
        try {
          await this.ready();
          const tx = this._db.transaction(NOTES_STORE, 'readwrite');
          const store = tx.objectStore(NOTES_STORE);
          const oldEntry = await this._requestToPromise(store.get(fromSlug));
          if (!oldEntry) return { ok: true, moved: false };
          const newEntry = await this._requestToPromise(store.get(toSlug));
          const merged = mergeNoteLists(notesFromEntry(oldEntry), notesFromEntry(newEntry));
          if (merged.length) store.put({ slug: toSlug, notes: cloneValue(merged) });
          else store.delete(toSlug);
          store.delete(fromSlug);
          await new Promise(function(resolve, reject) {
            tx.oncomplete = function() { resolve(); };
            tx.onerror = function() { reject(tx.error || new Error('Failed to move notes.')); };
            tx.onabort = function() { reject(tx.error || new Error('Failed to move notes.')); };
          });
          if (merged.length) this._noteCache[toSlug] = cloneValue(merged);
          else delete this._noteCache[toSlug];
          delete this._noteCache[fromSlug];
          return { ok: true, moved: true, count: merged.length };
        } catch (error) {
          console.error('Failed to move notes:', error);
          return { ok: false, error: error };
        }
      },

      deleteNotesSync: async function(slug) {
        const normalizedSlug = String(slug || '').trim();
        if (!normalizedSlug) return { ok: true, deleted: false };
        try {
          await this.ready();
          const tx = this._db.transaction(NOTES_STORE, 'readwrite');
          const store = tx.objectStore(NOTES_STORE);
          store.delete(normalizedSlug);
          await new Promise(function(resolve, reject) {
            tx.oncomplete = function() { resolve(); };
            tx.onerror = function() { reject(tx.error || new Error('Failed to delete notes.')); };
            tx.onabort = function() { reject(tx.error || new Error('Failed to delete notes.')); };
          });
          delete this._noteCache[normalizedSlug];
          return { ok: true, deleted: true };
        } catch (error) {
          console.error('Failed to delete notes:', error);
          return { ok: false, error: error };
        }
      },

      getAllNoteEntriesSync: function() {
        return Object.keys(this._noteCache)
          .map((slug) => ({ slug: slug, notes: Array.isArray(this._noteCache[slug]) ? cloneValue(this._noteCache[slug]) : [] }))
          .filter(function(entry) { return entry.slug; })
          .sort(function(a, b) { return a.slug.localeCompare(b.slug); });
      }
    };

    function createRunProxy(successHandler, failureHandler) {
      const runner = {
        withSuccessHandler: function(handler) { return createRunProxy(handler, failureHandler); },
        withFailureHandler: function(handler) { return createRunProxy(successHandler, handler); }
      };
      function attach(name, fn) {
        runner[name] = function() {
          const args = Array.prototype.slice.call(arguments);
          Promise.resolve()
            .then(function() { return fn.apply(ChordProStorage, args); })
            .then(function(result) { if (typeof successHandler === 'function') successHandler(result); })
            .catch(function(error) {
              if (typeof failureHandler === 'function') failureHandler(error);
              else console.error(error);
            });
        };
      }
      attach('getAppConfig', ChordProStorage.getAppConfig);
      attach('listSongs', ChordProStorage.listSongs);
      attach('getSong', ChordProStorage.getSong);
      attach('getAllSongsFull', ChordProStorage.getAllSongsFull);
      attach('importSongs', ChordProStorage.importSongs);
      attach('saveSong', ChordProStorage.saveSong);
      attach('deleteSong', ChordProStorage.deleteSong);
      attach('updateSongControlSettings', ChordProStorage.updateSongControlSettings);
      attach('updateSongScrollSettings', ChordProStorage.updateSongScrollSettings);
      attach('updateSongYouTubeSelection', ChordProStorage.updateSongYouTubeSelection);
      attach('listSetlists', ChordProStorage.listSetlists);
      attach('getSetlist', ChordProStorage.getSetlist);
      attach('saveSetlist', ChordProStorage.saveSetlist);
      attach('importSetlists', ChordProStorage.importSetlists);
      attach('deleteSetlist', ChordProStorage.deleteSetlist);
      return runner;
    }

    window.ChordProStorage = ChordProStorage;
    window.google = window.google || {};
    window.google.script = window.google.script || {};
    Object.defineProperty(window.google.script, 'run', {
      configurable: true,
      enumerable: true,
      get: function() { return createRunProxy(null, null); }
    });
    window.__INITIAL_QUERY__ = {};
  })();

      ' data-lyrics-font="', escapeHtml(encodeDataValue(lyricsFont)), '"',

  function applyPersonalChordProViewerTypography(container) {
    const scope = container || document;
    const roots = scope.querySelectorAll ? scope.querySelectorAll('.cw-renderer') : [];

    async function importCurrentSongNotesPayload(payload) {
      const song = getCurrentSong();
      if (!song || !song.slug) {
        setSongNoteStatus('error', 'No current song to import into.');
        return;
      }
      const record = extractSongNoteImportRecord(payload);
      if (!record) {
        setSongNoteStatus('error', 'Invalid song note JSON file.');
        return;
      }
      if (record.slug && record.slug !== String(song.slug)) {
        setSongNoteStatus('error', 'This note file is for a different song slug: ' + record.slug);
        return;
      }
      if (!window.confirm('Replace notes for this song with ' + record.notes.length + ' imported note(s)?')) {
        return;
      }
      const result = await writeSongNotesForSlug(song.slug, record.notes);
      if (!result.ok) {
        setSongNoteStatus('error', String(result.error && result.error.message || result.error || 'Failed to import song notes.'));
        return;
      }
      refreshCurrentSongNotesAfterImport();
      setSongNoteStatus('info', 'Song notes imported.');
    }

    async function importAllSongNotesPayload(payload) {
      const records = extractAllSongNoteImportRecords(payload);
      if (!records.length) {
        setSongNoteStatus('error', 'Invalid all-song note JSON file.');
        return;
      }
      const allSongs = window.ChordProStorage && typeof window.ChordProStorage.listSongs === 'function'
        ? await window.ChordProStorage.listSongs()
        : [];
      const existingSlugMap = Object.create(null);
      (Array.isArray(allSongs) ? allSongs : []).forEach(function(song) {
        const slug = String(song && song.slug || '').trim();
        if (slug) existingSlugMap[slug] = true;
      });
      const validRecords = records.filter(function(record) {
        return !!existingSlugMap[String(record && record.slug || '').trim()];
      });
      const missingSlugs = records.filter(function(record) {
        return !existingSlugMap[String(record && record.slug || '').trim()];
      }).map(function(record) {
        return String(record && record.slug || '').trim();
      });
      if (!validRecords.length) {
        setSongNoteStatus(
          'error',
          missingSlugs.length
            ? ('No matching songs were found. Nothing was imported. Missing slug(s): ' + missingSlugs.join(', '))
            : 'No matching songs were found. Nothing was imported.'
        );
        return;
      }
      const backups = validRecords.map(function(record) {
        return {
          slug: record.slug,
          notes: loadSongNotesForSlug(record.slug)
        };
      });
      const totalNotes = validRecords.reduce(function(sum, record) {
        return sum + record.notes.length;
      }, 0);
      let confirmMessage = 'Import notes for ' + validRecords.length + ' existing song(s) and replace their existing notes?';
      if (missingSlugs.length) {
        confirmMessage += '\n\nThese slug(s) do not exist and will be skipped:\n- ' + missingSlugs.join('\n- ');
      }
      if (!window.confirm(confirmMessage)) {
        return;
      }
      for (let i = 0; i < validRecords.length; i += 1) {
        const result = await writeSongNotesForSlug(validRecords[i].slug, validRecords[i].notes);
        if (!result.ok) {
          for (let j = 0; j < backups.length; j += 1) {
            await writeSongNotesForSlug(backups[j].slug, backups[j].notes);
          }
          setSongNoteStatus('error', String(result.error && result.error.message || result.error || 'Failed to import all notes.'));
          return;
        }
      }
      const currentSong = getCurrentSong();
      if (currentSong && currentSong.slug && validRecords.some(function(record) { return record.slug === String(currentSong.slug); })) {
        refreshCurrentSongNotesAfterImport();
      } else {
        toggleNoteCreateMode(false);
      }
      let statusMessage = 'Imported ' + totalNotes + ' note(s) for ' + validRecords.length + ' song(s).';
      if (missingSlugs.length) {
        statusMessage += ' Skipped missing slug(s): ' + missingSlugs.join(', ') + '.';
      }
      setSongNoteStatus(missingSlugs.length ? 'warning' : 'info', statusMessage);
    }

    function handleSongNoteImportChange(event, scope) {
      const input = event && event.target ? event.target : null;
      const file = input && input.files && input.files[0] ? input.files[0] : null;
      const requestedScope = scope || (input ? String(input.getAttribute('data-import-scope') || 'auto') : 'auto');
      if (input) {
        input.value = '';
        input.removeAttribute('data-import-scope');
      }
      if (!file) return false;
      commitActiveSongNote();
      const reader = new FileReader();
      reader.onload = async function(loadEvent) {
        try {
          const raw = loadEvent && loadEvent.target ? String(loadEvent.target.result || '') : '';
          const payload = JSON.parse(raw);
          if (requestedScope === 'all') {
            importAllSongNotesPayload(payload);
            return;
          }
          if (requestedScope === 'song') {
            importCurrentSongNotesPayload(payload);
            return;
          }
          const songRecord = extractSongNoteImportRecord(payload);
          if (songRecord) {
            importCurrentSongNotesPayload(payload);
            return;
          }
          const allRecords = extractAllSongNoteImportRecords(payload);
          if (allRecords.length) {
            importAllSongNotesPayload(payload);
            return;
          }
          setSongNoteStatus('error', 'Invalid note JSON file.');
        } catch (err) {
          setSongNoteStatus('error', String(err && err.message || err || 'Failed to read note JSON file.'));
        }
      };
      reader.onerror = function() {
        setSongNoteStatus('error', 'Failed to read note JSON file.');
      };
      reader.readAsText(file);
      return false;
    }

      const noteId = noteElement && noteElement.dataset ? (noteElement.dataset.noteId || '') : '';
      if (!noteId) return false;
      if (event && event.cancelable) event.preventDefault();
      if (event && event.stopPropagation) event.stopPropagation();
      openSongNoteEditor(noteId, { focusText: true });
      return false;
    }

    function focusSongNoteTextarea() {
      if (!noteFocusPending) return;
      const textarea = document.getElementById('viewer-note-textarea');
      if (!textarea) return;
      noteFocusPending = false;
      textarea.focus();
      textarea.setSelectionRange(textarea.value.length, textarea.value.length);
    }

    function getSongNoteAnchorClass(note) {
      return '';
    }

    function getSongNoteInlineStyle(note, stage) {
      const pixelPosition = getSongNotePixelPosition(note, stage);
      return 'left:' + pixelPosition.leftPx + 'px;top:' + pixelPosition.topPx + 'px;width:' + note.widthPx + 'px;height:' + note.heightPx + 'px;--viewer-note-font-size:calc(var(--viewer-note-base-size, 1.16rem) * ' + getSongNoteFontSizeFactor(note).toFixed(2) + ');';
    }

    function renderSongNoteDisplayCard(note, stage) {

            '<button type="button" class="viewer-note-action-btn viewer-note-action-font" data-note-action="font-up" data-note-id="' + escapeHtml(note.id) + '" title="Larger note text" aria-label="Larger note text">A+</button>',
            '<span class="viewer-note-action-spacer" aria-hidden="true"></span>',

          '<div class="viewer-note-card-body" data-note-drag="card" data-note-id="' + escapeHtml(note.id) + '" title="Drag note" data-note-dblclick="1">' + (safeText || '<span class="viewer-note-card-empty">Note</span>') + '</div>',
          '<button type="button" class="viewer-note-resize-handle" data-note-resize="card" data-note-id="' + escapeHtml(note.id) + '" title="Resize note" aria-label="Resize note"></button>',
        '</div>'
