  <body>
    <div id="app">
      <div class="loading-screen">Loading…</div>
    </div>
    <div id="busy-overlay" class="busy-overlay hidden" aria-live="polite" aria-busy="true">
      <div class="busy-dialog panel">

    <script>
  (function() {
    const DB_NAME = 'personal_chordpro_viewer_static_v1';
    const DB_VERSION = 1;
    const SONGS_STORE = 'songs';
    const NOTES_STORE = 'notes';

    const DEFAULT_FONTS = [
      { label: 'BIZ UDGothic', value: 'bizudgothic', stack: '"BIZ UDGothic", sans-serif' },
      { label: 'IBM Plex Sans JP', value: 'ibmplexsansjp', stack: '"IBM Plex Sans JP", sans-serif' },
      { label: 'M PLUS Rounded 1c', value: 'mplusrounded1c', stack: '"M PLUS Rounded 1c", sans-serif' },
      { label: 'JetBrains Mono', value: 'jetbrainsmono', stack: '"JetBrains Mono", "BIZ UDGothic", monospace' },
      { label: 'IBM Plex Mono', value: 'ibmplexmono', stack: '"IBM Plex Mono", "BIZ UDGothic", monospace' },
      { label: 'Zen Old Mincho', value: 'zenoldmincho', stack: '"Zen Old Mincho", serif' },
      { label: 'Kaisei Decol', value: 'kaiseidecol', stack: '"Kaisei Decol", serif' },
      { label: 'Klee One', value: 'kleeone', stack: '"Klee One", cursive' },
      { label: 'Yusei Magic', value: 'yuseimagic', stack: '"Yusei Magic", sans-serif' }
    ];

    function cloneValue(value) {
      return value == null ? value : JSON.parse(JSON.stringify(value));
    }

    function normalizeStoredPercent(value, fallback) {
      var num = parseFloat(value);
      if (!isFinite(num)) num = parseFloat(fallback);
      if (!isFinite(num)) num = 0;
      return Math.max(0, Math.min(1, num));
    }

    function normalizeStoredDuration(value, fallback) {
      var num = parseInt(value, 10);
      if (!isFinite(num) || num < 1) num = parseInt(fallback, 10);
      if (!isFinite(num) || num < 1) num = 240;
      return num;
    }

    function buildSlug(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[\s_]+/g, '-')
        .replace(/[^a-z0-9-]/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function parseTags(value) {
      if (Array.isArray(value)) {
        return value.map(function(v) { return String(v || '').trim(); }).filter(Boolean);
      }
      return String(value || '')
        .split(/[\n,]/)
        .map(function(v) { return String(v || '').trim(); })
        .filter(Boolean);
    }

    function parseYouTubeTime(value) {
      var text = String(value || '').trim();
      if (!text) return 0;
      if (/^\d+$/.test(text)) return parseInt(text, 10);
      var total = 0;
      var hours = text.match(/(\d+)h/);
      var mins = text.match(/(\d+)m/);
      var secs = text.match(/(\d+)s/);
      if (hours) total += parseInt(hours[1], 10) * 3600;
      if (mins) total += parseInt(mins[1], 10) * 60;
      if (secs) total += parseInt(secs[1], 10);
      return total || parseInt(text, 10) || 0;
    }

    function isValidYouTubeVideoId(value) {
      return /^[A-Za-z0-9_-]{11}$/.test(String(value || '').trim());
    }

    function parseOneYouTubeLine(line) {
      const raw = String(line || '').trim();
      if (!raw) return null;
      var videoId = '';
      var start = 0;
      if (/^https?:\/\//i.test(raw)) {
        var shortMatch = raw.match(/youtu\.be\/([^?&#]+)/i);
        var watchMatch = raw.match(/[?&]v=([^&#]+)/i);
        videoId = shortMatch ? shortMatch[1] : (watchMatch ? watchMatch[1] : '');
        var timeMatch = raw.match(/[?&](?:t|start)=([^&#]+)/i);
        if (timeMatch) start = parseYouTubeTime(timeMatch[1]);
      } else {
        var parts = raw.split(/[?&]/);
        videoId = parts[0].trim();
        for (var i = 1; i < parts.length; i++) {
          if (/^(t|start)=/.test(parts[i])) {
            start = parseYouTubeTime(parts[i].split('=')[1]);
            break;
          }
        }
      }
      videoId = String(videoId || '').trim();
      if (!isValidYouTubeVideoId(videoId)) {
        throw new Error('Invalid YouTube link or video ID: ' + raw);
      }
      return { id: videoId, start: Math.max(0, start || 0) };
    }

    function parseYouTubeInput(value) {
      return String(value || '')
        .split(/\n/)
        .filter(function(line) { return String(line || '').trim(); })
        .map(function(line) { return parseOneYouTubeLine(line); });
    }

    function extractTitleArtistFromChordPro(content) {
      var text = String(content || '');
      var titleMatch = text.match(/\{(?:title|t):\s*([^}]+)\}/i);
      var subtitleMatch = text.match(/\{(?:subtitle|st):\s*([^}]+)\}/i);
      return {
        title: titleMatch ? titleMatch[1].trim() : '',
        artist: subtitleMatch ? subtitleMatch[1].trim() : ''
      };
    }

    function normalizeSongPayload(payload) {
      const source = payload || {};
      const title = String(source.title || '').trim();
      const artist = String(source.artist || '').trim();
      const chordPro = String(source.chordPro || '');
      const extracted = extractTitleArtistFromChordPro(chordPro);
      const finalTitle = title || extracted.title || '';
      const finalArtist = artist || extracted.artist || '';
      return {
        originalSlug: buildSlug(source.originalSlug || ''),
        slug: buildSlug(source.slug || finalTitle),
        title: finalTitle,
        artist: finalArtist,
        tags: Array.isArray(source.tags) ? source.tags.map(String) : parseTags(source.tags),
        youtube: Array.isArray(source.youtube) ? source.youtube : parseYouTubeInput(source.youtube),
        chordPro: chordPro,
        createdAt: String(source.createdAt || ''),
        updatedAt: String(source.updatedAt || ''),
        scrollStartPercent: Math.max(0, Math.min(1, parseFloat(source.scrollStartPercent))),
        scrollEndPercent: Math.max(0, Math.min(1, parseFloat(source.scrollEndPercent))),
        scrollDurationSec: Math.max(1, parseInt(source.scrollDurationSec, 10) || 240)
      };
    }

    function validateSong(song) {
      if (!song.slug) {
        if (song.title) {
          throw new Error('Slug is required. For non-Latin titles, please enter a slug using lowercase letters, numbers, and hyphens.');
        }
        throw new Error('Slug is required.');
      }
      if (!song.title) throw new Error('Title is required.');
      if (!song.artist) throw new Error('Artist is required.');
      if (!song.chordPro || !song.chordPro.trim()) throw new Error('ChordPro is required.');
      if (!/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(song.slug)) {
        throw new Error('Slug must contain only lowercase letters, numbers, and hyphens.');
      }
    }

    function normalizeYouTubeSelection(value) {
      var list = [];
      if (Array.isArray(value)) {
        list = value;
      } else if (value && typeof value === 'object') {
        list = [value];
      } else if (typeof value === 'string') {
        list = [{ id: value, start: 0 }];
      } else {
        return [];
      }
      return list.map(function(item) {
        var rawId = '';
        if (item && typeof item === 'object') {
          if (item.id && typeof item.id === 'object') {
            rawId = item.id.videoId || item.id.id || item.id.value || '';
          } else {
            rawId = item.id || item.videoId || item.youtubeId || item.url || '';
          }
        } else {
          rawId = item;
        }
        var id = extractYouTubeId(rawId);
        return {
          id: id,
          start: Math.max(0, parseInt(item && item.start, 10) || 0)
        };
      }).filter(function(item) { return !!item.id; });
    }

    function extractYouTubeId(value) {
      if (value && typeof value === 'object') {
        value = value.videoId || value.id || value.value || '';
      }
      var text = String(value || '').trim();
      if (!text) return '';
      var match = text.match(/[?&]v=([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      match = text.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      match = text.match(/embed\/([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      match = text.match(/shorts\/([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      match = text.match(/live\/([A-Za-z0-9_-]{11})/);
      if (match) return match[1];
      if (/^[A-Za-z0-9_-]{11}$/.test(text)) return text;
      return '';
    }

    const ChordProStorage = {
      _db: null,
      _readyPromise: null,
      _noteCache: Object.create(null),

      ready: function() {
        if (!this._readyPromise) {
          this._readyPromise = this._openAndWarm();
        }
        return this._readyPromise;
      },

      _openAndWarm: async function() {
        this._db = await this._openDb();
        await this._loadAllNotesIntoCache();
        return this._db;
      },

      _openDb: function() {
        return new Promise(function(resolve, reject) {
          if (!window.indexedDB) {
            reject(new Error('IndexedDB is not available in this browser.'));
            return;
          }
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = function(event) {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(SONGS_STORE)) {
              const songs = db.createObjectStore(SONGS_STORE, { keyPath: 'slug' });
              songs.createIndex('updatedAt', 'updatedAt', { unique: false });
              songs.createIndex('title', 'title', { unique: false });
            }
            if (!db.objectStoreNames.contains(NOTES_STORE)) {
              db.createObjectStore(NOTES_STORE, { keyPath: 'slug' });
            }
          };
          request.onsuccess = function() { resolve(request.result); };
          request.onerror = function() { reject(request.error || new Error('Failed to open IndexedDB.')); };
        });
      },

      _txStore: function(storeName, mode) {
        const tx = this._db.transaction(storeName, mode || 'readonly');
        return tx.objectStore(storeName);
      },

      _requestToPromise: function(request) {
        return new Promise(function(resolve, reject) {
          request.onsuccess = function() { resolve(request.result); };
          request.onerror = function() { reject(request.error || new Error('IndexedDB request failed.')); };
        });
      },

      _loadAllNotesIntoCache: async function() {
        this._noteCache = Object.create(null);
        const store = this._txStore(NOTES_STORE, 'readonly');
        const rows = await this._requestToPromise(store.getAll());
        (Array.isArray(rows) ? rows : []).forEach((entry) => {
          const slug = String(entry && entry.slug || '').trim();
          if (!slug) return;
          this._noteCache[slug] = Array.isArray(entry && entry.notes) ? cloneValue(entry.notes) : [];
        });
      },

      getAppConfig: async function() {
        await this.ready();
        return {
          appUrl: window.location.protocol === 'file:'
            ? String(window.location.href || '').split('#')[0].split('?')[0]
            : String(window.location.origin || '') + String(window.location.pathname || ''),
          fonts: cloneValue(DEFAULT_FONTS)
        };
      },

      listSongs: async function() {
        await this.ready();
        const store = this._txStore(SONGS_STORE, 'readonly');
        const rows = await this._requestToPromise(store.getAll());
        return (Array.isArray(rows) ? rows : [])
          .filter(function(song) { return !!(song && song.slug); })
          .map(function(song) {
            return {
              slug: song.slug,
              title: song.title,
              artist: song.artist,
              tags: Array.isArray(song.tags) ? cloneValue(song.tags) : [],
              updatedAt: song.updatedAt || '',
              createdAt: song.createdAt || ''
            };
          })
          .sort(function(a, b) {
            return String(b.updatedAt || '').localeCompare(String(a.updatedAt || ''));
          });
      },

      getSong: async function(slug) {
        await this.ready();
        const normalizedSlug = String(slug || '').trim();
        if (!normalizedSlug) return null;
        const store = this._txStore(SONGS_STORE, 'readonly');
        const found = await this._requestToPromise(store.get(normalizedSlug));
        return found ? cloneValue(found) : null;
      },

      getAllSongsFull: async function() {
        await this.ready();
        const store = this._txStore(SONGS_STORE, 'readonly');
        const rows = await this._requestToPromise(store.getAll());
        return (Array.isArray(rows) ? rows : [])
          .filter(function(song) { return !!(song && song.slug); })
          .map(function(song) { return cloneValue(song); })
          .sort(function(a, b) {
            return String(a.slug || '').localeCompare(String(b.slug || ''));
          });
      },

      replaceAllSongs: async function(records) {
        await this.ready();
        const source = Array.isArray(records) ? records : [];
        const seen = Object.create(null);
        const normalizedRecords = source.map(function(item) {
          const normalized = normalizeSongPayload(item || {});

  const NOTES_SHARP = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  const NOTES_FLAT = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
  const NOTE_VALUES = {
    'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3, 'E': 4, 'F': 5, 'F#': 6, 'Gb': 6,
    'G': 7, 'G#': 8, 'Ab': 8, 'A': 9, 'A#': 10, 'Bb': 10, 'B': 11, 'Cb': 11, 'E#': 5, 'B#': 0, 'Fb': 4
  };

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function encodeDataValue(value) {
    return encodeURIComponent(String(value || ''));
  }

  function transposeChord(chord, steps, notation, options) {
    if (!chord) return '';
    if (String(chord).toUpperCase() === 'N.C.' || String(chord).toUpperCase() === 'NC') return chord;

    let transposed = String(chord);
    if (steps !== 0 || notation !== 'default') {
      transposed = transposed.replace(/([A-G][#b♯♭]?)/g, function(match) {
        const normalized = match.replace('♯', '#').replace('♭', 'b');
        const index = NOTE_VALUES[normalized];
        if (index === undefined) return match;
        let newIndex = (index + steps) % 12;
        if (newIndex < 0) newIndex += 12;
        if (notation === 'flat') return NOTES_FLAT[newIndex];
        if (notation === 'sharp') return NOTES_SHARP[newIndex];
        return normalized.indexOf('b') !== -1 ? NOTES_FLAT[newIndex] : NOTES_SHARP[newIndex];

    }

    if (!options || options.symbols !== false) {
      transposed = transposed.replace(/maj/gi, '△');
      transposed = transposed.replace(/([A-G][#b♯♭]?)M(?=[0-9()/△]|$)/g, '$1△');
      transposed = transposed.replace(/[-–]([0-9])/g, '♭$1');
      transposed = transposed.replace(/b([0-9])/g, '♭$1');
      transposed = transposed.replace(/#([0-9])/g, '♯$1');
      transposed = transposed.replace(/([A-G])b/g, '$1♭');
      transposed = transposed.replace(/([A-G])#/g, '$1♯');
    }

  function renderChordPart(chordStr, options) {
    if (!chordStr) return '';
    const parts = String(chordStr).split(/(\([^)]+\))|([♯♭])|([△]|add|sus|aug|dim|alt|6\/9)/i);
    return parts.map(function(part) {
      if (!part) return '';
      if ((!options || options.tensions !== false) && part.startsWith('(') && part.endsWith(')')) {
        return '<span class="cw-tension">' + escapeHtml(part) + '</span>';

    const text = String(content || '');
    const lines = text.split('\n');

    const notation = options && options.notation ? options.notation : 'default';
    const lyricsFont = options && options.lyricsFont ? options.lyricsFont : '"M PLUS Rounded 1c", sans-serif';
    const chordFont = options && options.chordFont ? options.chordFont : '"JetBrains Mono", monospace';
    const formatOptions = options && options.formatOptions ? options.formatOptions : {
      symbols: true,
      tensions: true,
      slashChords: true,
      suffixes: true
    };

    const fontSizeScale = { 1: '0.92rem', 2: '1rem', 3: '1.1rem', 4: '1.22rem', 5: '1.36rem' };
    const chordScale = { 1: '0.92rem', 2: '1.04rem', 3: '1.16rem', 4: '1.28rem', 5: '1.4rem' };
    const lyricsSize = fontSizeScale[options && options.fontSizeLevel || 3] || fontSizeScale[3];
    const chordSize = chordScale[options && options.chordSizeLevel || 3] || chordScale[3];

    const html = lines.map(function(line) {
      if (line.startsWith('{') && line.endsWith('}')) {
        const inner = line.slice(1, -1);
        const colonIdx = inner.indexOf(':');
        if (colonIdx !== -1) {
          const key = inner.slice(0, colonIdx).trim().toLowerCase();
          const val = inner.slice(colonIdx + 1).trim();

          if (key === 'comment_italic' || key === 'ci') return '<div class="cw-comment-italic cw-directive-line">' + escapeHtml(val) + '</div>';
          if (key === 'key' || key === 'k') return '<div class="cw-directive cw-directive-line">Key: ' + escapeHtml(val) + '</div>';
        }
        return '';
      }

      if (!line.trim()) return '<div class="cw-empty-line"></div>';

      const parts = line.split('[');
      const segments = [];
      if (parts[0]) segments.push({ chord: null, text: parts[0] });
      for (let i = 1; i < parts.length; i++) {
        const closeIdx = parts[i].indexOf(']');
        if (closeIdx !== -1) {
          segments.push({ chord: parts[i].slice(0, closeIdx), text: parts[i].slice(closeIdx + 1) });
        } else {
          segments.push({ chord: null, text: '[' + parts[i] });
        }
      }

      const hasChords = segments.some(function(seg) { return seg.chord !== null; });
      if (!hasChords) return '<div class="cw-plain-line">' + escapeHtml(line) + '</div>';

      return '<div class="cw-line">' + segments.map(function(seg) {
        const chordHtml = seg.chord
          ? renderTransposedChord(transposeChord(seg.chord, transpose, notation, formatOptions), formatOptions)

          '<div class="cw-segment">',
          '<span class="cw-chord">', chordHtml, '</span>',
          '<span class="cw-lyrics">', escapeHtml(seg.text || '​'), '</span>',
          '</div>'
        ].join('');
      }).join('') + '</div>';
    }).join('');

    return [
      '<div class="cw-renderer"',
      ' data-lyrics-font="', escapeHtml(encodeDataValue(lyricsFont)), '"',
      ' data-chord-font="', escapeHtml(encodeDataValue(chordFont)), '"',
      ' data-lyrics-size="', escapeHtml(lyricsSize), '"',
      ' data-chord-size="', escapeHtml(chordSize), '"',
      '>',
      html,
      '</div>'

  function applyPersonalChordProViewerTypography(container) {

        el.style.fontSize = chordSize;
      });
    });
  }

  function safeDecodeDataValue(value) {
    try {
      return decodeURIComponent(String(value || ''));
    } catch (err) {
      return String(value || '');
    }
  }

      manualScrollIntentUntil = 0;
      manualScrollOverrideUntil = 0;

    function hasRecentManualScrollIntent() {
      return performance.now() <= manualScrollIntentUntil;
    }

    function hasManualScrollOverride() {
      return performance.now() <= manualScrollOverrideUntil;
    }

    function adjustAdaptiveSpeed(direction) {
      const now = performance.now();
      if (now - lastAdaptiveSpeedAdjustAt < ADAPTIVE_SPEED_ADJUST_COOLDOWN_MS) return;
      lastAdaptiveSpeedAdjustAt = now;
      if (direction === 'slower') {
        adaptiveSpeedMult = clampAdaptiveSpeedMult(adaptiveSpeedMult * ADAPTIVE_SPEED_SLOW_FACTOR);
        return;
      }
      if (direction === 'faster') {
        adaptiveSpeedMult = clampAdaptiveSpeedMult(adaptiveSpeedMult * ADAPTIVE_SPEED_FAST_FACTOR);
      }

      exactScrollTop = currentTop;
      if (App && App.state && App.state.page === 'view') {

      if (!App || !App.state || App.state.page !== 'view' || !App.state.scroll.isPlaying) return;

      if (!hasRecentManualScrollIntent()) return;
      adjustAdaptiveSpeed(delta < 0 ? 'slower' : 'faster');

      if (observedGeometry) {

        rebaseAutoscrollSegment(currentTop, observedGeometry);

      observedScrollCaptured = false;

    function rebaseAutoscrollSegment(startTop, observedGeometry, startedAt) {
      if (!observedGeometry) {

      const basePixelsPerSecond = observedGeometry.travelDistance > 0
        ? (observedGeometry.travelDistance / Math.max(1, App && App.state && App.state.scroll ? App.state.scroll.durationSec : 1))

      autoscrollSegmentEndTop = observedGeometry.targetEndScrollTop;

    function getObservedDurationInputElements() {

    function syncPendingObservedDurationInputs(options) {
      options = options || {};
      if (!App || !App.state || !App.state.scroll) return;
      const inputs = getObservedDurationInputElements();
      const minutesInput = inputs.minutesInput;
      const secondsInput = inputs.secondsInput;
      if (!minutesInput || !secondsInput) return;
      const useCommittedValue = !!options.useCommittedValue;
      const isPending = !useCommittedValue && !!App.state.scroll.isObservedDurationPending;
      const active = document.activeElement;
      if (!options.force && isPending && (active === minutesInput || active === secondsInput)) return;
      const durationTotalSec = isPending && typeof App.getDisplayedScrollDurationSec === 'function'
        ? App.getDisplayedScrollDurationSec()
        : Math.max(1, parseInt(App.state.scroll.durationSec, 10) || 240);
      const minutes = Math.floor(durationTotalSec / 60);
      const secondsStr = String(durationTotalSec % 60).padStart(2, '0');
      minutesInput.value = String(minutes);
      secondsInput.value = secondsStr;
      minutesInput.classList.toggle('is-observed-pending', isPending);
      secondsInput.classList.toggle('is-observed-pending', isPending);

    function syncCommittedScrollDurationInputs() {

    function getMaxScrollTop(target) {
      if (!target || target === document.body || target === document.documentElement || target === document.scrollingElement) {

          doc ? doc.scrollHeight : 0,
          body ? body.scrollHeight : 0,
          doc ? doc.offsetHeight : 0,
          body ? body.offsetHeight : 0,
          doc ? doc.clientHeight : 0

    function createObservedGeometrySnapshot(geometry) {
      if (!geometry || !geometry.scrollTarget) return null;
      const maxScrollTop = getMaxScrollTop(geometry.scrollTarget);
      const startScrollTop = Math.max(0, exactScrollTop);
      const targetEndScrollTop = Math.max(startScrollTop, Math.min(maxScrollTop, Math.max(0, geometry.endY - geometry.viewportHeight)));
      const travelDistance = Math.max(0, targetEndScrollTop - startScrollTop);
      return {
        startY: geometry.startY,
        endY: geometry.endY,
        viewportHeight: geometry.viewportHeight,
        maxScrollTop: maxScrollTop,
        startScrollTop: startScrollTop,
        targetEndScrollTop: targetEndScrollTop,
        travelDistance: travelDistance,
        captureThresholdScrollTop: startScrollTop + (travelDistance * 0.9)

    function getObservedRangeProgress() {
      const geometry = observedScrollGeometrySnapshot;
      if (!geometry || geometry.travelDistance <= 0) return 0;
      const progress = (exactScrollTop - geometry.startScrollTop) / geometry.travelDistance;
      return Math.max(0, Math.min(1, progress));

    function maybeCaptureObservedScrollDuration() {
      if (!App || !App.state || !App.state.scroll) return;
      if (App._viewerRerenderInProgress) return;
      if (!observedScrollSessionStartAt || observedScrollCaptured) return;
      const geometry = observedScrollGeometrySnapshot;
      if (!geometry || geometry.travelDistance <= 0) return;
      if (!(exactScrollTop >= geometry.captureThresholdScrollTop)) return;
      const elapsedMs = Math.max(0, performance.now() - observedScrollSessionStartAt);
      const observedDurationSec = Math.max(1, Math.round((elapsedMs / 1000) / 0.9));
      observedScrollCaptured = true;
      if (typeof App.setPendingObservedScrollDuration === 'function') {
        App.setPendingObservedScrollDuration(observedDurationSec);

    function getSongNoteStorageKeyForSlug(slug) {

    function getCurrentSongNoteStorageKey() {
      const song = getCurrentSong();

    }

    function clampNotePercent(value, fallback) {
      const numeric = Number(value);
      const base = Number.isFinite(numeric) ? numeric : fallback;
      return Math.max(0, Math.min(1, base));
    }

    function clampNoteDimension(value, min, max, fallback) {
      const numeric = Number(value);
      const base = Number.isFinite(numeric) ? numeric : fallback;
      return Math.max(min, Math.min(max, Math.round(base)));
    }

    function disconnectSongNoteResizeObserver() {
      if (!noteResizeObserver) return;
      noteResizeObserver.disconnect();
      noteResizeObserver = null;
    }

    function normalizeSongNote(note) {
      if (!note || typeof note !== 'object') return null;
      const id = String(note.id || '').trim() || ('note-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8));
      return {
        id: id,
        xPercent: clampNotePercent(note.xPercent, 0.5),
        yPercent: clampNotePercent(note.yPercent, 0.5),
        text: String(note.text || '').slice(0, NOTE_MAX_LENGTH),
        widthPx: clampNoteDimension(note.widthPx, NOTE_MIN_WIDTH_PX, NOTE_MAX_WIDTH_PX, NOTE_DEFAULT_WIDTH_PX),
        heightPx: clampNoteDimension(note.heightPx, NOTE_MIN_HEIGHT_PX, NOTE_MAX_HEIGHT_PX, NOTE_DEFAULT_HEIGHT_PX),
        fontSizeLevel: clampSongNoteFontSizeLevel(note.fontSizeLevel),
        isExpanded: !!note.isExpanded

    function clampSongNoteFontSizeLevel(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return NOTE_FONT_SIZE_LEVEL_DEFAULT;
      return Math.max(NOTE_FONT_SIZE_LEVEL_MIN, Math.min(NOTE_FONT_SIZE_LEVEL_MAX, Math.round(numeric)));
    }

    function getSongNoteFontSizeLevelValue(note) {
      if (!note || note.fontSizeLevel == null) return NOTE_FONT_SIZE_LEVEL_DEFAULT;
      return clampSongNoteFontSizeLevel(note.fontSizeLevel);
    }

    function getSongNoteFontSizeFactor(note) {
      const level = getSongNoteFontSizeLevelValue(note);
      return NOTE_FONT_SIZE_FACTORS[level] || NOTE_FONT_SIZE_FACTORS[NOTE_FONT_SIZE_LEVEL_DEFAULT];
    }

    function normalizeSongNoteList(notes) {
      return Array.isArray(notes)
        ? notes.map(normalizeSongNote).filter(Boolean)
        : [];

    function loadSongNotesForSlug(slug) {
  return window.ChordProStorage
    ? window.ChordProStorage.loadNotesSync(slug)

}

async function writeSongNotesForSlug(slug, notes, options) {
  if (!window.ChordProStorage) {
    return { ok: false, error: new Error('Song note storage is unavailable.') };

  return window.ChordProStorage.writeNotesSync(slug, notes, options);
}

function getAllStoredSongNoteEntries() {
  return window.ChordProStorage
    ? window.ChordProStorage.getAllNoteEntriesSync()
    : [];
}

function loadCurrentSongNotes() {
      const song = getCurrentSong();
      const storageKey = getCurrentSongNoteStorageKey();
      if (!storageKey) {
        currentSongNotes = [];
        editingNoteId = '';
        return currentSongNotes;
      }
      currentSongNotes = loadSongNotesForSlug(song && song.slug ? String(song.slug) : '');
      if (editingNoteId && !findSongNoteById(editingNoteId)) {
        editingNoteId = '';
        noteFocusPending = false;
      }
      return currentSongNotes;
    }

    function saveCurrentSongNotes(options) {
      options = options || {};
      const preserveNoteId = String(options.preserveNoteId || '').trim();
      const song = getCurrentSong();
      const slug = song && song.slug ? String(song.slug).trim() : '';
      if (!slug) return Promise.resolve({ ok: false, error: new Error('Missing song slug.') });
      const keepEmptyNoteIds = [editingNoteId, preserveNoteId].filter(Boolean);
      const normalized = currentSongNotes
        .map(normalizeSongNote)
        .filter(Boolean)
        .filter(function(note) {
          return note.text.length > 0 || note.id === editingNoteId || note.id === preserveNoteId;
        });
      currentSongNotes = normalized;
      return writeSongNotesForSlug(slug, currentSongNotes, { keepEmptyNoteIds: keepEmptyNoteIds }).then(function(result) {
        if (!result.ok) {
          setSongNoteStatus('error', String(result.error && result.error.message || result.error || 'Failed to save notes.'));
        }
        return result;
      }).catch(function(error) {
        setSongNoteStatus('error', String(error && error.message || error || 'Failed to save notes.'));
        return { ok: false, error: error };
      });
    }

    function findSongNoteById(noteId) {
      return currentSongNotes.find(function(note) {
        return note.id === noteId;
      }) || null;
    }

    function getCurrentSongNoteFileBaseName() {
      const song = getCurrentSong();
      const slug = song && song.slug ? String(song.slug).trim() : '';
      return slug ? ('personal-chordpro-viewer-notes-' + slug) : 'personal-chordpro-viewer-notes';
    }

    function downloadSongNoteJson(filename, payload) {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = objectUrl;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(function() {
        URL.revokeObjectURL(objectUrl);
      }, 1000);
    }

    function setSongNoteStatus(type, message) {
      if (App && typeof App.setStatus === 'function') {
        App.setStatus(type, message);
      }
    }

    function getCurrentSongNotesForExport() {
      commitActiveSongNote();
      return currentSongNotes
        .map(normalizeSongNote)
        .filter(Boolean)
        .filter(function(note) {
          return note.text.length > 0;
        });
    }

    function exportCurrentSongNotes() {
      const song = getCurrentSong();
      if (!song || !song.slug) {
        setSongNoteStatus('error', 'No current song to export.');
        return false;
      }
      const notes = getCurrentSongNotesForExport();
      downloadSongNoteJson(getCurrentSongNoteFileBaseName() + '.json', {
        type: 'personal-chordpro-viewer-notes',
        version: 1,
        scope: 'song',
        exportedAt: new Date().toISOString(),
        song: {
          slug: String(song.slug || ''),
          title: String(song.title || ''),
          artist: String(song.artist || ''),
          notes: notes
        }
      });
      setSongNoteStatus('info', notes.length ? 'Song notes exported.' : 'Empty song note file exported.');
      return false;
    }

    function exportAllSongNotes() {
      commitActiveSongNote();
      const entries = getAllStoredSongNoteEntries();
      if (!entries) {
        setSongNoteStatus('error', 'Failed to read stored notes.');
        return false;
      }
      downloadSongNoteJson('personal-chordpro-viewer-notes-all.json', {
        type: 'personal-chordpro-viewer-notes',
        version: 1,
        scope: 'all',
        exportedAt: new Date().toISOString(),
        songs: entries.map(function(entry) {
          return {
            slug: entry.slug,
            notes: entry.notes
          };
        })
      });
      setSongNoteStatus('info', entries.length ? ('All notes exported for ' + entries.length + ' song(s).') : 'Empty all-song note file exported.');
      return false;
    }

    function openSongNoteImportDialog(scope) {
      const normalizedScope = scope === 'song' || scope === 'all' || scope === 'auto'
        ? scope
        : 'auto';
      const input = document.getElementById('viewer-note-import-input');
      if (!input) {
        setSongNoteStatus('error', 'Note import input not found.');
        return false;
      }
      input.setAttribute('data-import-scope', normalizedScope);
      input.value = '';
      input.click();
      return false;
    }

        function extractSongNoteImportRecord(payload) {
      if (payload && payload.type === 'personal-chordpro-viewer-notes' && payload.scope === 'song' && payload.song && typeof payload.song === 'object') {
        return {
          slug: String(payload.song.slug || '').trim(),
          notes: normalizeSongNoteList(payload.song.notes)
        };
      }
      if (payload && Array.isArray(payload.notes)) {
        return {
          slug: String(payload.slug || payload.songSlug || '').trim(),
          notes: normalizeSongNoteList(payload.notes)
        };
      }
      return null;
    }

    function extractAllSongNoteImportRecords(payload) {
      if (payload && payload.type === 'personal-chordpro-viewer-notes' && payload.scope === 'all' && Array.isArray(payload.songs)) {
        return payload.songs.map(function(entry) {
          return {
            slug: String(entry && entry.slug || '').trim(),
            notes: normalizeSongNoteList(entry && entry.notes)
          };
        }).filter(function(entry) {
          return entry.slug;
        });
      }
      if (payload && payload.notesBySlug && typeof payload.notesBySlug === 'object') {
        return Object.keys(payload.notesBySlug).map(function(slug) {
          return {
            slug: String(slug || '').trim(),
            notes: normalizeSongNoteList(payload.notesBySlug[slug])
          };
        }).filter(function(entry) {
          return entry.slug;
        });
      }
      return [];
    }

    function refreshCurrentSongNotesAfterImport() {
      loadCurrentSongNotes();
      editingNoteId = '';
      noteFocusPending = false;
      toggleNoteCreateMode(false);
      renderSongNotes();
    }

    async function importCurrentSongNotesPayload(payload) {
      const song = getCurrentSong();
      if (!song || !song.slug) {
        setSongNoteStatus('error', 'No current song to import into.');
        return;
      }
      const record = extractSongNoteImportRecord(payload);
      if (!record) {
        setSongNoteStatus('error', 'Invalid song note JSON file.');
        return;
      }
      if (record.slug && record.slug !== String(song.slug)) {
        setSongNoteStatus('error', 'This note file is for a different song slug: ' + record.slug);
        return;
      }
      if (!window.confirm('Replace notes for this song with ' + record.notes.length + ' imported note(s)?')) {
        return;
      }
      const result = await writeSongNotesForSlug(song.slug, record.notes);
      if (!result.ok) {
        setSongNoteStatus('error', String(result.error && result.error.message || result.error || 'Failed to import song notes.'));
        return;
      }
      refreshCurrentSongNotesAfterImport();
      setSongNoteStatus('info', 'Song notes imported.');
    }

    async function importAllSongNotesPayload(payload) {
      const records = extractAllSongNoteImportRecords(payload);
      if (!records.length) {
        setSongNoteStatus('error', 'Invalid all-song note JSON file.');
        return;
      }
      const allSongs = window.ChordProStorage && typeof window.ChordProStorage.listSongs === 'function'
        ? await window.ChordProStorage.listSongs()
        : [];
      const existingSlugMap = Object.create(null);
      (Array.isArray(allSongs) ? allSongs : []).forEach(function(song) {
        const slug = String(song && song.slug || '').trim();
        if (slug) existingSlugMap[slug] = true;
      });
      const validRecords = records.filter(function(record) {
        return !!existingSlugMap[String(record && record.slug || '').trim()];
      });
      const missingSlugs = records.filter(function(record) {
        return !existingSlugMap[String(record && record.slug || '').trim()];
      }).map(function(record) {
        return String(record && record.slug || '').trim();
      });
      if (!validRecords.length) {
        setSongNoteStatus(
          'error',
          missingSlugs.length
            ? ('No matching songs were found. Nothing was imported. Missing slug(s): ' + missingSlugs.join(', '))
            : 'No matching songs were found. Nothing was imported.'
        );
        return;
      }
      const backups = validRecords.map(function(record) {
        return {
          slug: record.slug,
          notes: loadSongNotesForSlug(record.slug)
        };
      });
      const totalNotes = validRecords.reduce(function(sum, record) {
        return sum + record.notes.length;
      }, 0);
      let confirmMessage = 'Import notes for ' + validRecords.length + ' existing song(s) and replace their existing notes?';
      if (missingSlugs.length) {
        confirmMessage += '\n\nThese slug(s) do not exist and will be skipped:\n- ' + missingSlugs.join('\n- ');
      }
      if (!window.confirm(confirmMessage)) {
        return;
      }
      for (let i = 0; i < validRecords.length; i += 1) {
        const result = await writeSongNotesForSlug(validRecords[i].slug, validRecords[i].notes);
        if (!result.ok) {
          for (let j = 0; j < backups.length; j += 1) {
            await writeSongNotesForSlug(backups[j].slug, backups[j].notes);
          }
          setSongNoteStatus('error', String(result.error && result.error.message || result.error || 'Failed to import all notes.'));
          return;
        }
      }
      const currentSong = getCurrentSong();
      if (currentSong && currentSong.slug && validRecords.some(function(record) { return record.slug === String(currentSong.slug); })) {
        refreshCurrentSongNotesAfterImport();
      } else {
        toggleNoteCreateMode(false);
      }
      let statusMessage = 'Imported ' + totalNotes + ' note(s) for ' + validRecords.length + ' song(s).';
      if (missingSlugs.length) {
        statusMessage += ' Skipped missing slug(s): ' + missingSlugs.join(', ') + '.';
      }
      setSongNoteStatus('info', statusMessage);
    }

    function handleSongNoteImportChange(event, scope) {
      const input = event && event.target ? event.target : null;
      const file = input && input.files && input.files[0] ? input.files[0] : null;
      const requestedScope = scope || (input ? String(input.getAttribute('data-import-scope') || 'auto') : 'auto');
      if (input) {
        input.value = '';
        input.removeAttribute('data-import-scope');
      }
      if (!file) return false;
      commitActiveSongNote();
      const reader = new FileReader();
      reader.onload = async function(loadEvent) {
        try {
          const raw = loadEvent && loadEvent.target ? String(loadEvent.target.result || '') : '';
          const payload = JSON.parse(raw);
          if (requestedScope === 'all') {
            importAllSongNotesPayload(payload);
            return;
          }
          if (requestedScope === 'song') {
            importCurrentSongNotesPayload(payload);
            return;
          }
          const songRecord = extractSongNoteImportRecord(payload);
          if (songRecord) {
            importCurrentSongNotesPayload(payload);
            return;
          }
          const allRecords = extractAllSongNoteImportRecords(payload);
          if (allRecords.length) {
            importAllSongNotesPayload(payload);
            return;
          }
          setSongNoteStatus('error', 'Invalid note JSON file.');
        } catch (err) {
          setSongNoteStatus('error', String(err && err.message || err || 'Failed to read note JSON file.'));
        }
      };
      reader.onerror = function() {
        setSongNoteStatus('error', 'Failed to read note JSON file.');
      };
      reader.readAsText(file);
      return false;
    }

    function importSongNotes() {
      return openSongNoteImportDialog('auto');
    }

    function importCurrentSongNotes() {
      return importSongNotes();
    }

    function importAllSongNotes() {
      return importSongNotes();
    }

        function getSongNoteIndex(noteId) {
      return currentSongNotes.findIndex(function(note) {
        return note.id === noteId;
      });
    }

    function getSheetStageMetrics(stage) {
      if (!stage) return { width: 1, height: 1 };
      const rect = stage.getBoundingClientRect();
      return {
        width: Math.max(stage.clientWidth, rect.width, 1),
        height: Math.max(stage.scrollHeight, stage.offsetHeight, rect.height, 1)
      };
    }

    function getNotePreviewText(text) {
      const normalized = String(text || '').replace(/\s+/g, ' ').trim();
      return normalized ? normalized.slice(0, 80) : 'Open note';
    }

    function getStagePercentFromEvent(event, stage) {
      const source = event && event.touches ? event.touches[0] : event;
      const rect = stage.getBoundingClientRect();
      const metrics = getSheetStageMetrics(stage);
      const rawX = (source.clientX || 0) - rect.left;
      const rawY = (source.clientY || 0) - rect.top;
      return {
        xPercent: clampNotePercent(rawX / Math.max(metrics.width, 1), 0.5),
        yPercent: clampNotePercent(rawY / Math.max(metrics.height, 1), 0.5)
      };
    }

    function getSongNoteClampBounds(note, stage, options) {
      const metrics = getSheetStageMetrics(stage);
      const keepDotInside = !!(options && options.keepDotInside);
      if (!keepDotInside) {
        return {
          minX: 0,
          maxX: 1,
          minY: 0,
          maxY: 1,
          width: metrics.width,
          height: metrics.height
        };
      }
      const minXPx = NOTE_DOT_EDGE_MARGIN_PX;
      const minYPx = NOTE_DOT_EDGE_MARGIN_PX;
      const maxXPx = Math.max(minXPx, metrics.width - NOTE_DOT_SIZE_PX - NOTE_DOT_EDGE_MARGIN_PX);
      const maxYPx = Math.max(minYPx, metrics.height - NOTE_DOT_SIZE_PX - NOTE_DOT_EDGE_MARGIN_PX);
      return {
        minX: minXPx / Math.max(metrics.width, 1),
        maxX: maxXPx / Math.max(metrics.width, 1),
        minY: minYPx / Math.max(metrics.height, 1),
        maxY: maxYPx / Math.max(metrics.height, 1),
        width: metrics.width,
        height: metrics.height
      };
    }

    function clampSongNotePosition(note, stage, xPercent, yPercent, options) {

    function getViewportTop(target) {

      return target.clientHeight;

      const els = cacheElements();
      if (!els.sheetStage) return null;

      const stageRect = els.sheetStage.getBoundingClientRect();
      const stageHeight = Math.max(els.sheetStage.offsetHeight, els.sheetStage.scrollHeight, stageRect.height, 1);
      const stageTop = getScrollTop(scrollTarget) + stageRect.top - getViewportTop(scrollTarget);
      const startY = stageTop + (App.state.scroll.startPercent * stageHeight);
      const endY = stageTop + (App.state.scroll.endPercent * stageHeight);

        scrollTarget: scrollTarget,
        stageHeight: stageHeight,
        stageTop: stageTop,

        endY: endY,

      let endPercent = Math.max(0, Math.min(1, App.state.scroll.endPercent || 0));

      if (endPercent - startPercent < minGap) {
        if (startPercent + minGap <= 1) {
          endPercent = startPercent + minGap;
        } else {
          startPercent = Math.max(0, endPercent - minGap);
        }
      }

      App.state.scroll.startPercent = startPercent;
      App.state.scroll.endPercent = Math.max(startPercent + minGap, endPercent);
      if (App.state.scroll.endPercent > 1) {
        App.state.scroll.endPercent = 1;
        App.state.scroll.startPercent = Math.max(0, 1 - minGap);

        els.trackRange.style.height = Math.max(0, (endPercent - startPercent) * 100) + '%';

      if (els.endMarker) els.endMarker.style.top = (endPercent * 100) + '%';

        }, { passive: true });

        window.addEventListener('scroll', function() {
          handleScrollPositionChange();
        }, { passive: true });
        window.addEventListener('wheel', function() {
          markManualScrollIntent();
        }, { passive: true });
        window.addEventListener('touchstart', function() {
          markManualScrollIntent();
        }, { passive: true });
        window.addEventListener('touchmove', function() {
          markManualScrollIntent();
        }, { passive: true });

    function bindKeyboardOnce() {
      if (keyboardBound) return;

          return;

        toggleAutoScrollFromSheet(event);

    function cancelResetScrollAnimation() {

      resetScrollRafId = requestAnimationFrame(step);

      if (!els.sheetStage) return;

      syncNoteCreateModeUi(els);

    function startAutoScroll() {

        App.state.scroll.isPlaying = false;
        hasStarted = false;
        clearManualScrollIntent();
        resetObservedScrollMeasurement({ keepPendingObservedDuration: true });

            didScroll = true;
          }
